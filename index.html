function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (err) { return fallback; }
}

function saveLocal(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

function setDarkMode(value) {
  state.darkMode = !!value;
  document.documentElement.classList.toggle('dark', state.darkMode);
  saveLocal(CONFIG.STORAGE_KEYS.darkMode, state.darkMode);
}

setDarkMode(state.darkMode);

function escapeHtml(value) {
  return String(value == null ? '' : value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function normalizeText(value) { return String(value || '').trim().toLowerCase(); }

function initials(name) {
  return String(name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join('').toUpperCase() || 'ط';
}

function formatDate(value) {
  if (!value) return '-';
  try { return new Date(value).toLocaleString('ar-JO'); } catch (err) { return String(value); }
}

function minutesLabel(seconds) { return Math.max(1, Math.round(Number(seconds || 0) / 60)); }

function percent(correct, total) {
  if (!total) return 0;
  return Math.round((Number(correct || 0) / Number(total || 1)) * 100);
}

function getSubject(code) { return CURRICULUM.subjects.find(s => s.code === code) || null; }

function getSubjectSummary(code) {
  return (state.data.questionBankSummary.subjects || []).find(s => s.subjectCode === code) || { totalQuestions: 0, totalExams: 0, units: [] };
}

function makeUnitKey(subjectCode, semester, unitTitleAr) { return [subjectCode, Number(semester || 0), unitTitleAr || ''].join('|'); }

function parseUnitKey(unitKey) {
  const parts = String(unitKey || '').split('|');
  return { subjectCode: parts[0] || '', semester: Number(parts[1] || 0), unitTitleAr: parts.slice(2).join('|') || '' };
}

function buildSubjectUnits(subjectCode) {
  const subject = getSubject(subjectCode);
  if (!subject) return [];
  const units = [];
  subject.semesters.forEach(semester => {
    semester.units.forEach(unitTitleAr => {
      const key = makeUnitKey(subjectCode, semester.semester, unitTitleAr);
      units.push({ key, subjectCode, semester: semester.semester, semesterTitleAr: semester.titleAr, unitTitleAr, weight: Number(subject.weights[key.split('|').slice(1).join('|')] || 0) });
    });
  });
  units.push({ key: makeUnitKey(subjectCode, 0, CURRICULUM.comprehensiveLabel), subjectCode, semester: 0, semesterTitleAr: 'الفصلان معًا', unitTitleAr: CURRICULUM.comprehensiveLabel, weight: 0, comprehensive: true });
  return units;
}

function getExamsForSubject(subjectCode) { return (state.data.exams || []).filter(e => e.subjectCode === subjectCode); }

function getExamsForUnit(subjectCode, unitKey) {
  const info = parseUnitKey(unitKey);
  return getExamsForSubject(subjectCode).filter(e => Number(e.semester || 0) === Number(info.semester || 0) && String(e.unitTitleAr || '') === String(info.unitTitleAr || ''));
}

function getQuestionCountForUnit(unitKey) { return Number((state.data.questionBankSummary.byUnitKey || {})[unitKey] || 0); }

function getAttemptsForSubject(subjectCode) { return (state.data.results || []).filter(r => r.subjectCode === subjectCode); }

function getUnitAnalytics(subjectCode) { return (state.data.analytics.unitMastery || []).filter(item => item.subjectCode === subjectCode); }

function getSubjectAnalytics(subjectCode) { return (state.data.analytics.subjectMastery || []).find(item => item.subjectCode === subjectCode) || null; }

function hasApiBase() { return String(CONFIG.API_BASE || '').startsWith('https://script.google.com/macros/s/'); }

async function api(action, payload) {
  if (!hasApiBase()) throw new Error('ضع رابط Google Apps Script أولًا داخل CONFIG.API_BASE');
  const response = await fetch(CONFIG.API_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({ action }, payload || {}))
  });
  if (!response.ok) throw new Error('فشل الاتصال بالخادم');
  const data = await response.json();
  if (!data.ok) throw new Error(data.error || 'API Error');
  return data;
}

function showToast(message, type) {
  state.toast = { message, type: type || 'success' };
  render();
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { state.toast = null; render(); }, 3200);
}

function setLoading(value) { state.loading = !!value; render(); }

async function refreshData() {
  if (!state.user) return;
  try {
    setLoading(true);
    const [catalogRes, resultsRes, analyticsRes] = await Promise.all([
      api('getCatalog'),
      api('getUserResults', { userId: state.user.id }),
      api('getUserAnalytics', { userId: state.user.id })
    ]);
    state.data.exams = catalogRes.exams || [];
    state.data.questionBankSummary = catalogRes.questionBank || { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] };
    state.data.results = resultsRes.results || [];
    state.data.analytics = analyticsRes.analytics || { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] };
    render();
  } catch (err) {
    showToast('خطأ في التحميل: ' + err.message, 'error');
  } finally {
    state.loading = false;
    render();
  }
}

function resetBuilderForSubject(subjectCode) {
  const units = buildSubjectUnits(subjectCode).filter(u => !u.comprehensive);
  state.builder.selectedUnitKeys = units.slice(0, Math.min(4, units.length)).map(u => u.key);
  state.builder.selectedExamIds = [];
  state.builder.explicitCounts = {};
  state.builder.mode = 'weighted';
  state.builder.totalQuestions = 100;
  state.builder.duration = 7200;
}

function openSubject(subjectCode) {
  state.subjectCode = subjectCode;
  state.subjectTab = 'units';
  state.unitKey = null;
  resetBuilderForSubject(subjectCode);
  render();
}

function backToHome() {
  state.subjectCode = null;
  state.subjectTab = 'units';
  state.unitKey = null;
  state.reviewAttempt = null;
  state.examSession = null;
  clearExamTimer();
  render();
}

function openAdmin() { state.admin.open = true; render(); }
function closeAdmin() { state.admin.open = false; render(); }

async function adminLogin(password) {
  if (password !== CONFIG.ADMIN_PASSWORD) { showToast('كلمة مرور الإدارة غير صحيحة', 'error'); return; }
  state.admin.authenticated = true;
  try {
    const res = await api('listAllResults', { adminPassword: CONFIG.ADMIN_PASSWORD });
    state.admin.allResults = res.results || [];
  } catch (err) {
    showToast('تعذر تحميل نتائج الإدارة: ' + err.message, 'error');
  }
  render();
}

          <div class="rounded-2xl bg-slate-100 dark:bg-slate-800 p-3"><div class="text-slate-500 dark:text-slate-400">الوحدات</div><div class="mt-1 font-black">${summary.units.length || buildSubjectUnits(subject.code).length - 1}</div></div>

function computeBuilderPreview(subjectCode) {
  const subject = getSubject(subjectCode);
  const selectedUnits = buildSubjectUnits(subjectCode).filter(u => state.builder.selectedUnitKeys.includes(u.key) && !u.comprehensive);
  const preview = [];
  if (!selectedUnits.length) return preview;

  if (state.builder.mode === 'manual') {
    selectedUnits.forEach(unit => {
      preview.push({ key: unit.key, semester: unit.semester, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Number(state.builder.explicitCounts[unit.key] || 0), normalizedWeight: null });
    });
    return preview;
  }

  const weights = selectedUnits.map(unit => Number(subject.weights[`${unit.semester}|${unit.unitTitleAr}`] || 1));
  const totalWeight = weights.reduce((sum, val) => sum + val, 0) || selectedUnits.length;
  selectedUnits.forEach((unit, index) => {
    const normalizedWeight = ((weights[index] / totalWeight) * 100);
    preview.push({ key: unit.key, semester: unit.semester, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Math.round((normalizedWeight / 100) * Number(state.builder.totalQuestions || 0)), normalizedWeight });
  });
  return preview;
}

function getQuestionPdfSource(question, exam) { return question.sourcePdfBase64 || (exam && exam.sourcePdf && exam.sourcePdf.base64) || ''; }

function stripBase64Exam(exam) {
  const clone = JSON.parse(JSON.stringify(exam));
  if (clone.sourcePdf && clone.sourcePdf.base64) delete clone.sourcePdf.base64;
  ['questions', 'openQuestions'].forEach(field => { (clone[field] || []).forEach(item => { if (item && item.sourcePdfBase64) delete item.sourcePdfBase64; }); });
  return clone;
}

function renderPdfPreview(question, exam, suffix) {
  if (!question || !question.pdfPageRef || !question.pdfPageRef.page) return '';
  const pdfBase64 = getQuestionPdfSource(question, exam);
  if (!pdfBase64) return '<div class="text-sm text-slate-500 dark:text-slate-400">لا يتوفر PDF لهذا السؤال.</div>';
  const pdfKey = `${question.questionKey || question.id || 'q'}_${suffix || 'exam'}`;
  window.__PDF_SOURCES[pdfKey] = pdfBase64;
  return `
    <div class="rounded-3xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 p-3 space-y-3">
      <div>
        <div class="text-xs font-black text-brand-600 dark:text-brand-300">مرجع PDF</div>
        <div class="text-sm font-semibold text-slate-700 dark:text-slate-200">الصفحة ${escapeHtml(question.pdfPageRef.page)}</div>
      </div>
      <div class="text-xs leading-6 text-slate-500 dark:text-slate-400">${escapeHtml(question.pdfPageRef.description || '')}</div>
      <div class="overflow-auto rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
        <canvas class="block max-w-full h-auto mx-auto pdf-canvas" data-pdf-key="${escapeHtml(pdfKey)}" data-page="${escapeHtml(question.pdfPageRef.page)}"></canvas>
      </div>
    </div>
  `;
}

function renderQuestionCard(question, index, exam, mode) {
  const session = state.examSession;
  const review = state.reviewAttempt;
  const selected = session ? session.answers[question.id] : undefined;
  const reviewMap = review ? review.answers || {} : {};
  const userAnswer = mode === 'review' ? reviewMap[question.id] : selected;
  const readOnly = mode === 'review';
  return `
    <div class="rounded-3xl border border-slate-200 dark:border-slate-800 p-4 ${mode === 'review' ? 'bg-slate-50 dark:bg-slate-900/60' : ''}">
      <div class="text-xs font-bold text-brand-600 dark:text-brand-300">${escapeHtml(question.unitTitleAr || exam.unitTitleAr || '')}${question.subunitTitleAr ? ' • ' + escapeHtml(question.subunitTitleAr) : ''}</div>
      <div class="mt-2 font-black text-slate-900 dark:text-white leading-8" data-math>${escapeHtml(index + 1)}. ${escapeHtml(question.text || '')}</div>
      <div class="mt-4 ${question.pdfPageRef ? 'grid xl:grid-cols-[minmax(0,1fr),340px] gap-4 items-start' : ''}">
        <div class="${question.pdfPageRef ? 'order-2 xl:order-1' : ''}">
          <div class="grid gap-3 lg:grid-cols-2">
            ${(question.options || []).map((option, optionIndex) => {
              const isSelected = Number(userAnswer) === Number(optionIndex);
              const isCorrect = Number(question.correctIndex) === Number(optionIndex);
              const reviewClasses = mode === 'review'
                ? isCorrect ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-950/20' : isSelected ? 'border-red-500 bg-red-50 dark:bg-red-950/20' : 'border-slate-200 dark:border-slate-800'
                : isSelected ? 'border-brand-600 bg-brand-50 dark:bg-brand-950/20' : 'border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/70';
              return `
                <button ${readOnly ? 'disabled' : ''} data-action="select-answer" data-question-id="${escapeHtml(question.id)}" data-index="${escapeHtml(optionIndex)}" class="rounded-2xl border p-4 text-right transition ${reviewClasses}">
                  <div class="flex items-center gap-3">
                    <div class="h-7 w-7 rounded-full border flex items-center justify-center text-xs font-black ${isSelected && mode !== 'review' ? 'bg-brand-600 text-white border-brand-600' : ''}">${String.fromCharCode(65 + optionIndex)}</div>
                    <div class="flex-1" data-math>${escapeHtml(option)}</div>
                  </div>
                </button>
              `;
            }).join('')}
          </div>
          ${mode === 'review' ? `
            <div class="mt-4 space-y-2 text-sm">
              <div class="text-slate-600 dark:text-slate-300">إجابتك: <span class="font-bold ${userAnswer == null ? 'text-slate-500' : Number(userAnswer) === Number(question.correctIndex) ? 'text-emerald-600' : 'text-red-600'}">${userAnswer == null ? 'لم تجب' : escapeHtml(question.options[userAnswer] || '')}</span></div>
              ${question.correctIndex == null ? '<div class="text-amber-600">لا يوجد مفتاح إجابة صريح محفوظ لهذا السؤال.</div>' : `<div class="text-emerald-600">الإجابة الصحيحة: ${escapeHtml(question.options[question.correctIndex] || '')}</div>`}
              ${question.explanation ? `<div class="rounded-2xl bg-slate-100 dark:bg-slate-800 p-3 text-slate-700 dark:text-slate-200">${escapeHtml(question.explanation)}</div>` : ''}
            </div>
          ` : ''}
        </div>
        ${question.pdfPageRef ? `<div class="${question.pdfPageRef ? 'order-1 xl:order-2' : ''}">${renderPdfPreview(question, exam, mode)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderEssayCard(question, index, exam, mode) {
  const session = state.examSession;
  const review = state.reviewAttempt;
  const value = mode === 'review' ? ((review.openAnswers || {})[question.id] || '') : ((session.openAnswers || {})[question.id] || '');
  return `
    <div class="rounded-3xl border border-slate-200 dark:border-slate-800 p-4 ${mode === 'review' ? 'bg-slate-50 dark:bg-slate-900/60' : ''}">
      <div class="text-xs font-bold text-brand-600 dark:text-brand-300">${escapeHtml(question.sectionTitle || question.questionType || 'مقالي')}</div>
      <div class="mt-2 font-black text-slate-900 dark:text-white leading-8" data-math>${escapeHtml(index + 1)}. ${escapeHtml(question.prompt || question.text || '')}</div>
      ${question.pdfPageRef ? `<div class="mt-4">${renderPdfPreview(question, exam, mode)}</div>` : ''}
      ${mode === 'review'
        ? `<div class="mt-4 rounded-2xl bg-slate-100 dark:bg-slate-800 p-4 whitespace-pre-wrap">${escapeHtml(value || 'لم تتم الإجابة')}</div>`
        : `<textarea data-action="set-open-answer" data-question-id="${escapeHtml(question.id)}" rows="7" class="w-full mt-4 rounded-2xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-4 py-3" placeholder="اكتب إجابتك هنا...">${escapeHtml(value)}</textarea>`}
      ${question.idealAnswer ? `<div class="mt-4 rounded-2xl bg-emerald-50 dark:bg-emerald-950/20 p-4 text-emerald-800 dark:text-emerald-200 whitespace-pre-wrap">${escapeHtml(question.idealAnswer)}</div>` : ''}

  `;
}

function renderExamScreen() {

  const totalItems = items.length || 1;
  const progress = percent(answeredCount, totalItems);
  const minutes = String(Math.floor(session.timeLeft / 60)).padStart(2, '0');
  const seconds = String(session.timeLeft % 60).padStart(2, '0');
  return `
    <div class="space-y-6">
      <div class="rounded-[28px] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-6">
        <div class="flex flex-col xl:flex-row xl:items-center justify-between gap-5">
          <div>
            <div class="text-sm font-bold text-brand-600 dark:text-brand-300">${escapeHtml(exam.subjectAr || '')}</div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white mt-2">${escapeHtml(exam.title || '')}</h1>
            <div class="mt-3 flex flex-wrap gap-2 text-sm">
              <span class="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">${escapeHtml(exam.unitTitleAr || '')}</span>
              <span class="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">الوقت: <span class="text-red-500 font-black">${minutes}:${seconds}</span></span>
              <span class="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">التقدم: ${progress}%</span>
            </div>
          </div>
          <div class="flex flex-wrap gap-3">
            ${exam.settings && exam.settings.allowSwitchView !== false ? `
              <div class="flex items-center gap-2 rounded-2xl bg-slate-100 dark:bg-slate-800 p-1">
                <button data-action="set-view-mode" data-view-mode="single" class="px-3 py-2 rounded-xl text-sm font-bold ${session.viewMode === 'single' ? 'bg-white dark:bg-slate-900 shadow-sm' : ''}">سؤال بسؤال</button>
                <button data-action="set-view-mode" data-view-mode="all" class="px-3 py-2 rounded-xl text-sm font-bold ${session.viewMode === 'all' ? 'bg-white dark:bg-slate-900 shadow-sm' : ''}">عرض كامل</button>
              </div>
            ` : ''}
            <button data-action="cancel-exam" class="px-4 py-3 rounded-2xl font-bold border border-slate-300 dark:border-slate-700">إلغاء</button>
            <button data-action="submit-exam" class="px-4 py-3 rounded-2xl font-bold bg-brand-600 text-white shadow-glow">تسليم</button>

        <div class="mt-5 h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden"><div class="h-full bg-brand-600 transition-all duration-300" style="width:${progress}%"></div></div>
      </div>
      ${session.viewMode === 'single'
        ? `<div class="rounded-[28px] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-5 space-y-4">
            <div class="text-xl font-black text-slate-900 dark:text-white">السؤال ${session.currentIndex + 1} من ${totalItems}</div>
            ${currentItem ? (currentItem.kind === 'mcq' ? renderQuestionCard(currentItem.question, session.currentIndex, exam, 'exam') : renderEssayCard(currentItem.question, session.currentIndex, exam, 'exam')) : ''}

              <button data-action="exam-prev" class="px-4 py-3 rounded-2xl font-bold border border-slate-300 dark:border-slate-700" ${session.currentIndex === 0 ? 'disabled' : ''}>السابق</button>
              <button data-action="exam-next" class="px-4 py-3 rounded-2xl font-bold bg-slate-900 text-white dark:bg-white dark:text-slate-900" ${session.currentIndex >= totalItems - 1 ? 'disabled' : ''}>التالي</button>
            </div>
          </div>`
        : `
          ${(exam.questions || []).length ? `<div class="rounded-[28px] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-5 space-y-4"><div class="text-xl font-black text-slate-900 dark:text-white">الاختيار من متعدد</div>${(exam.questions || []).map((question, index) => renderQuestionCard(question, index, exam, 'exam')).join('')}</div>` : ''}
          ${(exam.openQuestions || []).length ? `<div class="rounded-[28px] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-5 space-y-4"><div class="text-xl font-black text-slate-900 dark:text-white">Reading / Writing / Essay</div>${(exam.openQuestions || []).map((question, index) => renderEssayCard(question, index, exam, 'exam')).join('')}</div>` : ''}

  `;

}

function hydrateAfterRender() {
  setDarkMode(state.darkMode);

  renderPdfCanvases();
}

function renderMath() {
  if (!window.renderMathInElement) return;
  document.querySelectorAll('[data-math]').forEach(node => {
    try { window.renderMathInElement(node, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }], throwOnError: false }); } catch (err) {}
  });
}

async function renderPdfCanvases() {
  if (!window.pdfjsLib) return;
  const canvases = Array.from(document.querySelectorAll('.pdf-canvas'));
  for (const canvas of canvases) {
    const pdfKey = canvas.getAttribute('data-pdf-key');
    const pageNumber = Number(canvas.getAttribute('data-page') || 1);
    const base64 = window.__PDF_SOURCES[pdfKey];
    if (!base64) continue;
    try {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const pdf = await window.pdfjsLib.getDocument({ data: bytes }).promise;
      const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1.1 });
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
    } catch (err) {
      const parent = canvas.parentElement;
      if (parent) parent.innerHTML = '<div class="p-4 text-sm text-red-600">تعذر عرض صفحة الـ PDF.</div>';
    }
  }
}

function clearExamTimer() {
  if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
}

function startExamTimer() {
  clearExamTimer();
  if (!state.examSession) return;
  state.timerId = setInterval(async () => {
    if (!state.examSession) { clearExamTimer(); return; }
    state.examSession.timeLeft -= 1;
    if (state.examSession.timeLeft <= 0) {
      state.examSession.timeLeft = 0;
      render();
      clearExamTimer();
      await submitExam();
      return;
    }
    render();
  }, 1000);
}

async function loadExam(examId) {
  const res = await api('getExamBundle', { examId });
  return res.exam;
}

function prepareExamForStart(exam) {
  state.prestartExam = { exam, duration: exam.duration };
  render();
}

function beginExam(exam, durationSeconds) {
  state.prestartExam = null;
  state.reviewAttempt = null;
  state.examSession = { exam, answers: {}, openAnswers: {}, currentIndex: 0, viewMode: (exam.settings && exam.settings.defaultQuestionView) || 'single', timeLeft: Number(durationSeconds || exam.duration || 3600) };
  render();
  startExamTimer();
}

async function submitExam() {
  if (!state.examSession) return;
  const session = state.examSession;
  const exam = session.exam;
  const questionOutcomes = [];
  const wrongItems = [];
  let correctCount = 0;
  let totalQuestions = 0;
  
  (exam.questions || []).forEach(question => {
    if (!Number.isInteger(question.correctIndex)) return;
    totalQuestions += 1;
    const userAnswer = session.answers[question.id];
    const isCorrect = Number(userAnswer) === Number(question.correctIndex);
    if (isCorrect) correctCount += 1;
    
    questionOutcomes.push({
      questionKey: question.questionKey || `${exam.id}::${question.id}`,
      questionType: question.questionType || 'mcq',
      subjectCode: question.subjectCode || exam.subjectCode || '',
      subjectAr: question.subjectAr || exam.subjectAr || '',
      semester: question.semester != null ? question.semester : exam.semester,
      unitTitleAr: question.unitTitleAr || exam.unitTitleAr || '',
      subunitTitleAr: question.subunitTitleAr || exam.subunitTitleAr || '',
      isCorrect: isCorrect
    });
    
    if (!isCorrect) {
      const snapshot = JSON.parse(JSON.stringify(question));
      if (snapshot.sourcePdfBase64) delete snapshot.sourcePdfBase64;
      wrongItems.push({
        questionKey: question.questionKey || `${exam.id}::${question.id}`,
        questionId: question.id,
        sourceExamId: question.sourceExamId || exam.id,
        subjectCode: question.subjectCode || exam.subjectCode || '',
        subjectAr: question.subjectAr || exam.subjectAr || '',
        semester: question.semester != null ? question.semester : exam.semester,
        unitTitleAr: question.unitTitleAr || exam.unitTitleAr || '',
        subunitTitleAr: question.subunitTitleAr || exam.subunitTitleAr || '',
        questionSnapshot: snapshot
      });
    }
  });

  const score = percent(correctCount, totalQuestions || 1);
  try {
    setLoading(true);
    const res = await api('submitResult', {
      userId: state.user.id,
      userName: state.user.name,
      examId: exam.id,
      examTitle: exam.title || '',
      subjectCode: exam.subjectCode || '',
      subjectAr: exam.subjectAr || '',
      semester: exam.semester != null ? exam.semester : 0,
      unitTitleAr: exam.unitTitleAr || '',
      subunitTitleAr: exam.subunitTitleAr || '',
      score,
      totalQuestions,
      correctCount,
      answers: session.answers,
      openAnswers: session.openAnswers,
      wrongItems,
      examSnapshot: stripBase64Exam(exam)
    });
    clearExamTimer();
    state.examSession = null;
    await refreshData();
    await openAttemptReview(res.attemptId);
    showToast('تم حفظ النتيجة والمراجعة بنجاح');
  } catch (err) {
    showToast('فشل حفظ النتيجة: ' + err.message, 'error');
  } finally {
    state.loading = false;
    render();
  }
}

    state.reviewAttempt = res.attempt;

async function generateCustomExam() {
  try {
    const selectedUnits = state.builder.selectedUnitKeys.map(key => {
      const info = parseUnitKey(key);
      return { semester: info.semester, unitTitleAr: info.unitTitleAr };
    });
    if (!selectedUnits.length) { showToast('اختر وحدة واحدة على الأقل.', 'error'); return; }
    setLoading(true);
    const payload = {
      subjectCode: state.subjectCode,
      totalQuestions: Number(state.builder.totalQuestions || 100),
      duration: Number(state.builder.duration || 7200) * 60,
      selectedUnits,
      selectedExamIds: state.builder.selectedExamIds.slice(),
      explicitUnitCounts: state.builder.explicitCounts,
      title: 'امتحان مخصص - ' + (getSubject(state.subjectCode) ? getSubject(state.subjectCode).nameAr : '')
    };
    const res = await api('buildCustomExam', payload);
    prepareExamForStart(res.exam);
  } catch (err) {
    showToast('تعذر إنشاء الامتحان المخصص: ' + err.message, 'error');
  } finally {
    state.loading = false;
    render();
  }
}

async function uploadExamFromAdmin() {
  const form = state.admin.form;
  try {
    const exam = JSON.parse(form.jsonText);
    exam.title = form.title || exam.title || '';
    exam.subjectCode = form.subjectCode;
    exam.subjectAr = (getSubject(form.subjectCode) || {}).nameAr || exam.subjectAr || '';
    exam.semester = Number(form.semester);
    exam.unitTitleAr = form.unitTitleAr;
    exam.subunitTitleAr = form.subunitTitleAr || '';
    exam.duration = Number(form.duration || exam.duration || 1800);
    exam.allowStudentTimeOverride = String(form.allowStudentTimeOverride) === 'true' || form.allowStudentTimeOverride === true;
    exam.minDuration = Number(form.minDuration || 300);
    exam.maxDuration = Number(form.maxDuration || Math.max(exam.duration, 3600));

    let pdfUpload = null;
    if (form.pdfFile) {
      const dataUrl = await fileToDataUrl(form.pdfFile);
      pdfUpload = { fileName: form.pdfFile.name, mimeType: form.pdfFile.type || 'application/pdf', base64: dataUrl.split(',')[1] || '' };
    }

    state.admin.busy = true;
    render();
    
    await api('uploadExam', {
      adminPassword: CONFIG.ADMIN_PASSWORD,
      examJson: exam,
      pdfDataUrl: pdfUpload ? 'data:' + pdfUpload.mimeType + ';base64,' + pdfUpload.base64 : null,
      pdfFileName: pdfUpload ? pdfUpload.fileName : null
    });
    
    showToast('تم رفع الامتحان وملف الـ PDF بنجاح');
    state.admin.form.title = '';
    state.admin.form.pdfFile = null;
    state.admin.form.pdfName = '';
    await refreshData();
  } catch (err) {
    showToast('فشل الرفع: ' + err.message, 'error');
  } finally {
    state.admin.busy = false;
    render();
  }
}

function cssEscape(value) { return String(value).replace(/"/g, '\\"'); }

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.addEventListener('click', async event => {
  const target = event.target.closest('[data-action]');
  if (!target) return;
  const action = target.getAttribute('data-action');
  try {
    if (action === 'login') {
      const input = document.getElementById('login-name');
      const name = String(input ? input.value : '').trim();
      if (!name) { showToast('أدخل الاسم أولًا', 'error'); return; }
      state.user = { id: name.replace(/\s+/g, '_'), name };
      saveLocal(CONFIG.STORAGE_KEYS.user, state.user);
      await refreshData();
      return;
    }
    if (action === 'logout') {
      localStorage.removeItem(CONFIG.STORAGE_KEYS.user);
      state.user = null; state.examSession = null; state.reviewAttempt = null; state.subjectCode = null;
      clearExamTimer(); render(); return;
    }
    if (action === 'toggle-dark') { setDarkMode(!state.darkMode); render(); return; }
    if (action === 'go-home') { backToHome(); return; }
    if (action === 'open-subject') { openSubject(target.getAttribute('data-subject-code')); return; }
    if (action === 'subject-tab') { state.subjectTab = target.getAttribute('data-tab'); render(); return; }
    if (action === 'select-unit') { state.unitKey = target.getAttribute('data-unit-key'); render(); return; }
    if (action === 'jump-builder-with-unit') {
      const unitKey = target.getAttribute('data-unit-key');
      state.subjectTab = 'builder';
      if (!state.builder.selectedUnitKeys.includes(unitKey)) state.builder.selectedUnitKeys.push(unitKey);
      render(); return;
    }
    if (action === 'prepare-exam') {
      setLoading(true);
      const exam = await loadExam(target.getAttribute('data-exam-id'));
      prepareExamForStart(exam);
      state.loading = false;
      render(); return;
    }
    if (action === 'close-prestart') { state.prestartExam = null; render(); return; }
    if (action === 'start-prepared-exam') {
      const exam = state.prestartExam.exam;
      let duration = Number(state.prestartExam.duration || exam.duration || 3600);
      if (exam.allowStudentTimeOverride) {
        const input = document.getElementById('prestart-duration');
        const minutes = Number(input ? input.value : minutesLabel(exam.duration));
        const minMinutes = minutesLabel(exam.minDuration || 300);
        const maxMinutes = minutesLabel(exam.maxDuration || Math.max(exam.duration || 3600, 3600));
        duration = Math.max(minMinutes, Math.min(maxMinutes, minutes)) * 60;
      }
      beginExam(exam, duration);
      return;
    }
    if (action === 'set-view-mode') { if (state.examSession) { state.examSession.viewMode = target.getAttribute('data-view-mode'); render(); } return; }
    if (action === 'exam-prev') { state.examSession.currentIndex = Math.max(0, state.examSession.currentIndex - 1); render(); return; }
    if (action === 'exam-next') {
      const exam = state.examSession.exam;
      const total = (exam.questions || []).length + (exam.openQuestions || []).length;
      state.examSession.currentIndex = Math.min(total - 1, state.examSession.currentIndex + 1);
      render(); return;
    }
    if (action === 'select-answer') {
      if (!state.examSession) return;
      const qid = target.getAttribute('data-question-id');
      state.examSession.answers[qid] = Number(target.getAttribute('data-index'));
      render(); return;
    }
    if (action === 'submit-exam') { await submitExam(); return; }
    if (action === 'cancel-exam') { if (confirm('هل تريد الخروج من الامتحان الحالي؟ تقدمك لن يُحفظ.')) { state.examSession = null; clearExamTimer(); render(); } return; }
    if (action === 'review-attempt') { await openAttemptReview(target.getAttribute('data-attempt-id')); return; }
    if (action === 'close-review') { state.reviewAttempt = null; render(); return; }
    if (action === 'redo-attempt') { await generateRedo({ attemptId: target.getAttribute('data-attempt-id') }); return; }
    if (action === 'redo-by-subject') { await generateRedo({ subjectCode: target.getAttribute('data-subject-code') }); return; }
    if (action === 'toggle-builder-unit') {
      const unitKey = target.getAttribute('data-unit-key');
      if (target.checked) { if (!state.builder.selectedUnitKeys.includes(unitKey)) state.builder.selectedUnitKeys.push(unitKey); } 
      else { state.builder.selectedUnitKeys = state.builder.selectedUnitKeys.filter(k => k !== unitKey); delete state.builder.explicitCounts[unitKey]; }
      render(); return;
    }
    if (action === 'toggle-builder-exam') {
      const examId = target.getAttribute('data-exam-id');
      if (target.checked) { if (!state.builder.selectedExamIds.includes(examId)) state.builder.selectedExamIds.push(examId); } 
      else { state.builder.selectedExamIds = state.builder.selectedExamIds.filter(id => id !== examId); }
      render(); return;
    }
    if (action === 'build-custom-exam') { await generateCustomExam(); return; }
    if (action === 'open-admin') { openAdmin(); return; }
    if (action === 'close-admin') { closeAdmin(); return; }
    if (action === 'admin-login') { const input = document.getElementById('admin-password'); await adminLogin(input ? input.value : ''); return; }
    if (action === 'admin-tab') { state.admin.tab = target.getAttribute('data-tab'); render(); return; }
    if (action === 'copy-prompt') { await navigator.clipboard.writeText(STRICT_JSON_PROMPT); showToast('تم نسخ الـ prompt'); return; }
    if (action === 'upload-exam') { await uploadExamFromAdmin(); return; }
    if (action === 'save-exam-settings') { await saveExamSettings(target.getAttribute('data-exam-id')); return; }
    if (action === 'delete-exam') { await deleteExam(target.getAttribute('data-exam-id')); return; }
    if (action === 'close-toast') { state.toast = null; render(); return; }
  } catch (err) { showToast(err.message || 'حدث خطأ غير متوقع', 'error'); }
});

document.addEventListener('change', event => {
  const builderField = event.target.getAttribute('data-builder-field');
  if (builderField) {
    if (builderField === 'mode') state.builder.mode = event.target.value;
    if (builderField === 'totalQuestions') state.builder.totalQuestions = Number(event.target.value || 0);
    if (builderField === 'duration') state.builder.duration = Number(event.target.value || 0);
    render(); return;
  }
  if (event.target.getAttribute('data-action') === 'set-builder-unit-count') {
    state.builder.explicitCounts[event.target.getAttribute('data-unit-key')] = Number(event.target.value || 0);
    render(); return;
  }
  const adminField = event.target.getAttribute('data-admin-field');
  if (adminField) {
    let value = event.target.value;
    if (['semester', 'duration', 'minDuration', 'maxDuration'].includes(adminField)) value = Number(value);
    if (adminField === 'allowStudentTimeOverride') value = value === 'true';
    state.admin.form[adminField] = value;
    if (adminField === 'subjectCode') {
      const units = buildSubjectUnits(value).filter(u => u.semester === Number(state.admin.form.semester) && !u.comprehensive);
      state.admin.form.unitTitleAr = state.admin.form.semester === 0 ? CURRICULUM.comprehensiveLabel : (units[0] ? units[0].unitTitleAr : '');
    }
    if (adminField === 'semester') {
      const units = Number(value) === 0 ? [{ unitTitleAr: CURRICULUM.comprehensiveLabel }] : buildSubjectUnits(state.admin.form.subjectCode).filter(u => u.semester === Number(value) && !u.comprehensive);
      state.admin.form.unitTitleAr = units[0] ? units[0].unitTitleAr : '';
    }
    render(); return;
  }
  if (event.target.hasAttribute('data-admin-search')) { state.admin.search = event.target.value; render(); return; }
  if (event.target.id === 'admin-json-file') {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { state.admin.form.jsonText = String(reader.result || ''); render(); };
    reader.readAsText(file, 'utf-8'); return;
  }
  if (event.target.id === 'admin-pdf-file') {
    const file = event.target.files && event.target.files[0];
    state.admin.form.pdfFile = file || null;
    state.admin.form.pdfName = file ? file.name : '';
    render(); return;
  }
});

document.addEventListener('input', event => {
  const adminField = event.target.getAttribute('data-admin-field');
  if (adminField === 'jsonText' || adminField === 'title' || adminField === 'subunitTitleAr') { state.admin.form[adminField] = event.target.value; return; }
  if (event.target.getAttribute('data-action') === 'set-open-answer') {
    if (!state.examSession) return;
    state.examSession.openAnswers[event.target.getAttribute('data-question-id')] = event.target.value; return;
  }
});

render();
if (state.user) refreshData();
</script>
</body>
</html>
