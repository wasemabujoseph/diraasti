const STRICT_JSON_PROMPT = `You are converting an exam PDF into a STRICT, VALID JSON file for an online exam system.

Your output must be a single raw JSON object only.

CRITICAL OUTPUT RULES:
1. Output JSON only.
2. Do NOT add markdown fences.
3. Do NOT wrap the JSON in quotation marks.
4. Do NOT add comments.
5. Do NOT add explanations before or after the JSON.
6. Every property name must be in double quotes.
7. Every string value must be in double quotes.
8. Escape any internal double quotes inside text using backslash, like: \"example\"
9. Do not leave trailing commas.
10. The result must be directly parseable by JSON.parse().

SOURCE RULES:
1. Use ONLY the provided PDF content.
2. Do NOT use outside knowledge.
3. Do NOT invent questions, answers, images, charts, tables, or explanations.
4. If an answer is not explicitly present in the PDF, set:
   "correctIndex": null
5. If a question depends on an image, chart, graph, table, or diagram in the PDF:
   - identify the PDF page that contains that visual
   - add a "pdfPageRef" object to that question
6. The visual reference must come only from the PDF itself.
7. If no visual is needed for a question, do not add "pdfPageRef".

LANGUAGE AND TEXT RULES:
1. Preserve the original question wording from the PDF as closely as possible.
2. Preserve Arabic exactly as it appears, but fix obvious OCR junk only when necessary for readability.
3. If the source contains quotation marks inside text, escape them properly.
4. Keep question order exactly as in the PDF.
5. Keep options order exactly as in the PDF.
6. Do not paraphrase unless OCR is clearly broken.

JSON SCHEMA:
{
  "title": "",
  "subjectCode": "",
  "subjectAr": "",
  "semester": null,
  "unitTitleAr": "",
  "subunitTitleAr": "",
  "examMode": "OMR_MCQ",
  "duration": null,
  "sourcePdf": { "fileName": "source.pdf" },
  "questions": [
    {
      "id": "q1",
      "text": "",
      "options": ["", "", "", ""],
      "correctIndex": 0,
      "explanation": ""
    }
  ],
  "openQuestions": []
}

RULES FOR QUESTIONS:
1. "id" must be sequential: q1, q2, q3 ...
2. "text" must contain the full MCQ prompt.
3. "options" must stay in the same order as the PDF.
4. If no answer is explicitly present in the PDF, use "correctIndex": null.
5. Do not generate explanations.

RULES FOR VISUAL QUESTIONS:
If a question depends on a picture, chart, graph, table, figure, or diagram from the PDF, add:
"pdfPageRef": {
  "page": 1,
  "visualType": "image",
  "description": "",
  "showFullPage": true
}

FINAL INSTRUCTION:
Return raw valid JSON only, matching the schema exactly, with no markdown, no surrounding quotes, no comments, and no extra text.`;

function cls(...v){ return v.filter(Boolean).join(' '); }
function saveLocal(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function loadLocal(key, fallback=null){ try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function round1(n){ return Math.round(Number(n || 0) * 10) / 10; }
function formatDate(v){ try { return new Date(v).toLocaleString('ar-JO'); } catch { return v || '-'; } }
function minutesToSeconds(m){ return Math.max(1, Number(m || 1)) * 60; }
function secondsToMinutes(s){ return Math.max(1, Math.round(Number(s || 0) / 60)); }
function initials(name=''){ return name.split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase(); }
function safeJsonParse(text){ return JSON.parse(text); }
function unitKey(subjectCode, semester, unitTitleAr, subunitTitleAr=''){ return [subjectCode || '', Number(semester || 0), unitTitleAr || '', subunitTitleAr || ''].join('||'); }
function groupBy(list, getter){ return list.reduce((acc, item) => { const key = getter(item); (acc[key] ||= []).push(item); return acc; }, {}); }
function getSubject(code){ return CURRICULUM.subjects.find(s => s.code === code); }
function getUnits(subjectCode){ const subject = getSubject(subjectCode); if(!subject) return []; return subject.semesters.flatMap(sem => sem.units.map(u => ({ ...u, semester: sem.semester, semesterTitleAr: sem.titleAr, unitKey: unitKey(subjectCode, sem.semester, u.titleAr, '') }))); }
function getUnitDef(subjectCode, semester, unitTitleAr){ return getUnits(subjectCode).find(u => Number(u.semester)===Number(semester) && u.titleAr===unitTitleAr); }
function normalizeExam(exam){
  const e = JSON.parse(JSON.stringify(exam || {}));
  e.questions = Array.isArray(e.questions) ? e.questions : [];
  e.openQuestions = Array.isArray(e.openQuestions) ? e.openQuestions : [];
  e.settings = e.settings || {};
  if(e.settings.allowSwitchView == null) e.settings.allowSwitchView = true;
  if(!e.settings.defaultQuestionView) e.settings.defaultQuestionView = 'single';
  if(e.settings.showOneQuestionPerRow == null) e.settings.showOneQuestionPerRow = true;
  e.duration = Number(e.duration || 1800);
  return e;
}
function stripExamForSubmit(exam){ const copy = JSON.parse(JSON.stringify(exam || {})); if(copy.sourcePdf && copy.sourcePdf.dataUrl) delete copy.sourcePdf.dataUrl; return copy; }

async function api(action, payload={}){
  const res = await fetch(CONFIG.API_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload })
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { throw new Error('استجابة غير صالحة من الخادم'); }
  if(!res.ok || !data.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function useToast(){
  const [toast, setToast] = useState(null);
  function show(message, type='success'){ setToast({ id: uid(), message, type }); setTimeout(() => setToast(null), 3500); }
  return { toast, show, clear: () => setToast(null) };
}

}

function SubjectHeader({ subject, stats }){
  return <Card className="overflow-hidden border-none bg-transparent shadow-none"><div className="rounded-[32px] bg-gradient-to-br from-ink via-brand-700 to-slate-900 p-6 text-white"><div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between"><div><div className="text-sm font-bold text-white/70">{subject.examMode}</div><div className="mt-2 text-5xl font-black">{subject.nameAr}</div><div className="mt-4 text-white/80">اختر الوحدة لعرض امتحاناتها، أو ابنِ امتحانك المخصص من البنك حسب الأوزان أو حسب عدد الأسئلة لكل وحدة.</div></div><div className="grid grid-cols-2 gap-3"><div className="rounded-[24px] bg-white/10 px-5 py-4 text-center"><div className="text-sm text-white/70">الأسئلة</div><div className="mt-1 text-4xl font-black">{stats.questionCount}</div></div><div className="rounded-[24px] bg-white/10 px-5 py-4 text-center"><div className="text-sm text-white/70">الامتحانات</div><div className="mt-1 text-4xl font-black">{stats.examCount}</div></div></div></div></div></Card>;

function TabPills({ tabs, value, onChange }){ return <div className="flex flex-wrap gap-2">{tabs.map(tab => <button key={tab.id} onClick={() => onChange(tab.id)} className={cls('rounded-2xl px-5 py-3 font-black', value===tab.id ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900' : 'border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900')}>{tab.label}</button>)}</div>; }

function CustomExamBuilder({ subject, exams, bankSummary, onBuild, loading }){
  const units = getUnits(subject.code);
  const bankMap = useMemo(() => Object.fromEntries((bankSummary.unitRows || []).map(r => [r.unitKey, r])), [bankSummary]);
  const [mode, setMode] = useState('weighted');
  const [totalQuestions, setTotalQuestions] = useState(100);
  const [duration, setDuration] = useState(120);
  const [selectedUnits, setSelectedUnits] = useState(units.map(u => u.unitKey));
  const [manualCounts, setManualCounts] = useState({});
  const [selectedExamIds, setSelectedExamIds] = useState([]);

  useEffect(() => { setSelectedUnits(units.map(u => u.unitKey)); }, [subject.code]);

  const selectedUnitDefs = units.filter(u => selectedUnits.includes(u.unitKey));
  const weightSum = selectedUnitDefs.reduce((sum, u) => sum + Number(u.weight || 0), 0) || 1;
  const normalized = Object.fromEntries(selectedUnitDefs.map(u => [u.unitKey, round1((Number(u.weight || 0) / weightSum) * 100)]));
  const groupedExams = useMemo(() => groupBy(exams.filter(x => !x.isComprehensive), e => unitKey(subject.code, e.semester, e.unitTitleAr, '')), [exams, subject.code]);

  function toggleUnit(key){ setSelectedUnits(prev => prev.includes(key) ? prev.filter(x => x!==key) : [...prev, key]); }
  function toggleExam(id){ setSelectedExamIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]); }
  function build(){
    const payload = {
      subjectCode: subject.code,
      duration: minutesToSeconds(duration),
      totalQuestions: Number(totalQuestions),
      distributionMode: mode,
      selectedUnits: selectedUnitDefs.map(u => ({ semester: u.semester, unitTitleAr: u.titleAr, unitKey: u.unitKey, weight: u.weight })),
      manualCounts,
      selectedExamIds,
      title: `امتحان مخصص من البنك - ${subject.nameAr}`
    };
    onBuild(payload);
  }

  return <Card className="p-4 md:p-6"><div className="grid xl:grid-cols-[1fr,1.2fr] gap-6"><div className="space-y-4"><Card className="p-4"><div className="text-xl font-black">المعاينة الحالية</div><div className="mt-4 space-y-3">{selectedUnitDefs.length ? selectedUnitDefs.map(u => <div key={u.unitKey} className="rounded-2xl bg-slate-100 p-4 dark:bg-slate-800"><div className="font-black">{u.titleAr}</div><div className="text-xs text-slate-500">{u.semesterTitleAr}</div><div className="mt-2 text-sm">{mode === 'weighted' ? `النسبة بعد التطبيع: %${normalized[u.unitKey] || 0}` : `عدد الأسئلة: ${manualCounts[u.unitKey] || 0}`}</div><div className="text-sm text-slate-500">المتاح في البنك: {bankMap[u.unitKey]?.questions || 0}</div></div>) : <div className="text-slate-500">اختر وحدة واحدة على الأقل.</div>}</div><Button variant="brand" className="w-full mt-5" onClick={build} disabled={loading || !selectedUnitDefs.length}>{loading ? 'جارٍ تكوين الامتحان...' : 'كوّن الامتحان الآن'}</Button></Card><Card className="p-4"><div className="text-xl font-black">تحديد الامتحانات المصدرية (اختياري)</div><div className="mt-4 max-h-[360px] space-y-3 overflow-y-auto pr-1">{selectedUnitDefs.map(u => { const list = groupedExams[u.unitKey] || []; return <div key={u.unitKey} className="rounded-2xl border border-slate-200 p-3 dark:border-slate-800"><div className="font-black">{u.titleAr}</div><div className="mt-2 space-y-2">{list.length ? list.map(ex => <label key={ex.id} className="flex items-start gap-2 text-sm"><input type="checkbox" checked={selectedExamIds.includes(ex.id)} onChange={() => toggleExam(ex.id)} className="mt-1" /><span>{ex.title}</span></label>) : <div className="text-sm text-slate-500">لا توجد امتحانات مرفوعة لهذه الوحدة، سيتم السحب من البنك العام للوحدة إن وجد.</div>}</div></div>; })}</div></Card></div><div className="space-y-5"><div className="grid md:grid-cols-3 gap-4"><Select label="نوع التوزيع" value={mode} onChange={e => setMode(e.target.value)}><option value="weighted">توزيع وزني تلقائي</option><option value="manual">تحديد يدوي لكل وحدة</option></Select><Input label="إجمالي الأسئلة" type="number" value={totalQuestions} onChange={e => setTotalQuestions(e.target.value)} disabled={mode==='manual'} /><Input label="الوقت (بالدقائق)" type="number" value={duration} onChange={e => setDuration(e.target.value)} /></div><div className="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">{units.map(u => { const bankCount = bankMap[u.unitKey]?.questions || 0; return <label key={u.unitKey} className={cls('rounded-[24px] border p-4', selectedUnits.includes(u.unitKey) ? 'border-brand-500 bg-brand-50/60 dark:bg-brand-950/20' : 'border-slate-200 dark:border-slate-800')}><div className="flex items-start justify-between gap-2"><input type="checkbox" checked={selectedUnits.includes(u.unitKey)} onChange={() => toggleUnit(u.unitKey)} className="mt-1" /><div className="flex-1"><div className="text-xs font-bold text-brand-600 dark:text-brand-300">{u.semesterTitleAr}</div><div className="mt-1 font-black leading-tight">{u.titleAr}</div><div className="mt-2 text-sm text-slate-500">الوزن: %{u.weight} • البنك: {bankCount} سؤال</div>{mode === 'manual' ? <Input label="" type="number" value={manualCounts[u.unitKey] || ''} onChange={e => setManualCounts(prev => ({ ...prev, [u.unitKey]: e.target.value }))} className="mt-3" /> : <div className="mt-3 text-sm font-black">بعد التطبيع: %{selectedUnits.includes(u.unitKey) ? (normalized[u.unitKey] || 0) : 0}</div>}</div></div></label>; })}</div></div></div></Card>;
}

function PdfPagePreview({ dataUrl, page }){
  const canvasRef = useRef(null);
  const [error, setError] = useState('');
  useEffect(() => {
    let cancelled = false;
    async function render(){
      if(!dataUrl || !page || !canvasRef.current) return;
      try {
        setError('');
        const pdf = await pdfjsLib.getDocument(dataUrl).promise;
        const pdfPage = await pdf.getPage(Number(page));
        const viewport = pdfPage.getViewport({ scale: 1.25 });
        const canvas = canvasRef.current;
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        if(cancelled) return;
        await pdfPage.render({ canvasContext: context, viewport }).promise;
      } catch(err){ if(!cancelled) setError('تعذر عرض صفحة PDF'); }
    }
    render();
    return () => { cancelled = true; };
  }, [dataUrl, page]);
  return <div className="overflow-hidden rounded-[24px] border border-slate-200 bg-slate-50 p-2 dark:border-slate-800 dark:bg-slate-950">{error ? <div className="p-5 text-sm text-rose-600">{error}</div> : <canvas ref={canvasRef} className="mx-auto max-w-full rounded-2xl" />}</div>;
}

xt || 'لم تجب'}</div><div>الصحيح: {item.correctAnswerText || '-'}</div>{item.question?.explanation ? <div className="mt-2 rounded-2xl bg-slate-100 p-3 dark:bg-slate-800">{item.question.explanation}</div> : null}</div></div>{item.question?.pdfPageRef && exam.sourcePdf?.dataUrl ? <div><PdfPagePreview dataUrl={exam.sourcePdf.dataUrl} page={item.question.pdfPageRef.page} /></div> : null}</div></Card>)}</div></div>;

function ExamScreen({ exam, user, onSubmit, onBack }){
  const normalizedExam = normalizeExam(exam);
  const questions = normalizedExam.questions || [];
  const allowTimeChange = !!normalizedExam.settings?.allowStudentTimeControl || normalizedExam.generated;
  const [prepared, setPrepared] = useState(!allowTimeChange);
  const [minutes, setMinutes] = useState(secondsToMinutes(normalizedExam.duration));
  const [timeLeft, setTimeLeft] = useState(normalizedExam.duration);
  const [answers, setAnswers] = useState({});
  const [viewMode, setViewMode] = useState(normalizedExam.settings?.defaultQuestionView || 'single');
  const [currentIndex, setCurrentIndex] = useState(0);
  const [submitting, setSubmitting] = useState(false);
  const pdfDataUrl = normalizedExam.sourcePdf?.dataUrl || '';

  useEffect(() => {
    if(!prepared || submitting) return;
    const timer = setInterval(() => {
      setTimeLeft(prev => {
        if(prev <= 1){ clearInterval(timer); finish(); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [prepared, submitting]);

  function startNow(){ const secs = minutesToSeconds(minutes); setTimeLeft(secs); setPrepared(true); }
  function finish(){
    if(submitting) return;
    setSubmitting(true);
    const perQuestionResults = questions.map(question => {
      const userAnswerIndex = answers[question.id];
      const correctIndex = question.correctIndex;
      const isCorrect = correctIndex != null && Number(userAnswerIndex) === Number(correctIndex);
      return {
        question,
        subjectCode: question.subjectCode || normalizedExam.subjectCode,
        subjectAr: question.subjectAr || normalizedExam.subjectAr,
        semester: question.semester || normalizedExam.semester,
        unitTitleAr: question.unitTitleAr || normalizedExam.unitTitleAr,
        subunitTitleAr: question.subunitTitleAr || normalizedExam.subunitTitleAr,
        isCorrect,
        userAnswerIndex: userAnswerIndex ?? null,
        userAnswerText: userAnswerIndex != null ? (question.options || [])[userAnswerIndex] : '',
        correctAnswerText: correctIndex != null ? (question.options || [])[correctIndex] : ''
      };
    });
    const correctCount = perQuestionResults.filter(x => x.isCorrect).length;
    const wrongQuestions = perQuestionResults.filter(x => !x.isCorrect).map(x => ({ question: x.question }));
    const payload = {
      userId: user.id,
      userName: user.name,
      examId: normalizedExam.id,
      examTitle: normalizedExam.title,
      subjectCode: normalizedExam.subjectCode,
      subjectAr: normalizedExam.subjectAr,
      semester: normalizedExam.semester,
      unitTitleAr: normalizedExam.unitTitleAr,
      subunitTitleAr: normalizedExam.subunitTitleAr,
      score: questions.length ? round1((correctCount / questions.length) * 100) : 0,
      correctCount,
      wrongCount: questions.length - correctCount,
      totalCount: questions.length,
      durationUsed: minutesToSeconds(minutes) - timeLeft,
      mode: normalizedExam.mode || 'normal',
      answers,
      perQuestionResults,
      wrongQuestions,
      examSnapshot: stripExamForSubmit(normalizedExam)
    };
    onSubmit(payload);
  }

  if(!prepared){
    return <div className="space-y-6"><Card className="overflow-hidden p-6 bg-gradient-to-br from-ink via-brand-700 to-slate-900 text-white border-none"><div className="text-sm font-bold text-white/70">{normalizedExam.subjectAr}</div><div className="mt-2 text-4xl font-black">{normalizedExam.title}</div><div className="mt-3 text-white/80">يمكن للطالب اختيار طريقة العرض، ويمكن تعديل الوقت هنا إذا كان الامتحان يسمح بذلك.</div></Card><Card className="p-6 max-w-2xl"><div className="grid gap-4 md:grid-cols-2"><Input label="المدة بالدقائق" type="number" value={minutes} onChange={e => setMinutes(e.target.value)} disabled={!allowTimeChange} hint={allowTimeChange ? 'يمكنك تعديل الوقت قبل البدء.' : 'الوقت مقفل من قبل الإدارة.'} /><Select label="طريقة العرض الابتدائية" value={viewMode} onChange={e=>setViewMode(e.target.value)}><option value="single">سؤال بسؤال</option><option value="all">عرض كامل</option></Select></div><div className="mt-5 flex gap-3"><Button variant="outline" onClick={onBack}>رجوع</Button><Button variant="brand" onClick={startNow}>ابدأ الآن</Button></div></Card></div>;
  }

  const shownQuestions = viewMode === 'single' ? [questions[currentIndex]].filter(Boolean) : questions;
  const progress = questions.length ? round1((Object.keys(answers).length / questions.length) * 100) : 0;

  return <div className="space-y-6"><Card className="p-6"><div className="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between"><div><div className="text-sm font-bold text-brand-600 dark:text-brand-300">{normalizedExam.subjectAr}</div><div className="mt-1 text-3xl font-black">{normalizedExam.title}</div><div className="mt-3 flex flex-wrap gap-2 text-sm"><span className="rounded-full bg-slate-100 px-3 py-2 dark:bg-slate-800">{normalizedExam.unitTitleAr || 'بدون وحدة'}</span><span className="rounded-full bg-slate-100 px-3 py-2 dark:bg-slate-800">الوقت: {String(Math.floor(timeLeft/60)).padStart(2,'0')}:{String(timeLeft%60).padStart(2,'0')}</span><span className="rounded-full bg-slate-100 px-3 py-2 dark:bg-slate-800">التقدم: {progress}%</span></div></div><div className="flex flex-wrap gap-3">{normalizedExam.settings?.allowSwitchView ? <Select label="" value={viewMode} onChange={e=>setViewMode(e.target.value)} className="min-w-[180px]"><option value="single">سؤال بسؤال</option><option value="all">عرض كامل</option></Select> : null}<Button variant="outline" onClick={onBack}>خروج</Button><Button variant="brand" onClick={finish}>تسليم الامتحان</Button></div></div><div className="mt-5 h-2 rounded-full bg-slate-200 dark:bg-slate-800"><div className="h-full rounded-full bg-brand-600" style={{ width:`${progress}%` }}></div></div></Card>{viewMode==='single' ? <Card className="p-4"><div className="flex items-center justify-between"><Button variant="outline" disabled={currentIndex===0} onClick={() => setCurrentIndex(i => Math.max(0, i-1))}>السابق</Button><div className="font-black">السؤال {currentIndex+1} / {questions.length}</div><Button variant="outline" disabled={currentIndex===questions.length-1} onClick={() => setCurrentIndex(i => Math.min(questions.length-1, i+1))}>التالي</Button></div></Card> : null}<div className={cls('grid gap-4', viewMode==='all' && normalizedExam.settings?.showOneQuestionPerRow !== false ? 'grid-cols-1' : 'grid-cols-1')}>{shownQuestions.map((q, index) => <QuestionBlock key={q.id} question={q} index={viewMode==='single' ? currentIndex : index} selected={answers[q.id]} onSelect={value => setAnswers(prev => ({ ...prev, [q.id]: value }))} viewMode={viewMode==='all' ? 'list' : 'omr'} pdfDataUrl={pdfDataUrl} />)}</div></div>;
}

function AdminModal({ data, toast, onClose, onRefresh }){
  const [auth, setAuth] = useState(false);
  const [password, setPassword] = useState('');
  const [tab, setTab] = useState('upload');
  const [busy, setBusy] = useState(false);
  const [adminResults, setAdminResults] = useState([]);
  const [jsonText, setJsonText] = useState('');
  const [pdfFile, setPdfFile] = useState(null);
  const [subjectCode, setSubjectCode] = useState(CURRICULUM.subjects[0].code);
  const [semester, setSemester] = useState(1);
  const [unitTitleAr, setUnitTitleAr] = useState(getUnits(CURRICULUM.subjects[0].code)[0]?.titleAr || '');
  const [subunitTitleAr, setSubunitTitleAr] = useState('');
  const [title, setTitle] = useState('');
  const [duration, setDuration] = useState(30);
  const [allowStudentTimeControl, setAllowStudentTimeControl] = useState(false);
  const [isComprehensive, setIsComprehensive] = useState(false);
  const units = getUnits(subjectCode).filter(u => Number(u.semester) === Number(semester));
  useEffect(() => { if(units[0] && !units.some(u => u.titleAr===unitTitleAr)) setUnitTitleAr(units[0].titleAr); }, [subjectCode, semester]);

  useEffect(() => {
    if(!auth || tab !== 'results') return;
    api('listAllResults', { adminPassword: password }).then(res => setAdminResults(res.results || [])).catch(() => {});
  }, [auth, tab]);

  function parseImportedFile(file){
    const reader = new FileReader();
    reader.onload = () => setJsonText(String(reader.result || ''));
    reader.readAsText(file, 'utf-8');
  }
  function readFileAsDataUrl(file){ return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(String(reader.result || '')); reader.onerror = reject; reader.readAsDataURL(file); }); }
  async function uploadExam(){
    try {
      setBusy(true);
      const raw = safeJsonParse(jsonText.trim());
      const subject = getSubject(subjectCode);
      raw.title = title || raw.title || `${subject?.nameAr || raw.subjectAr || ''}${isComprehensive ? ' - بنك شامل لكل المادة' : unitTitleAr ? ' - ' + unitTitleAr : ''}`;
      raw.subjectCode = subjectCode;
      raw.subjectAr = subject?.nameAr || raw.subjectAr || '';
      raw.semester = isComprehensive ? 0 : Number(semester);
      raw.unitTitleAr = isComprehensive ? 'بنك شامل لكل المادة' : (unitTitleAr || raw.unitTitleAr || '');
      raw.subunitTitleAr = isComprehensive ? '' : (subunitTitleAr || raw.subunitTitleAr || '');
      raw.duration = minutesToSeconds(duration);
      raw.isComprehensive = isComprehensive;
      raw.settings = { ...(raw.settings || {}), allowStudentTimeControl, allowSwitchView: true, showOneQuestionPerRow: true, defaultQuestionView: 'single' };
      raw.sourcePdf = raw.sourcePdf || {};
      let pdfDataUrl = '';
      if(pdfFile){ pdfDataUrl = await readFileAsDataUrl(pdfFile); raw.sourcePdf.fileName = pdfFile.name; }
      await api('uploadExam', { adminPassword: password, exam: raw, pdfDataUrl, pdfFileName: pdfFile?.name || raw.sourcePdf.fileName || 'source.pdf' });
      toast.show('تم رفع الامتحان بنجاح');
      setJsonText(''); setPdfFile(null); setTitle('');
      await onRefresh();
    } catch(err){ toast.show('فشل الرفع: ' + err.message, 'error'); } finally { setBusy(false); }
  }
  async function deleteExam(examId){ try { setBusy(true); await api('deleteExam', { adminPassword: password, examId }); toast.show('تم حذف الامتحان'); await onRefresh(); } catch(err){ toast.show(err.message, 'error'); } finally { setBusy(false); } }
  async function rebuildBank(){ try { setBusy(true); await api('rebuildQuestionBank', { adminPassword: password }); toast.show('تمت إعادة بناء بنك الأسئلة'); await onRefresh(); } catch(err){ toast.show(err.message, 'error'); } finally { setBusy(false); } }
  async function updateExamSettings(examId, settings){ try { setBusy(true); await api('updateExamSettings', { adminPassword: password, examId, ...settings }); toast.show('تم تحديث الإعدادات'); await onRefresh(); } catch(err){ toast.show(err.message, 'error'); } finally { setBusy(false); } }

  if(!auth){ return <Modal title="لوحة الإدارة" subtitle="الوصول الكامل من الهاتف والكمبيوتر" onClose={onClose}><div className="max-w-md space-y-4"><Input label="كلمة المرور" type="password" value={password} onChange={e=>setPassword(e.target.value)} /><Button variant="brand" className="w-full" onClick={() => password === CONFIG.ADMIN_PASSWORD ? setAuth(true) : toast.show('كلمة المرور غير صحيحة','error')}>دخول</Button></div></Modal>; }

  const exams = data.exams;
  const allResults = data.results;
  return <Modal title="لوحة الإدارة" subtitle="رفع JSON + PDF مباشرة، وإدارة البنك والنتائج" onClose={onClose} wide><div className="space-y-6"><TabPills value={tab} onChange={setTab} tabs={[{id:'upload',label:'رفع امتحان'},{id:'bank',label:'بنك الامتحانات'},{id:'qbank',label:'ملخص بنك الأسئلة'},{id:'results',label:'نتائج الطلاب'},{id:'prompt',label:'Prompt التحويل'}]} />{tab==='upload' ? <div className="grid gap-6 xl:grid-cols-[1.1fr,1fr]"><Card className="p-5 space-y-4"><div className="grid md:grid-cols-2 gap-4"><Select label="المادة" value={subjectCode} onChange={e=>setSubjectCode(e.target.value)}>{CURRICULUM.subjects.map(s => <option key={s.code} value={s.code}>{s.nameAr}</option>)}</Select><Select label="الفصل" value={semester} onChange={e=>setSemester(Number(e.target.value))}><option value="1">الفصل الأول</option><option value="2">الفصل الثاني</option></Select><Select label="الوحدة" value={unitTitleAr} onChange={e=>setUnitTitleAr(e.target.value)}><option value="">بدون وحدة</option>{units.map(u => <option key={u.unitKey} value={u.titleAr}>{u.titleAr}</option>)}</Select><Input label="الموضوع الفرعي" value={subunitTitleAr} onChange={e=>setSubunitTitleAr(e.target.value)} /></div><div className="grid md:grid-cols-3 gap-4"><Input label="عنوان الامتحان" value={title} onChange={e=>setTitle(e.target.value)} /><Input label="الوقت بالدقائق" type="number" value={duration} onChange={e=>setDuration(e.target.value)} /><div className="rounded-2xl border border-slate-300 p-4 dark:border-slate-700"><label className="flex items-center gap-2"><input type="checkbox" checked={allowStudentTimeControl} onChange={e=>setAllowStudentTimeControl(e.target.checked)} /><span className="font-bold">السماح للطالب بتغيير الوقت</span></label><label className="mt-3 flex items-center gap-2"><input type="checkbox" checked={isComprehensive} onChange={e=>setIsComprehensive(e.target.checked)} /><span className="font-bold">بنك شامل لكل المادة</span></label></div></div><TextArea label="JSON الامتحان" rows={20} value={jsonText} onChange={e=>setJsonText(e.target.value)} hint="ألصق JSON الخام الناتج من الـ prompt. بدون علامات اقتباس خارجية وبدون markdown." /><div className="grid md:grid-cols-2 gap-4"><label className="block rounded-2xl border border-dashed border-slate-300 p-4 dark:border-slate-700"><div className="font-bold">استيراد JSON</div><div className="mt-2 text-sm text-slate-500">اختر ملف JSON لملء الحقل تلقائيًا.</div><input type="file" accept=".json,application/json" className="mt-3 block w-full text-sm" onChange={e => e.target.files?.[0] && parseImportedFile(e.target.files[0])} /></label><label className="block rounded-2xl border border-dashed border-slate-300 p-4 dark:border-slate-700"><div className="font-bold">رفع PDF المصدر</div><div className="mt-2 text-sm text-slate-500">سيبقى الرفع بنفس الطريقة المباشرة، بدون chunked upload.</div><input type="file" accept="application/pdf" className="mt-3 block w-full text-sm" onChange={e => setPdfFile(e.target.files?.[0] || null)} /><div className="mt-2 text-xs text-slate-500">{pdfFile ? pdfFile.name : 'لم يتم اختيار PDF بعد'}</div></label></div><div className="flex flex-wrap gap-3"><Button variant="brand" onClick={uploadExam} disabled={busy}>{busy ? 'جارٍ الرفع...' : 'رفع JSON + PDF'}</Button><Button variant="outline" onClick={rebuildBank} disabled={busy}>إعادة بناء بنك الأسئلة</Button></div></Card><Card className="p-5"><div className="text-xl font-black">مهم جدًا</div><div className="mt-4 space-y-3 text-sm leading-8 text-slate-600 dark:text-slate-300"><p>1) ارفع JSON الناتج من الـ prompt نفسه.</p><p>2) ارفع PDF المصدر في نفس العملية.</p><p>3) إذا كان السؤال مرتبطًا بصورة أو جدول أو رسم داخل PDF، ضع فقط <code>pdfPageRef</code> في السؤال.</p><p>4) عند فتح الامتحان سيعرض النظام الصفحة نفسها من PDF بجانب السؤال.</p><p>5) إذا رفعت امتحانات قديمة ولم تظهر في البنك، استخدم زر <strong>إعادة بناء بنك الأسئلة</strong>.</p></div></Card></div> : null}{tab==='bank' ? <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">{exams.map(exam => <Card key={exam.id} className="p-5"><div className="text-xl font-black">{exam.title}</div><div className="mt-2 text-sm text-slate-500">{exam.subjectAr} {exam.unitTitleAr ? `- ${exam.unitTitleAr}` : ''}</div><div className="mt-4 grid grid-cols-3 gap-2 text-center text-sm"><div className="rounded-2xl bg-slate-100 p-3 dark:bg-slate-800"><div className="text-slate-500">MCQ</div><div className="font-black">{exam.questionCount}</div></div><div className="rounded-2xl bg-slate-100 p-3 dark:bg-slate-800"><div className="text-slate-500">دقائق</div><div className="font-black">{secondsToMinutes(exam.duration)}</div></div><div className="rounded-2xl bg-slate-100 p-3 dark:bg-slate-800"><div className="text-slate-500">الوقت</div><div className="font-black">{exam.settings?.allowStudentTimeControl ? 'مرن' : 'مقفل'}</div></div></div><div className="mt-4 space-y-3"><label className="flex items-center gap-2 text-sm"><input type="checkbox" checked={!!exam.settings?.allowStudentTimeControl} onChange={e => updateExamSettings(exam.id, { duration: exam.duration, allowStudentTimeControl: e.target.checked })} /> السماح للطالب بتغيير الوقت</label><Input label="تعديل الوقت بالدقائق" type="number" value={secondsToMinutes(exam.duration)} onChange={e => updateExamSettings(exam.id, { duration: minutesToSeconds(e.target.value), allowStudentTimeControl: !!exam.settings?.allowStudentTimeControl })} /><Button variant="danger" className="w-full" onClick={() => deleteExam(exam.id)} disabled={busy}>حذف الامتحان</Button></div></Card>)}</div> : null}{tab==='qbank' ? <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4"><Card className="p-5"><div className="text-sm text-slate-500">إجمالي الأسئلة</div><div className="mt-2 text-4xl font-black">{data.questionBankSummary.totalQuestions}</div></Card>{CURRICULUM.subjects.map(subject => <Card key={subject.code} className="p-5"><div className="text-sm text-slate-500">{subject.nameAr}</div><div className="mt-2 text-4xl font-black">{data.questionBankSummary.bySubject?.[subject.code] || 0}</div></Card>)}</div> : null}{tab==='results' ? <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">{adminResults.map(res => <Card key={res.id} className="p-5"><div className="text-sm font-bold text-brand-600 dark:text-brand-300">{res.subjectAr}</div><div className="mt-1 text-xl font-black">{res.examTitle}</div><div className="mt-2 text-sm text-slate-500">{res.userName} • {formatDate(res.createdAt)}</div><div className="mt-4 grid grid-cols-3 gap-2 text-center text-sm"><div className="rounded-2xl bg-slate-100 p-3 dark:bg-slate-800"><div className="text-slate-500">النتيجة</div><div className="font-black">{res.score}%</div></div><div className="rounded-2xl bg-slate-100 p-3 dark:bg-slate-800"><div className="text-slate-500">الصحيح</div><div className="font-black">{res.correctCount}</div></div><div className="rounded-2xl bg-slate-100 p-3 dark:bg-slate-800"><div className="text-slate-500">الخطأ</div><div className="font-black">{res.wrongCount}</div></div></div></Card>)}</div> : null}{tab==='prompt' ? <Card className="p-5"><TextArea label="Prompt التحويل" rows={28} value={STRICT_JSON_PROMPT} readOnly /></Card> : null}</div></Modal>;
}

function App(){
  const [user, setUser] = useState(loadLocal(CONFIG.STORAGE_KEYS.user));
  const [darkMode, setDarkMode] = useState(loadLocal(CONFIG.STORAGE_KEYS.darkMode, false));
  const [loading, setLoading] = useState(false);
  const [dashboard, setDashboard] = useState({ exams: [], results: [], analytics: { overallMastery:0, subjectMastery:[], unitMastery:[], weaknesses:[] }, questionBankSummary: { totalQuestions:0, bySubject:{}, unitRows:[] }, subjectStats: {}, customLoading: false });
  const [adminOpen, setAdminOpen] = useState(false);
  const [screen, setScreen] = useState('home');
  const [selectedSubjectCode, setSelectedSubjectCode] = useState('');
  const [activeExam, setActiveExam] = useState(null);
  const [activeReview, setActiveReview] = useState(null);
  const toast = useToast();

  useEffect(() => { document.documentElement.classList.toggle('dark', !!darkMode); saveLocal(CONFIG.STORAGE_KEYS.darkMode, darkMode); }, [darkMode]);
  useEffect(() => { if(user) saveLocal(CONFIG.STORAGE_KEYS.user, user); }, [user]);
  useEffect(() => { if(user) refresh(); }, [user]);

  async function refresh(){
    if(!user) return;
    try {
      setLoading(true);
      const res = await api('bootstrapData', { userId: user.id });
      const subjectStats = {};
      CURRICULUM.subjects.forEach(subject => {
        const exams = (res.exams || []).filter(x => x.subjectCode === subject.code);
        const questionCount = Number(res.questionBankSummary?.bySubject?.[subject.code] || 0);
        const mastery = Number((res.analytics.subjectMastery || []).find(x => x.subjectCode === subject.code)?.mastery || 0);
        subjectStats[subject.code] = { unitCount: getUnits(subject.code).length, examCount: exams.length, questionCount, mastery };
      });
      setDashboard({ ...res, subjectStats, customLoading:false });
    } catch(err){ toast.show('تعذر تحميل البيانات: ' + err.message, 'error'); } finally { setLoading(false); }
  }

  async function startExam(examSummary){
    try {
      setLoading(true);
      const res = await api('getExam', { examId: examSummary.id, includePdf: true });
      setActiveReview(null);
      setActiveExam(res.exam);
      setScreen('exam');
    } catch(err){ toast.show('تعذر تحميل الامتحان: ' + err.message, 'error'); } finally { setLoading(false); }
  }

  async function buildCustomExam(payload){
    try {
      setDashboard(prev => ({ ...prev, customLoading:true }));
      const res = await api('generateCustomExam', payload);
      setActiveReview(null);
      setActiveExam(res.exam);
      setScreen('exam');
      toast.show('تم تجهيز الامتحان المخصص');
    } catch(err){ toast.show('تعذر تكوين الامتحان: ' + err.message, 'error'); }
    finally { setDashboard(prev => ({ ...prev, customLoading:false })); }
  }

  async function submitExam(payload){
    try {
      setLoading(true);
      const save = await api('submitResult', payload);
      toast.show('تم حفظ المحاولة ويمكنك مراجعتها في أي وقت');
      await refresh();
      const review = await api('getAttemptReview', { attemptId: save.attemptId });
      setActiveReview(review.attempt);
      setActiveExam(null);
      setScreen('review');
    } catch(err){ toast.show('تعذر حفظ النتيجة: ' + err.message, 'error'); }
    finally { setLoading(false); }
  }

  async function openReview(attemptSummary){
    try {
      setLoading(true);
      const res = await api('getAttemptReview', { attemptId: attemptSummary.id || attemptSummary.attemptId });
      setActiveExam(null);
      setActiveReview(res.attempt);
      setScreen('review');
    } catch(err){ toast.show('تعذر تحميل المراجعة: ' + err.message, 'error'); } finally { setLoading(false); }
  }

  async function redoWrong(attemptSummary){
    try {
      setLoading(true);
      const res = await api('generateRedoExam', { attemptId: attemptSummary.id || attemptSummary.attemptId });
      setActiveReview(null);
      setActiveExam(res.exam);
      setScreen('exam');
      toast.show('تم تجهيز إعادة الأسئلة الخاطئة');
    } catch(err){ toast.show('تعذر تجهيز إعادة الأخطاء: ' + err.message, 'error'); } finally { setLoading(false); }
  }

  function goHome(){ setScreen('home'); setActiveExam(null); setActiveReview(null); }
  function openSubject(code){ setSelectedSubjectCode(code); setScreen('subject'); }
  function logout(){ localStorage.removeItem(CONFIG.STORAGE_KEYS.user); setUser(null); setScreen('home'); setActiveExam(null); setActiveReview(null); }

  const title = screen==='subject' ? (getSubject(selectedSubjectCode)?.nameAr || CONFIG.APP_NAME) : screen==='exam' ? (activeExam?.title || 'الامتحان') : screen==='review' ? 'مراجعة المحاولة' : CONFIG.APP_NAME;
  const subtitle = screen==='home' ? `${CURRICULUM.gradeAr} - ${CURRICULUM.trackAr}` : screen==='subject' ? 'الصف الثاني عشر - المسار الأكاديمي' : '';

  if(!user) return <><LoginScreen onLogin={setUser} /><Toast toast={toast.toast} onClose={toast.clear} /></>;

  return <div className="min-h-screen"><TopBar user={user} darkMode={darkMode} onToggleDark={() => setDarkMode(v => !v)} onOpenAdmin={() => setAdminOpen(true)} onLogout={logout} onGoHome={goHome} title={title} subtitle={subtitle} /><main className="mx-auto max-w-7xl space-y-6 px-3 py-5 sm:px-5">{loading ? <Card className="p-6 text-center font-black">جارٍ التحميل...</Card> : null}{screen==='home' ? <HomeScreen data={dashboard} onOpenSubject={openSubject} /> : null}{screen==='subject' ? <SubjectScreen subjectCode={selectedSubjectCode} data={dashboard} onBack={goHome} onStartExam={startExam} onOpenReview={openReview} onGenerateRedo={redoWrong} onBuildCustomExam={buildCustomExam} /> : null}{screen==='exam' && activeExam ? <ExamScreen exam={activeExam} user={user} onSubmit={submitExam} onBack={() => setScreen(selectedSubjectCode ? 'subject' : 'home')} /> : null}{screen==='review' && activeReview ? <ReviewScreen attempt={activeReview} onBack={() => setScreen(selectedSubjectCode ? 'subject' : 'home')} onRedo={redoWrong} onRetake={startExam} /> : null}</main>{adminOpen ? <AdminModal data={dashboard} toast={toast} onClose={() => setAdminOpen(false)} onRefresh={refresh} /> : null}<Toast toast={toast.toast} onClose={toast.clear} /></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
