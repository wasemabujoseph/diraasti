<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>دراستي</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef7ff',
              100: '#d9ecff',
              200: '#baddff',
              300: '#8bc8ff',
              400: '#54a9ff',
              500: '#2e88ff',
              600: '#176af5',
              700: '#1556e1',
              800: '#1847b6',
              900: '#193d8f'
            }
          },
          boxShadow: {
            glow: '0 20px 60px rgba(23, 106, 245, 0.18)',
            soft: '0 10px 30px rgba(15, 23, 42, 0.08)'
          },
          backgroundImage: {
            grid: 'radial-gradient(circle at 1px 1px, rgba(148,163,184,0.14) 1px, transparent 0)'
          }
        }
      }
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <style>
    :root { color-scheme: light dark; }
    body { font-family: Tahoma, Arial, sans-serif; }
    .bg-grid { background-size: 26px 26px; }
    .safe-pb { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
    .hide-scrollbar::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const CONFIG = {
      APP_NAME: 'دراستي',
      APP_TAGLINE: 'منصة محاكاة امتحانات التوجيهي وإدارة النتائج',
      API_BASE: 'https://script.google.com/macros/s/AKfycbws_n38R3rfGgCLJyaGo63hUHiegtLXW8xEdRZz-VzmriY3C2ElCJygpr8cLWzZn-ctCg/exec',
      ADMIN_PASSWORD: 'admin',
      STORAGE_KEYS: {
        user: 'derasti_user_v2',
        theme: 'derasti_theme_v2'
      }
    };

    const SAMPLE_EXAM = {
      subject: 'كيمياء - نموذج 1',
      duration: 7200,
      questions: [
        {
          id: 1,
          text: 'ما قيمة $pH$ لمحلول متعادل؟',
          options: ['5', '6', '7', '8'],
          correctIndex: 2,
          explanation: 'المحلول المتعادل عند 25°C يكون $pH = 7$.'
        },
        {
          id: 2,
          text: 'الصيغة الكيميائية للماء هي:',
          options: ['$H_2O$', '$CO_2$', '$NaCl$', '$O_2$'],
          correctIndex: 0,
          explanation: 'الماء يتكون من ذرتي هيدروجين وذرة أكسجين.'
        }
      ],
      openQuestions: [
        {
          id: 'oq1',
          prompt: 'اشرح آلية تكوّن الرابطة التساهمية.',
          idealAnswer: 'تنشأ الرابطة التساهمية من تشارك الذرات بأزواج إلكترونية لتحقيق الاستقرار.',
          explanation: 'يُراعى تعريف الرابطة وذكر مفهوم مشاركة الإلكترونات والاستقرار.'
        }
      ]
    };

    function cls(...items) {
      return items.filter(Boolean).join(' ');
    }

    function saveLocal(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function loadLocal(key, fallback = null) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function formatDate(value) {
      try {
        return new Date(value).toLocaleString('ar-JO');
      } catch {
        return value || '-';
      }
    }

    function formatDuration(seconds) {
      const mins = Math.round((Number(seconds || 0) / 60));
      if (mins < 60) return `${mins} دقيقة`;
      const hours = Math.floor(mins / 60);
      const rem = mins % 60;
      return rem ? `${hours} س ${rem} د` : `${hours} ساعة`;
    }

    async function api(action, payload = {}) {
      if (!CONFIG.API_BASE || CONFIG.API_BASE.includes('https://script.google.com/macros/s/AKfycbws_n38R3rfGgCLJyaGo63hUHiegtLXW8xEdRZz-VzmriY3C2ElCJygpr8cLWzZn-ctCg/exec')) {
        throw new Error('ضع رابط Google Apps Script Web App داخل CONFIG.API_BASE أولاً.');
      }

      const res = await fetch(CONFIG.API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...payload })
      });

      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'فشل الاتصال بالخادم');
      return data;
    }

    function useToast() {
      const [toast, setToast] = useState(null);
      useEffect(() => {
        if (!toast) return;
        const timer = setTimeout(() => setToast(null), 3500);
        return () => clearTimeout(timer);
      }, [toast]);
      return { toast, setToast };
    }

    function Toast({ toast }) {
      if (!toast) return null;
      const tone = toast.type === 'error'
        ? 'border-red-200 bg-red-50 text-red-700 dark:border-red-900/40 dark:bg-red-950/40 dark:text-red-300'
        : toast.type === 'success'
          ? 'border-emerald-200 bg-emerald-50 text-emerald-700 dark:border-emerald-900/40 dark:bg-emerald-950/40 dark:text-emerald-300'
          : 'border-brand-200 bg-brand-50 text-brand-700 dark:border-brand-900/40 dark:bg-brand-950/40 dark:text-brand-300';
      return (
        <div className="fixed inset-x-0 bottom-4 z-[80] px-4">
          <div className={cls('mx-auto max-w-md rounded-2xl border px-4 py-3 shadow-glow backdrop-blur', tone)}>
            <div className="font-bold">{toast.title}</div>
            {toast.message ? <div className="mt-1 text-sm">{toast.message}</div> : null}
          </div>
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={cls(
          'rounded-3xl border border-slate-200/80 bg-white/90 shadow-soft backdrop-blur',
          'dark:border-slate-800 dark:bg-slate-900/85',
          className
        )}>
          {children}
        </div>
      );
    }

    function SectionTitle({ title, subtitle, action }) {
      return (
        <div className="mb-4 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h2 className="text-xl font-black text-slate-900 dark:text-white">{title}</h2>
            {subtitle ? <p className="mt-1 text-sm text-slate-500 dark:text-slate-400">{subtitle}</p> : null}
          </div>
          {action}
        </div>
      );
    }

    function Button({ variant = 'primary', className = '', children, ...props }) {
      const variants = {
        primary: 'bg-slate-900 text-white hover:bg-slate-800 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-100',
        brand: 'bg-brand-600 text-white hover:bg-brand-700 shadow-glow',
        ghost: 'border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800',
        danger: 'bg-red-600 text-white hover:bg-red-700'
      };
      return (
        <button
          {...props}
          className={cls(
            'rounded-2xl px-4 py-3 font-bold transition active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-60',
            variants[variant],
            className
          )}
        >
          {children}
        </button>
      );
    }

    function Input({ className = '', ...props }) {
      return (
        <input
          {...props}
          className={cls(
            'w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-brand-400 focus:ring-4 focus:ring-brand-100',
            'dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100 dark:focus:border-brand-600 dark:focus:ring-brand-950',
            className
          )}
        />
      );
    }

    function TextArea({ className = '', ...props }) {
      return (
        <textarea
          {...props}
          className={cls(
            'w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-brand-400 focus:ring-4 focus:ring-brand-100',
            'dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100 dark:focus:border-brand-600 dark:focus:ring-brand-950',
            className
          )}
        />
      );
    }

    function Badge({ children, tone = 'default' }) {
      const tones = {
        default: 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300',
        brand: 'bg-brand-50 text-brand-700 dark:bg-brand-950/50 dark:text-brand-300',
        green: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-300',
        red: 'bg-red-50 text-red-700 dark:bg-red-950/40 dark:text-red-300'
      };
      return <span className={cls('inline-flex rounded-full px-3 py-1 text-xs font-bold', tones[tone])}>{children}</span>;
    }

    function Modal({ children, onClose }) {
      useEffect(() => {
        function onKey(e) {
          if (e.key === 'Escape') onClose?.();
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4 backdrop-blur-sm" onClick={onClose}>
          <div className="w-full max-w-5xl" onClick={e => e.stopPropagation()}>{children}</div>
        </div>
      );
    }

    function RichText({ text }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.renderMathInElement) {
          window.renderMathInElement(ref.current, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false }
            ],
            throwOnError: false
          });
        }
      }, [text]);
      return <div ref={ref} className="whitespace-pre-wrap leading-8">{text}</div>;
    }

    function LoginScreen({ onLogin }) {
      const [name, setName] = useState('');
      return (
        <div className="relative min-h-screen overflow-hidden bg-grid bg-grid p-4">
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(46,136,255,0.12),transparent_35%),radial-gradient(circle_at_bottom,rgba(15,23,42,0.08),transparent_35%)] dark:bg-[radial-gradient(circle_at_top,rgba(46,136,255,0.18),transparent_30%),radial-gradient(circle_at_bottom,rgba(96,165,250,0.08),transparent_35%)]"></div>
          <div className="relative mx-auto flex min-h-screen max-w-6xl items-center">
            <div className="grid w-full gap-6 lg:grid-cols-[1.2fr_0.85fr]">
              <div className="hidden lg:flex">
                <Card className="w-full overflow-hidden p-8">
                  <Badge tone="brand">جاهز للربط مع Google Sheets وGoogle Drive</Badge>
                  <h1 className="mt-5 text-4xl font-black leading-tight text-slate-900 dark:text-white">دراستي</h1>
                  <p className="mt-4 max-w-2xl text-lg leading-8 text-slate-600 dark:text-slate-300">
                    واجهة عربية حديثة لمحاكاة امتحانات التوجيهي، تصحيح فوري، أسئلة مقالية، نتائج مفصلة، ولوحة إدارة احترافية.
                  </p>
                  <div className="mt-8 grid gap-4 sm:grid-cols-3">
                    <Card className="p-4">
                      <div className="text-2xl">📱</div>
                      <div className="mt-2 font-bold">متجاوب بالكامل</div>
                      <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">Android, iPhone, iPad, PC</div>
                    </Card>
                    <Card className="p-4">
                      <div className="text-2xl">🧠</div>
                      <div className="mt-2 font-bold">دعم المعادلات</div>
                      <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">KaTeX للأسئلة العلمية</div>
                    </Card>
                    <Card className="p-4">
                      <div className="text-2xl">📊</div>
                      <div className="mt-2 font-bold">نتائج منظمة</div>
                      <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">حفظ النتائج ونقاط الضعف</div>
                    </Card>
                  </div>
                </Card>
              </div>

              <Card className="p-6 sm:p-8">
                <div className="mx-auto max-w-md">
                  <Badge tone="brand">الإصدار الجاهز للتشغيل</Badge>
                  <h2 className="mt-4 text-3xl font-black text-slate-900 dark:text-white">ابدأ الآن</h2>
                  <p className="mt-2 text-sm leading-7 text-slate-500 dark:text-slate-400">
                    أدخل اسم الطالب للبدء. النظام سيحفظ دخولك محليًا على الجهاز لتجربة أسرع لاحقًا.
                  </p>

                  <div className="mt-8 space-y-4">
                    <div>
                      <label className="mb-2 block text-sm font-bold text-slate-700 dark:text-slate-300">الاسم الكامل</label>
                      <Input
                        placeholder="مثال: أحمد خالد"
                        value={name}
                        onChange={e => setName(e.target.value)}
                        onKeyDown={e => {
                          if (e.key === 'Enter') {
                            const clean = name.trim();
                            if (!clean) return;
                            onLogin({ id: clean.replace(/\s+/g, '_'), name: clean });
                          }
                        }}
                      />
                    </div>
                    <Button
                      variant="brand"
                      className="w-full"
                      onClick={() => {
                        const clean = name.trim();
                        if (!clean) return alert('أدخل الاسم أولاً');
                        onLogin({ id: clean.replace(/\s+/g, '_'), name: clean });
                      }}
                    >
                      دخول إلى دراستي
                    </Button>
                  </div>

                  <div className="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm leading-7 text-slate-600 dark:border-slate-800 dark:bg-slate-950/60 dark:text-slate-300">
                    <div className="font-bold text-slate-800 dark:text-white">مهم قبل التشغيل الحقيقي</div>
                    بدّل رابط <span className="font-mono">API_BASE</span> داخل الملف برابط Google Apps Script Web App.
                  </div>
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    }

    function TopBar({ user, darkMode, setDarkMode, onOpenAdmin, onLogout, onlineState }) {
      return (
        <div className="sticky top-0 z-30 border-b border-slate-200/80 bg-white/75 backdrop-blur-xl dark:border-slate-800 dark:bg-slate-950/75">
          <div className="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3">
            <div className="flex min-w-0 items-center gap-3">
              <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-500 to-slate-900 text-lg font-black text-white shadow-glow dark:from-brand-500 dark:to-brand-800">
                د
              </div>
              <div className="min-w-0">
                <div className="truncate text-lg font-black text-slate-900 dark:text-white">{CONFIG.APP_NAME}</div>
                <div className="flex flex-wrap items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
                  <span>{user.name}</span>
                  <span>•</span>
                  <span>{onlineState}</span>
                </div>
              </div>
            </div>

            <div className="flex items-center gap-2">
              <Button variant="ghost" className="px-3 py-2" onClick={() => setDarkMode(!darkMode)}>{darkMode ? '☀️' : '🌙'}</Button>
              <Button variant="ghost" className="hidden sm:inline-flex px-3 py-2" onClick={onOpenAdmin}>الإدارة</Button>
              <Button variant="danger" className="px-3 py-2" onClick={onLogout}>خروج</Button>
            </div>
          </div>
        </div>
      );
    }

    function StatsCards({ exams, stats, latestResult }) {
      const items = [
        { label: 'الامتحانات المتاحة', value: exams.length, hint: 'جاهزة للبدء الآن', tone: 'brand' },
        { label: 'المعدل العام', value: stats.avgScore != null ? `${stats.avgScore}%` : '-', hint: 'من جميع النتائج', tone: 'green' },
        { label: 'الامتحانات المنجزة', value: stats.completed, hint: 'تم حفظها في Google Sheets', tone: 'default' },
        { label: 'آخر نتيجة', value: latestResult ? `${latestResult.score}%` : '-', hint: latestResult ? latestResult.subject : 'لا يوجد بعد', tone: latestResult && Number(latestResult.score) < 50 ? 'red' : 'brand' }
      ];
      return (
        <div className="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
          {items.map((item, i) => (
            <Card key={i} className="p-5">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <div className="text-sm text-slate-500 dark:text-slate-400">{item.label}</div>
                  <div className="mt-3 text-3xl font-black text-slate-900 dark:text-white">{item.value}</div>
                </div>
                <Badge tone={item.tone === 'green' ? 'green' : item.tone === 'red' ? 'red' : 'brand'}>{item.hint}</Badge>
              </div>
            </Card>
          ))}
        </div>
      );
    }

    function ExamCard({ exam, onStart }) {
      const mcqCount = (exam.questions || []).length;
      const openCount = (exam.openQuestions || []).length;
      return (
        <Card className="group overflow-hidden p-5 transition hover:-translate-y-1 hover:shadow-glow">
          <div className="flex items-start justify-between gap-3">
            <div>
              <Badge tone="brand">امتحان</Badge>
              <h3 className="mt-3 text-lg font-black text-slate-900 dark:text-white">{exam.subject}</h3>
              <p className="mt-2 text-sm leading-7 text-slate-500 dark:text-slate-400">
                امتحان جاهز بمحاكاة مريحة للطالب مع تصحيح فوري وعرض واضح للأسئلة والإجابات.
              </p>
            </div>
            <div className="rounded-2xl bg-slate-100 px-3 py-2 text-sm font-bold text-slate-700 dark:bg-slate-800 dark:text-slate-300">
              {formatDuration(exam.duration || 3600)}
            </div>
          </div>
          <div className="mt-5 grid grid-cols-3 gap-3 text-center">
            <div className="rounded-2xl bg-slate-50 p-3 dark:bg-slate-950/50">
              <div className="text-lg font-black">{mcqCount}</div>
              <div className="text-xs text-slate-500 dark:text-slate-400">اختياري</div>
            </div>
            <div className="rounded-2xl bg-slate-50 p-3 dark:bg-slate-950/50">
              <div className="text-lg font-black">{openCount}</div>
              <div className="text-xs text-slate-500 dark:text-slate-400">مقالي</div>
            </div>
            <div className="rounded-2xl bg-slate-50 p-3 dark:bg-slate-950/50">
              <div className="text-lg font-black">{mcqCount + openCount}</div>
              <div className="text-xs text-slate-500 dark:text-slate-400">المجموع</div>
            </div>
          </div>
          <Button variant="brand" className="mt-5 w-full" onClick={() => onStart(exam.id)}>ابدأ الامتحان</Button>
        </Card>
      );
    }

    function ResultsTable({ results }) {
      if (!results.length) {
        return <div className="text-sm text-slate-500 dark:text-slate-400">لا توجد نتائج محفوظة بعد.</div>;
      }
      return (
        <div className="overflow-hidden rounded-2xl border border-slate-200 dark:border-slate-800">
          <div className="overflow-x-auto">
            <table className="min-w-full text-sm">
              <thead className="bg-slate-50 dark:bg-slate-950/60">
                <tr className="text-right text-slate-500 dark:text-slate-400">
                  <th className="px-4 py-3 font-bold">المادة</th>
                  <th className="px-4 py-3 font-bold">العلامة</th>
                  <th className="px-4 py-3 font-bold">التاريخ</th>
                </tr>
              </thead>
              <tbody>
                {results.slice(0, 8).map((r, i) => (
                  <tr key={i} className="border-t border-slate-200 dark:border-slate-800">
                    <td className="px-4 py-3 font-semibold text-slate-900 dark:text-white">{r.subject}</td>
                    <td className="px-4 py-3">{r.score}%</td>
                    <td className="px-4 py-3 text-slate-500 dark:text-slate-400">{formatDate(r.createdAt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function WrongQuestionsPanel({ wrongQuestions }) {
      if (!wrongQuestions.length) {
        return (
          <Card className="p-5">
            <SectionTitle title="نقاط الضعف" subtitle="سيتم جمع الأسئلة التي أخطأت بها لتراجعها لاحقًا." />
            <div className="rounded-2xl border border-dashed border-slate-300 p-6 text-sm text-slate-500 dark:border-slate-700 dark:text-slate-400">
              لا توجد أخطاء محفوظة بعد. بعد أول امتحان ستظهر هنا الأسئلة التي تحتاج مراجعة.
            </div>
          </Card>
        );
      }
      return (
        <Card className="p-5">
          <SectionTitle title="نقاط الضعف" subtitle="آخر 10 أسئلة خاطئة لمساعدتك في التركيز على مواطن التحسن." />
          <div className="space-y-3">
            {wrongQuestions.slice(0, 10).map((item, idx) => (
              <div key={idx} className="rounded-2xl border border-slate-200 p-4 dark:border-slate-800">
                <div className="mb-2 flex flex-wrap items-center gap-2">
                  <Badge tone="red">مراجعة</Badge>
                  <span className="text-xs text-slate-500 dark:text-slate-400">{item.subject}</span>
                </div>
                <div className="font-bold text-slate-900 dark:text-white">{item.questionText}</div>
                <div className="mt-3 text-sm text-red-600 dark:text-red-400">إجابتك: {item.userAnswerText || 'لم تجب'}</div>

    function ExamScreen({ exam, user, onFinish, onExit, notify }) {
      const mcq = exam.questions || [];
      const openQuestions = exam.openQuestions || [];
      const totalSeconds = Number(exam.duration || 3600);
      const [timeLeft, setTimeLeft] = useState(totalSeconds);
      const [answers, setAnswers] = useState({});
      const [openAnswers, setOpenAnswers] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const [result, setResult] = useState(null);

      useEffect(() => {
        if (result) return;
        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timer);
              handleSubmit(true);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [result]);

      function setMcqAnswer(questionId, index) {
        setAnswers(prev => ({ ...prev, [questionId]: index }));
      }

      function setEssayAnswer(questionId, value) {
        setOpenAnswers(prev => ({ ...prev, [questionId]: value }));
      }

      async function handleSubmit(auto = false) {
        if (submitting || result) return;
        setSubmitting(true);
        try {
          let correct = 0;
          const wrongItems = [];

          mcq.forEach(q => {
            const userIndex = answers[q.id];
            if (userIndex === q.correctIndex) {
              correct += 1;
            } else {
              wrongItems.push({
                questionId: q.id,
                questionText: q.text,
                userAnswerIndex: userIndex ?? null,
                userAnswerText: userIndex != null ? q.options[userIndex] : '',
                correctIndex: q.correctIndex,
                correctAnswerText: q.options[q.correctIndex] || '',
                explanation: q.explanation || '',
                subject: exam.subject
              });
            }
          });

          const score = mcq.length ? Math.round((correct / mcq.length) * 100) : 100;
          const payload = {
            userId: user.id,
            userName: user.name,
            examId: exam.id,
            subject: exam.subject,
            score,
            answers,
            openAnswers,
            wrongItems
          };

          await onFinish(payload);
          setResult({ score, wrongItems, openAnswers });
          if (auto) notify({ type: 'info', title: 'انتهى الوقت', message: 'تم تسليم الامتحان تلقائيًا.' });
        } catch (error) {
          notify({ type: 'error', title: 'تعذر تسليم الامتحان', message: error.message });
        } finally {
          setSubmitting(false);
        }
      }

      const minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
      const seconds = String(timeLeft % 60).padStart(2, '0');
      const answeredMcq = Object.keys(answers).length;
      const answeredOpen = Object.values(openAnswers).filter(Boolean).length;

      if (result) {
        return (
          <div className="mx-auto max-w-5xl space-y-6 px-4 py-6 safe-pb">
            <Card className="overflow-hidden bg-gradient-to-br from-brand-600 via-brand-700 to-slate-900 p-6 text-white shadow-glow">
              <Badge tone="green">تم التسليم بنجاح</Badge>
              <h1 className="mt-4 text-3xl font-black">{exam.subject}</h1>
              <div className="mt-4 text-6xl font-black">{result.score}%</div>
              <p className="mt-3 text-sm text-white/85">تم حفظ النتيجة وهي جاهزة للمراجعة داخل لوحة الطالب ولوحة الإدارة.</p>
            </Card>

            <Card className="p-5">
              <SectionTitle title="تصحيح الأسئلة الخاطئة" subtitle="راجع إجاباتك والصحيح مع التفسير عند توفره." />
              {result.wrongItems.length === 0 ? (
                <div className="rounded-2xl bg-emerald-50 p-5 font-bold text-emerald-700 dark:bg-emerald-950/30 dark:text-emerald-300">ممتاز، لا توجد أخطاء في قسم الاختيار من متعدد.</div>
              ) : (
                <div className="space-y-4">
                  {result.wrongItems.map((item, idx) => (
                    <div key={idx} className="rounded-2xl border border-slate-200 p-4 dark:border-slate-800">
                      <div className="font-bold text-slate-900 dark:text-white"><RichText text={item.questionText} /></div>
                      <div className="mt-3 text-sm text-red-600 dark:text-red-400">إجابتك: {item.userAnswerText || 'لم تجب'}</div>
                      <div className="mt-1 text-sm text-emerald-600 dark:text-emerald-400">الصحيح: {item.correctAnswerText}</div>
                      {item.explanation ? <div className="mt-3 text-sm leading-7 text-slate-600 dark:text-slate-300">التفسير: {item.explanation}</div> : null}
                    </div>
                  ))}
                </div>
              )}
            </Card>

            {openQuestions.length ? (
              <Card className="p-5">
                <SectionTitle title="الأسئلة المقالية" subtitle="مراجعة إجابتك مع النموذج المقترح." />
                <div className="space-y-4">
                  {openQuestions.map((q) => (
                    <div key={q.id} className="rounded-2xl border border-slate-200 p-4 dark:border-slate-800">
                      <div className="font-bold text-slate-900 dark:text-white"><RichText text={q.prompt} /></div>
                      <div className="mt-4 text-sm font-bold text-slate-600 dark:text-slate-300">إجابتك</div>
                      <div className="mt-2 rounded-2xl bg-slate-50 p-4 whitespace-pre-wrap dark:bg-slate-950/60">{result.openAnswers[q.id] || 'لم تتم الإجابة'}</div>
                      <div className="mt-4 text-sm font-bold text-emerald-700 dark:text-emerald-400">الإجابة النموذجية</div>
                      <div className="mt-2 rounded-2xl bg-emerald-50 p-4 whitespace-pre-wrap dark:bg-emerald-950/30">{q.idealAnswer || '-'}</div>
                      {q.explanation ? <div className="mt-3 text-sm text-slate-600 dark:text-slate-300">{q.explanation}</div> : null}
                    </div>
                  ))}
                </div>
              </Card>
            ) : null}

            <Button variant="brand" onClick={onExit}>العودة إلى لوحة الطالب</Button>
          </div>
        );
      }

      return (
        <div className="mx-auto max-w-5xl space-y-6 px-4 py-6 safe-pb">
          <Card className="sticky top-[76px] z-20 border-brand-200 p-4 dark:border-brand-900/40">
            <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
              <div>
                <div className="text-sm text-slate-500 dark:text-slate-400">جاري تقديم الامتحان</div>
                <div className="mt-1 text-2xl font-black text-slate-900 dark:text-white">{exam.subject}</div>
                <div className="mt-2 flex flex-wrap gap-2 text-xs text-slate-500 dark:text-slate-400">
                  <Badge tone="brand">الوقت {minutes}:{seconds}</Badge>
                  <Badge tone="default">اختياري: {answeredMcq}/{mcq.length}</Badge>
                  <Badge tone="default">مقالي: {answeredOpen}/{openQuestions.length}</Badge>
                </div>
              </div>
              <div className="flex gap-2">
                <Button variant="ghost" onClick={onExit}>خروج من الامتحان</Button>
                <Button variant="brand" onClick={() => handleSubmit(false)} disabled={submitting}>{submitting ? 'جارٍ التسليم...' : 'تسليم الامتحان'}</Button>
              </div>
            </div>
          </Card>

          <Card className="p-5">
            <SectionTitle title="قسم الاختيار من متعدد" subtitle="اختر إجابة واحدة لكل سؤال." />
            <div className="space-y-6">
              {mcq.map((q, index) => (
                <div key={q.id} className="rounded-3xl border border-slate-200 p-5 dark:border-slate-800">
                  <div className="mb-4 flex items-start gap-3">
                    <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-brand-50 font-black text-brand-700 dark:bg-brand-950/40 dark:text-brand-300">{index + 1}</div>
                    <div className="min-w-0 flex-1 font-bold text-slate-900 dark:text-white"><RichText text={q.text} /></div>
                  </div>
                  <div className="grid gap-3">
                    {(q.options || []).map((option, i) => {
                      const active = answers[q.id] === i;
                      return (
                        <button
                          key={i}
                          className={cls(
                            'rounded-2xl border p-4 text-right transition',
                            active
                              ? 'border-brand-500 bg-brand-50 ring-4 ring-brand-100 dark:border-brand-500 dark:bg-brand-950/30 dark:ring-brand-950'
                              : 'border-slate-200 hover:border-brand-300 hover:bg-slate-50 dark:border-slate-800 dark:hover:border-brand-800 dark:hover:bg-slate-950/60'
                          )}
                          onClick={() => setMcqAnswer(q.id, i)}
                        >
                          {option}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </Card>

          {openQuestions.length ? (
            <Card className="p-5">
              <SectionTitle title="قسم الأسئلة المقالية" subtitle="اكتب إجاباتك بتفصيل واضح." />
              <div className="space-y-6">
                {openQuestions.map((q, index) => (
                  <div key={q.id} className="rounded-3xl border border-slate-200 p-5 dark:border-slate-800">
                    <div className="mb-4 flex items-start gap-3">
                      <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-slate-100 font-black text-slate-700 dark:bg-slate-800 dark:text-slate-200">{index + 1}</div>
                      <div className="min-w-0 flex-1 font-bold text-slate-900 dark:text-white"><RichText text={q.prompt} /></div>
                    </div>
                    <TextArea rows={8} placeholder="اكتب إجابتك هنا..." value={openAnswers[q.id] || ''} onChange={e => setEssayAnswer(q.id, e.target.value)} />
                  </div>
                ))}
              </div>
            </Card>
          ) : null}
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(loadLocal(CONFIG.STORAGE_KEYS.user, null));
      const [darkMode, setDarkMode] = useState(loadLocal(CONFIG.STORAGE_KEYS.theme, false));
      const [loading, setLoading] = useState(false);
      const [selectedExam, setSelectedExam] = useState(null);
      const [adminOpen, setAdminOpen] = useState(false);
      const [adminResults, setAdminResults] = useState([]);
      const [exams, setExams] = useState([]);
      const [results, setResults] = useState([]);
      const [wrongQuestions, setWrongQuestions] = useState([]);
      const [stats, setStats] = useState({ avgScore: null, completed: 0 });
      const { toast, setToast } = useToast();

      const apiReady = Boolean(CONFIG.API_BASE && !CONFIG.API_BASE.includes('PUT_YOUR_APPS_SCRIPT_WEBAPP_URL_HERE'));

      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        saveLocal(CONFIG.STORAGE_KEYS.theme, darkMode);
      }, [darkMode]);

      function notify(toastData) {
        setToast(toastData);
      }

      async function loadDashboardData(currentUser = user, silent = false) {
        if (!currentUser || !apiReady) return;
        try {
          if (!silent) setLoading(true);
          const [examRes, resultRes] = await Promise.all([
            api('listExams'),
            api('getUserResults', { userId: currentUser.id })
          ]);

          const examsList = examRes.exams || [];
          const userResults = (resultRes.results || []).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          const completed = userResults.length;
          const avgScore = completed ? Math.round(userResults.reduce((sum, item) => sum + Number(item.score || 0), 0) / completed) : null;
          const wrongs = [];
          userResults.forEach(r => {
            try {
              JSON.parse(r.wrongItemsJson || '[]').forEach(item => wrongs.push(item));
            } catch {}
          });

          setExams(examsList);
          setResults(userResults);
          setWrongQuestions(wrongs);
          setStats({ avgScore, completed });
        } catch (error) {
          notify({ type: 'error', title: 'تعذر تحميل البيانات', message: error.message });
        } finally {
          setLoading(false);
        }
      }

      async function loadAllResults() {
        if (!apiReady) return [];
        try {
          const adminRes = await api('listAllResults', { adminPassword: CONFIG.ADMIN_PASSWORD });
          return adminRes.results || [];
        } catch (error) {
          notify({ type: 'error', title: 'تعذر تحميل نتائج الإدارة', message: error.message });
          return [];
        }
      }

      useEffect(() => {
        if (user && apiReady) loadDashboardData(user);
      }, [user, apiReady]);

      function handleLogin(nextUser) {
        saveLocal(CONFIG.STORAGE_KEYS.user, nextUser);
        setUser(nextUser);
      }

      function logout() {
        localStorage.removeItem(CONFIG.STORAGE_KEYS.user);
        setUser(null);
        setSelectedExam(null);
      }

      async function startExam(examId) {
        try {
          setLoading(true);
          const res = await api('getExam', { examId });
          setSelectedExam(res.exam);
        } catch (error) {
          notify({ type: 'error', title: 'تعذر تحميل الامتحان', message: error.message });
        } finally {
          setLoading(false);
        }
      }

      async function finishExam(payload) {
        await api('submitResult', payload);
        await loadDashboardData(user, true);
      }

      async function openAdmin() {
        setAdminResults(await loadAllResults());
        setAdminOpen(true);
      }

      if (!user) {
        return <><LoginScreen onLogin={handleLogin} /><Toast toast={toast} /></>;
      }

      return (
        <div className="min-h-screen bg-grid bg-grid">
          <TopBar
            user={user}
            darkMode={darkMode}
            setDarkMode={setDarkMode}
            onOpenAdmin={openAdmin}
            onLogout={logout}
            onlineState={apiReady ? 'متصل وجاهز' : 'يحتاج الربط'}
          />

          {loading ? (
            <div className="mx-auto max-w-7xl px-4 py-8">
              <Card className="p-8 text-center text-slate-500 dark:text-slate-400">جارٍ التحميل...</Card>
            </div>
          ) : selectedExam ? (
            <ExamScreen
              exam={selectedExam}
              user={user}
              onFinish={finishExam}
              onExit={() => setSelectedExam(null)}
              notify={notify}
            />
          ) : (
            <Dashboard
              exams={exams}
              stats={stats}
              results={results}
              wrongQuestions={wrongQuestions}
              onStartExam={startExam}
              onRefresh={() => loadDashboardData(user)}
              apiReady={apiReady}
            />
          )}

          {adminOpen ? (
            <AdminModal
              results={adminResults}
              onClose={() => setAdminOpen(false)}
              onUploaded={async () => {
                await loadDashboardData(user, true);
                setAdminResults(await loadAllResults());
              }}
              notify={notify}
            />
          ) : null}

          {!apiReady ? (
            <div className="fixed inset-x-0 bottom-0 z-20 border-t border-amber-200 bg-amber-50/95 px-4 py-3 text-sm text-amber-800 backdrop-blur dark:border-amber-900/30 dark:bg-amber-950/85 dark:text-amber-200">
              <div className="mx-auto max-w-7xl">المشروع جاهز، ويتبقى فقط إضافة رابط Google Apps Script Web App داخل <span className="font-mono">CONFIG.API_BASE</span> ثم تشغيله.</div>
            </div>
          ) : null}

          <Toast toast={toast} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
