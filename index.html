function cls(...arr){ return arr.filter(Boolean).join(" "); }
function saveLocal(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function loadLocal(key, fallback=null){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback;}catch{return fallback;} }
function normalizeText(v=""){ return String(v).trim().toLowerCase(); }
function formatDate(ts){ try{return new Date(ts).toLocaleString("ar-JO");}catch{return ts || "-";} }
function formatMinutes(sec=0){ return Math.max(1, Math.round(sec/60)); }
function initials(name=""){ return name.split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase(); }
function getSubjectByCode(code){ return CURRICULUM.subjects.find(s => s.code === code); }
function getSemester(subjectCode, semester){ return getSubjectByCode(subjectCode)?.semesters?.find(s => Number(s.semester) === Number(semester)); }
function getUnits(subjectCode, semester){ return getSemester(subjectCode, semester)?.units || []; }
function getSubunits(subjectCode, semester, unitTitle){ return getUnits(subjectCode, semester).find(u => u.titleAr === unitTitle)?.subunits || []; }

async function api(action, payload = {}) {
  console.log("Runtime API_BASE:", CONFIG.API_BASE);

  const cleanApi = String(CONFIG.API_BASE || "").trim();

  if (!cleanApi) {
    throw new Error("CONFIG.API_BASE فارغ");
  }

  if (!cleanApi.startsWith("https://script.google.com/macros/s/")) {
    throw new Error("رابط Google Apps Script غير صالح");
  }

  const res = await fetch(cleanApi, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, ...payload })
  });

  if (!res.ok) {
    throw new Error("فشل الاتصال بالخادم");
  }

  let data;
  try {
    data = await res.json();
  } catch (err) {
    throw new Error("الخادم لم يرجع JSON صحيح");
  }

  if (!data.ok) {
    throw new Error(data.error || "API Error");
  }

  return data;
}

function useToast(){
  const [toast, setToast] = useState(null);
  useEffect(() => {
    if(!toast) return;
    const t = setTimeout(() => setToast(null), 3000);
    return () => clearTimeout(t);
  }, [toast]);
  return { toast, show:(message,type="success")=>setToast({message,type}), clear:()=>setToast(null) };
}

function Toast({toast, onClose}){
  if(!toast) return null;
  return (
    <div className="fixed bottom-4 left-4 right-4 md:right-6 md:left-auto md:w-[360px] z-[80]">
      <div className={cls("rounded-2xl border px-4 py-3 shadow-soft",
        toast.type==="error" ? "bg-red-50 border-red-200 text-red-700 dark:bg-red-950/40 dark:border-red-900 dark:text-red-200" :
        "bg-emerald-50 border-emerald-200 text-emerald-700 dark:bg-emerald-950/40 dark:border-emerald-900 dark:text-emerald-200")}>
        <div className="flex items-center justify-between gap-3">
          <div className="font-semibold text-sm">{toast.message}</div>
          <button className="opacity-70 hover:opacity-100" onClick={onClose}>✕</button>
        </div>
      </div>
    </div>
  );
}

function RichText({text}){
  const ref = useRef(null);
  useEffect(() => {
    if(ref.current && window.renderMathInElement){
      window.renderMathInElement(ref.current, {
        delimiters:[
          {left:"$$", right:"$$", display:true},
          {left:"$", right:"$", display:false}
        ],
        throwOnError:false
      });
    }
  }, [text]);
  return <div ref={ref} className="whitespace-pre-wrap leading-8">{text || ""}</div>;
}

function Modal({title, subtitle, onClose, children, maxWidth="max-w-6xl"}){
  useEffect(() => {
    const handler = (e) => e.key === "Escape" && onClose();
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [onClose]);

  return (
    <div className="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm p-4 overflow-auto">
      <div className={cls("mx-auto mt-6", maxWidth)}>
        <div className="rounded-[32px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-soft overflow-hidden">

            </div>

          </div>
          <div className="p-5">{children}</div>
        </div>
      </div>
    </div>
  );
}

function ExamScreen({exam, user, onFinish, onExit}){
  const mcq = exam.questions || [];
  const openQ = exam.openQuestions || [];
  const sections = exam.sections || [];
  const totalSeconds = exam.duration || 3600;

  const [timeLeft, setTimeLeft] = useState(totalSeconds);
  const [answers, setAnswers] = useState({});
  const [openAnswers, setOpenAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);

  useEffect(() => {
    if(submitted) return;
    const timer = setInterval(() => {
      setTimeLeft(prev => {
        if(prev <= 1){ clearInterval(timer); handleSubmit(); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [submitted]);

  function handleSubmit(){
    if(submitted) return;

    let correct = 0;
    const wrongItems = [];

    mcq.forEach(q => {
      const userIndex = answers[q.id];
      if(userIndex === q.correctIndex) {
        correct++;
      } else {
        wrongItems.push({
          questionId: q.id,
          questionText: q.text,
          userAnswerIndex: userIndex ?? null,
          userAnswerText: userIndex != null ? q.options?.[userIndex] : "",
          correctIndex: q.correctIndex,
          correctAnswerText: q.options?.[q.correctIndex] || "",
          explanation: q.explanation || "",
          subject: exam.subjectAr || exam.subject,
          subjectCode: exam.subjectCode || "",
          semester: exam.semester || "",
          unitTitleAr: q.unitTitleAr || exam.unitTitleAr || "",
          subunitTitleAr: q.subunitTitleAr || exam.subunitTitleAr || "",
          questionType: q.questionType || "mcq"
        });
      }
    });

    const score = mcq.length ? Math.round((correct / mcq.length) * 100) : 100;

    const payload = {
      userId: user.id,
      userName: user.name,
      examId: exam.id,
      subject: exam.subjectAr || exam.subject,
      subjectCode: exam.subjectCode || "",
      score,
      semester: exam.semester || "",
      unitTitleAr: exam.unitTitleAr || "",
      subunitTitleAr: exam.subunitTitleAr || "",
      answers,
      openAnswers,
      wrongItems
    };

    setSubmitted(true);
    setResult({score, wrongItems, openAnswersSnapshot: openAnswers});
    onFinish(payload);
  }

  const minutes = String(Math.floor(timeLeft / 60)).padStart(2,"0");
  const seconds = String(timeLeft % 60).padStart(2,"0");
  const answered = Object.keys(answers).length + Object.values(openAnswers).filter(Boolean).length;
  const total = mcq.length + openQ.length || 1;
  const progress = Math.round((answered / total) * 100);

  if(submitted && result){
    return (
      <div className="space-y-6">
        <Card className="p-6 bg-gradient-to-br from-slate-950 via-brand-700 to-slate-900 text-white border-none">
          <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
              <div className="text-white/75 text-sm font-bold">تم تسليم الامتحان</div>
              <h2 className="text-3xl font-black mt-2">{exam.title || exam.subjectAr}</h2>
            </div>
            <div className="rounded-[28px] bg-white/10 px-8 py-5 text-center">
              <div className="text-sm text-white/75">النتيجة</div>
              <div className="text-5xl font-black mt-2">{result.score}%</div>
            </div>
          </div>
        </Card>

        <SectionBlock title="تصحيح الاختيار من متعدد">
          {result.wrongItems.length ? result.wrongItems.map((w,i)=>(
            <div key={i} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4">
              <div className="text-xs font-bold text-brand-600 dark:text-brand-300">{w.unitTitleAr || "بدون وحدة"} {w.subunitTitleAr ? `• ${w.subunitTitleAr}` : ""}</div>
              <div className="font-black text-slate-900 dark:text-white mt-2"><RichText text={w.questionText} /></div>
              <div className="mt-3 text-sm text-red-600">إجابتك: {w.userAnswerText || "لم تجب"}</div>
              <div className="text-sm text-emerald-600 mt-1">الصحيح: {w.correctAnswerText}</div>
              {w.explanation ? <div className="mt-2 text-sm text-slate-600 dark:text-slate-300">{w.explanation}</div> : null}
            </div>
          )) : <div className="rounded-3xl bg-emerald-50 dark:bg-emerald-950/30 p-4 font-bold text-emerald-700 dark:text-emerald-200">ممتاز، لا توجد أخطاء في قسم MCQ.</div>}
        </SectionBlock>

        {openQ.length ? (
          <SectionBlock title="الأسئلة المقالية">
            {openQ.map((q,idx)=>(
              <div key={q.id} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4">
                <div className="font-black text-slate-900 dark:text-white">{idx+1}. <RichText text={q.prompt} /></div>
                <div className="mt-3 text-sm text-slate-500 dark:text-slate-400">إجابتك</div>
                <div className="mt-2 rounded-2xl bg-slate-100 dark:bg-slate-800 p-3 whitespace-pre-wrap">{result.openAnswersSnapshot[q.id] || "لم تتم الإجابة"}</div>
                <div className="mt-3 text-sm text-emerald-700 dark:text-emerald-300">الإجابة النموذجية</div>
                <div className="mt-2 rounded-2xl bg-emerald-50 dark:bg-emerald-950/30 p-3 whitespace-pre-wrap">{q.idealAnswer || "-"}</div>
              </div>
            ))}
          </SectionBlock>
        ) : null}

        <Button variant="brand" onClick={onExit}>العودة للوحة التحكم</Button>
      </div>
    );
  }

  return (
    <div className="space-y-6">
      <Card className="p-6">
        <div className="flex flex-col xl:flex-row xl:items-center justify-between gap-5">
          <div>
            <div className="text-sm font-bold text-brand-600 dark:text-brand-300">{exam.subjectAr || exam.subject}</div>
            <h1 className="text-3xl font-black text-slate-900 dark:text-white mt-2">{exam.title || exam.subjectAr || exam.subject}</h1>
            <div className="mt-3 flex flex-wrap gap-2 text-sm">
              <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">{exam.unitTitleAr || "بدون وحدة"}</span>
              {exam.subunitTitleAr ? <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">{exam.subunitTitleAr}</span> : null}
              <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">الوقت: {minutes}:{seconds}</span>
              <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">التقدم: {progress}%</span>
            </div>
          </div>
          <div className="flex flex-wrap gap-3">
            <Button variant="outline" onClick={onExit}>إلغاء</Button>
            <Button variant="brand" onClick={handleSubmit}>تسليم</Button>
          </div>
        </div>
        <div className="mt-5">
          <div className="h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden"><div className="h-full bg-brand-600" style={{width:`${progress}%`}}></div></div>
        </div>
      </Card>

      {(exam.examMode === "HYBRID" || sections.length > 0) ? (
        <>
          {mcq.length ? (
            <SectionBlock title="القسم الأول: OMR / Multiple Choice">
              {mcq.map((q, idx) => (
                <QuestionCard key={q.id} q={q} index={idx} selected={answers[q.id]} onSelect={(value)=>setAnswers(prev=>({...prev,[q.id]:value}))} />
              ))}
            </SectionBlock>
          ) : null}

          {openQ.length ? (
            <SectionBlock title="الأقسام المقالية / Reading / Writing">
              {openQ.map((q, idx) => (
                <div key={q.id} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4">
                  <div className="text-xs font-bold text-brand-600 dark:text-brand-300">{q.sectionTitle || q.questionType || "مقالي"}</div>
                  <div className="mt-2 font-black text-slate-900 dark:text-white">{idx+1}. <RichText text={q.prompt} /></div>
                  <TextArea rows={8} className="mt-4" placeholder="اكتب إجابتك هنا..." value={openAnswers[q.id] || ""} onChange={e=>setOpenAnswers(prev=>({...prev,[q.id]:e.target.value}))}/>
                </div>
              ))}
            </SectionBlock>
          ) : null}
        </>
      ) : (
        <SectionBlock title="ورقة التظليل OMR">
          <div className="grid md:grid-cols-2 gap-4">
            {mcq.map((q, idx) => (
              <QuestionCard key={q.id} q={q} index={idx} selected={answers[q.id]} onSelect={(value)=>setAnswers(prev=>({...prev,[q.id]:value}))} omr />
            ))}
          </div>
        </SectionBlock>
      )}
    </div>
  );
}

      <div className="text-xs font-bold text-brand-600 dark:text-brand-300">{q.unitTitleAr || ""} {q.subunitTitleAr ? `• ${q.subunitTitleAr}` : ""}</div>

function AdminModal({data, onRefresh, onClose, toast}){
  const [password, setPassword] = useState("");
  const [ok, setOk] = useState(false);
  const [tab, setTab] = useState("upload");
  const [busy, setBusy] = useState(false);
  const [subjectCode, setSubjectCode] = useState("chemistry");
  const [semester, setSemester] = useState(1);
  const [unitTitleAr, setUnitTitleAr] = useState("");
  const [subunitTitleAr, setSubunitTitleAr] = useState("");
  const [title, setTitle] = useState("");
  const [duration, setDuration] = useState(1800);
  const [jsonText, setJsonText] = useState(JSON.stringify(SAMPLE_EXAM, null, 2));
  const [search, setSearch] = useState("");

  const subject = getSubjectByCode(subjectCode);
  const units = getUnits(subjectCode, semester);
  const subunits = getSubunits(subjectCode, semester, unitTitleAr);

  useEffect(() => { if(!unitTitleAr && units.length) setUnitTitleAr(units[0].titleAr); }, [subjectCode, semester]);
  useEffect(() => { if(unitTitleAr && !subunits.includes(subunitTitleAr)) setSubunitTitleAr(subunits[0] || ""); }, [unitTitleAr, subjectCode, semester]);

  const filteredResults = (data.allResults || []).filter(r =>
    !search ||
    normalizeText(r.userName).includes(normalizeText(search)) ||
    normalizeText(r.subject).includes(normalizeText(search))
  );

  const filteredExams = (data.exams || []).filter(e =>
    !search ||
    normalizeText(e.title || e.subjectAr || "").includes(normalizeText(search))
  );

  function enrichExam(exam){
    const subj = getSubjectByCode(subjectCode);
    const finalTitle = title.trim() || exam.title || `${subj?.nameAr || exam.subjectAr || ""}${unitTitleAr ? " - " + unitTitleAr : ""}${subunitTitleAr ? " - " + subunitTitleAr : ""}`;

    exam.title = finalTitle;
    exam.subjectCode = subjectCode;
    exam.subjectAr = subj?.nameAr || exam.subjectAr || exam.subject || "";
    exam.semester = Number(semester);
    exam.unitTitleAr = unitTitleAr || exam.unitTitleAr || "";
    exam.subunitTitleAr = subunitTitleAr || exam.subunitTitleAr || "";
    exam.examMode = subj?.examMode || exam.examMode || "OMR_MCQ";
    exam.duration = Number(duration || exam.duration || 1800);

    exam.questions = (exam.questions || []).map((q, idx) => ({
      ...q,
      id: q.id || `q-${idx+1}`,
      questionType: q.questionType || "mcq",
      subjectCode,
      subjectAr: subj?.nameAr || "",
      semester: Number(semester),
      unitTitleAr: q.unitTitleAr || unitTitleAr || "",
      subunitTitleAr: q.subunitTitleAr || subunitTitleAr || ""
    }));

    exam.openQuestions = (exam.openQuestions || []).map((q, idx) => ({
      ...q,
      id: q.id || `oq-${idx+1}`,
      questionType: q.questionType || "essay",
      sectionTitle: q.sectionTitle || (subjectCode === "english" ? "Writing / Reading" : "Essay"),
      subjectCode,
      subjectAr: subj?.nameAr || "",
      semester: Number(semester),
      unitTitleAr: q.unitTitleAr || unitTitleAr || "",
      subunitTitleAr: q.subunitTitleAr || subunitTitleAr || ""
    }));

    if(subjectCode === "english"){
      exam.sections = [
        {id:"mcq", title:"OMR MCQ", type:"mcq"},
        {id:"open", title:"Reading / Literature / Writing", type:"open"}
      ];
    }

    return exam;
  }

  async function uploadExam(){
    try{
      setBusy(true);
      const exam = enrichExam(JSON.parse(jsonText));
      await api("uploadExam", {adminPassword: CONFIG.ADMIN_PASSWORD, exam});
      toast("تم رفع الامتحان وفهرسته في بنك الأسئلة");
      onRefresh();
    }catch(e){
      toast("فشل الرفع: " + e.message, "error");
    }finally{
      setBusy(false);
    }
  }

  async function deleteExam(examId){
    try{
      setBusy(true);
      await api("deleteExam", {adminPassword: CONFIG.ADMIN_PASSWORD, examId});
      toast("تم حذف الامتحان");
      onRefresh();
    }catch(e){
      toast("فشل الحذف: " + e.message, "error");
    }finally{
      setBusy(false);
    }
  }

  return (
    <Modal title="لوحة إدارة دراستي" subtitle="المادة ← الفصل ← الوحدة ← الموضوع الفرعي ← بنك الأسئلة ← النتائج" onClose={onClose} maxWidth="max-w-7xl">
      {!ok ? (
        <div className="max-w-lg">
          <Input label="كلمة مرور الإدارة" type="password" value={password} onChange={e=>setPassword(e.target.value)} />
          <div className="mt-4 flex gap-3">
            <Button variant="brand" onClick={()=> password === CONFIG.ADMIN_PASSWORD ? setOk(true) : alert("كلمة المرور غير صحيحة")}>دخول</Button>
            <Button variant="outline" onClick={onClose}>إلغاء</Button>
          </div>
        </div>
      ) : (
        <div className="space-y-6">
          <div className="flex flex-wrap gap-2">
            {[["upload","رفع امتحان"],["bank","بنك الامتحانات"],["results","نتائج الطلاب"],["qbank","ملخص بنك الأسئلة"]].map(([id,label]) => (
              <button key={id} onClick={()=>setTab(id)} className={cls("px-4 py-3 rounded-2xl font-bold", tab===id ? "bg-slate-900 text-white dark:bg-white dark:text-slate-900" : "bg-slate-100 dark:bg-slate-800")}>{label}</button>
            ))}
          </div>

          {tab === "upload" ? (
            <div className="grid xl:grid-cols-[1.05fr,1fr] gap-6">
              <Card className="p-5 space-y-4">
                <div className="grid md:grid-cols-2 gap-4">
                  <Select label="المادة" value={subjectCode} onChange={e=>{setSubjectCode(e.target.value); setUnitTitleAr(""); setSubunitTitleAr("");}}>
                    {CURRICULUM.subjects.map(s => <option key={s.code} value={s.code}>{s.nameAr}</option>)}
                  </Select>

                  <Select label="الفصل" value={semester} onChange={e=>{setSemester(Number(e.target.value)); setUnitTitleAr(""); setSubunitTitleAr("");}}>
                    <option value="1">الفصل الأول</option>
                    <option value="2">الفصل الثاني</option>
                  </Select>

                  <Select label="الوحدة" value={unitTitleAr} onChange={e=>setUnitTitleAr(e.target.value)}>
                    <option value="">بدون وحدة</option>
                    {units.map((u,i) => <option key={i} value={u.titleAr}>{u.titleAr}</option>)}
                  </Select>

                  <Select label="الموضوع الفرعي" value={subunitTitleAr} onChange={e=>setSubunitTitleAr(e.target.value)}>
                    <option value="">بدون موضوع فرعي</option>
                    {subunits.map((s,i) => <option key={i} value={s}>{s}</option>)}
                  </Select>
                </div>

                <Input label="عنوان الامتحان" placeholder="يُنشأ تلقائيًا إن تركته فارغًا" value={title} onChange={e=>setTitle(e.target.value)} />
                <Input label="المدة بالثواني" type="number" value={duration} onChange={e=>setDuration(e.target.value)} />
                <TextArea label="JSON الامتحان" rows={18} value={jsonText} onChange={e=>setJsonText(e.target.value)} hint="يمكن أن يكون الامتحان MCQ فقط أو Hybrid للإنجليزي." />

                <div className="flex flex-wrap gap-3">
                  <Button variant="brand" onClick={uploadExam} disabled={busy}>{busy ? "جارٍ الرفع..." : "رفع الامتحان"}</Button>
                  <label className="px-4 py-3 rounded-2xl font-bold border border-slate-300 dark:border-slate-700 cursor-pointer">
                    استيراد JSON
                    <input type="file" accept=".json,application/json" className="hidden" onChange={e => {
                      const file = e.target.files?.[0];
                      if(!file) return;
                      const reader = new FileReader();
                      reader.onload = () => setJsonText(String(reader.result || ""));
                      reader.readAsText(file, "utf-8");
                    }} />
                  </label>
                </div>
              </Card>

              <Card className="p-5">
                <h3 className="text-xl font-black text-slate-900 dark:text-white">ما الذي يفعله الرفع الآن؟</h3>
                <div className="mt-4 space-y-3 text-sm leading-7 text-slate-600 dark:text-slate-300">
                  <p>1) يضيف تصنيف المادة والفصل والوحدة والموضوع الفرعي إلى الامتحان والأسئلة.</p>
                  <p>2) يحفظ ملف الامتحان في Google Drive.</p>
                  <p>3) يفهرس جميع الأسئلة في بنك أسئلة مخفي مرتب.</p>
                  <p>4) يجعل “أعد أخطائي” يعمل حسب التصنيف، وليس حسب المادة فقط.</p>
                  <p>5) يميز الإنجليزي كوضع Hybrid، والكيمياء/الأحياء/الإسلامية كـ OMR MCQ.</p>
                </div>
                <div className="mt-5 rounded-3xl bg-slate-100 dark:bg-slate-800 p-4 text-sm">
                  مثال جاهز داخل الحقل يمكن رفعه مباشرة.
                </div>
              </Card>
            </div>
          ) : null}

          {tab === "bank" ? (
            <div className="space-y-4">
              <Input placeholder="بحث..." value={search} onChange={e=>setSearch(e.target.value)} />
              <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
                {filteredExams.length ? filteredExams.map(exam => (
                  <Card key={exam.id} className="p-5">
                    <div className="font-black text-slate-900 dark:text-white">{exam.title || exam.subjectAr || exam.subject}</div>
                    <div className="mt-2 text-sm text-slate-500 dark:text-slate-400">{exam.subjectAr || exam.subject} • {exam.unitTitleAr || "بدون وحدة"}</div>
                    <div className="mt-4 text-sm text-slate-600 dark:text-slate-300">عدد الأسئلة: {(exam.questions||[]).length + (exam.openQuestions||[]).length}</div>
                    <Button variant="danger" className="w-full mt-4" onClick={()=>deleteExam(exam.id)} disabled={busy}>حذف الامتحان</Button>
                  </Card>
                )) : <div className="text-slate-500 dark:text-slate-400">لا توجد امتحانات.</div>}
              </div>
            </div>
          ) : null}

          {tab === "results" ? (
            <div className="space-y-4">
              <Input placeholder="ابحث بالطالب أو المادة..." value={search} onChange={e=>setSearch(e.target.value)} />
              <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
                {filteredResults.length ? filteredResults.map((r,i)=>(
                  <Card key={i} className="p-4">
                    <div className="flex items-start justify-between gap-3">
                      <div>
                        <div className="font-black text-slate-900 dark:text-white">{r.userName}</div>
                        <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">{r.subject}</div>
                      </div>
                      <div className="text-2xl font-black text-brand-600 dark:text-brand-300">{r.score}%</div>
                    </div>
                    <div className="mt-2 text-xs text-slate-500 dark:text-slate-400">{formatDate(r.createdAt)}</div>
                  </Card>
                )) : <div className="text-slate-500 dark:text-slate-400">لا توجد نتائج.</div>}
              </div>
            </div>
          ) : null}

          {tab === "qbank" ? (
            <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-4">
              <Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">إجمالي الأسئلة</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.totalQuestions || 0}</div></Card>
              <Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">الكيمياء</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.bySubject?.chemistry || 0}</div></Card>
              <Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">الأحياء</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.bySubject?.life_sciences || 0}</div></Card>
              <Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">الإنجليزي</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.bySubject?.english || 0}</div></Card>
            </div>
          ) : null}
        </div>
      )}
    </Modal>
  );
}

function App(){
  const [user, setUser] = useState(loadLocal(CONFIG.STORAGE_KEYS.user, null));
  const [darkMode, setDarkMode] = useState(loadLocal(CONFIG.STORAGE_KEYS.darkMode, false));
  const [loading, setLoading] = useState(false);
  const [data, setData] = useState({ exams:[], results:[], allResults:[], analytics:{}, questionBankSummary:{} });
  const [selectedExam, setSelectedExam] = useState(null);
  const [adminOpen, setAdminOpen] = useState(false);
  const [redoLoading, setRedoLoading] = useState(false);
  const [redoFilters, setRedoFilters] = useState({ subjectCode:"", semester:1, unitTitleAr:"", subunitTitleAr:"", limit:10 });
  const toast = useToast();

  useEffect(() => {
    document.documentElement.classList.toggle("dark", !!darkMode);
  }, [darkMode]);

  async function refresh(){
    if(!user) return;
    try{
      setLoading(true);
      const [examsRes, resultsRes, allRes, analyticsRes, bankRes] = await Promise.all([
        api("listExams"),
        api("getUserResults", {userId: user.id}),
        api("listAllResults", {adminPassword: CONFIG.ADMIN_PASSWORD}),
        api("getUserAnalytics", {userId: user.id}),
        api("getQuestionBankSummary")
      ]);
      setData({
        exams: examsRes.exams || [],
        results: resultsRes.results || [],
        allResults: allRes.results || [],
        analytics: analyticsRes.analytics || {},
        questionBankSummary: bankRes.summary || {}
      });
    }catch(e){
      toast.show("خطأ في التحميل: " + e.message, "error");
    }finally{
      setLoading(false);
    }
  }

  useEffect(() => {
    if(user) refresh();
  }, [user]);

  async function startExam(id){
    try{
      setLoading(true);
      const res = await api("getExam", {examId: id});
      setSelectedExam(res.exam);
    }catch(e){
      toast.show("تعذر تحميل الامتحان: " + e.message, "error");
    }finally{
      setLoading(false);
    }
  }

  async function finishExam(payload){
    try{
      await api("submitResult", payload);
      toast.show("تم حفظ النتيجة وتحديث الإتقان");
      await refresh();
    }catch(e){
      toast.show("فشل حفظ النتيجة: " + e.message, "error");
    }
  }

  async function generateRedo(){
    try{
      setRedoLoading(true);
      const res = await api("generateRedoExam", { userId: user.id, ...redoFilters, limit: 10 });
      setSelectedExam(res.exam);
      toast.show("تم إنشاء تدريب علاجي جديد");
    }catch(e){
      toast.show("تعذر إنشاء تدريب علاجي: " + e.message, "error");
    }finally{
      setRedoLoading(false);
    }
  }

  function logout(){
    localStorage.removeItem(CONFIG.STORAGE_KEYS.user);
    setUser(null);
    setSelectedExam(null);
  }

  if(!user) return <LoginScreen onLogin={setUser} />;

  return (
    <div className="min-h-screen text-slate-900 dark:text-slate-100">
      <TopBar
        user={user}
        darkMode={darkMode}
        onToggleDark={()=>{
          const next=!darkMode;
          setDarkMode(next);
          saveLocal(CONFIG.STORAGE_KEYS.darkMode, next);
        }}
        onLogout={logout}
        onOpenAdmin={()=>setAdminOpen(true)}
        onGoHome={()=>setSelectedExam(null)}
      />

      <main className="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        {loading ? (
          <Card className="p-6">جارٍ التحميل...</Card>
        ) : selectedExam ? (
          <ExamScreen exam={selectedExam} user={user} onFinish={finishExam} onExit={()=>setSelectedExam(null)} />
        ) : (
          <Dashboard
            data={data}
            onStartExam={startExam}
            onGenerateRedo={generateRedo}
            redoLoading={redoLoading}
            redoFilters={redoFilters}
            setRedoFilters={setRedoFilters}
          />
        )}
      </main>

      {adminOpen ? <AdminModal data={data} onRefresh={refresh} onClose={()=>setAdminOpen(false)} toast={toast.show} /> : null}
      <Toast toast={toast.toast} onClose={toast.clear} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
