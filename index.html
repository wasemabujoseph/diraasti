<head>

    };

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
    .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 10px; }
    .dark .scroll-thin::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.5); }
    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
    .dark .glass-panel { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255,255,255,0.05); }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .animate-enter { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 selection:bg-brand-500 selection:text-white antialiased">
  <div id="root"></div>

<script>
const CONFIG = {
  APP_NAME: 'امتحاني',
  APP_SUBTITLE: 'منصة التدريب والتقييم الذكية، تدرب وحلل أدائك باحترافية',
  API_BASE: 'https://script.google.com/macros/s/AKfycbxbRTV0pYSXJDRQe2oTBzhVaNYkW9P-ILbB2FruLQp1Tgf7eJOM7OByJa6ioH7NK9Zalw/exec',
  ADMIN_PASSWORD: 'admin',
  STORAGE_KEYS: { user: 'dirasti_user_v8', darkMode: 'dirasti_dark_v8' }
};

const CURRICULUM = {
  gradeAr: 'الثانوية العامة',
  trackAr: 'الفرع العلمي',
  comprehensiveLabel: 'بنك شامل للمادة',
  subjects: [
    {
      code: 'chemistry', nameAr: 'الكيمياء', examMode: 'OMR_MCQ',
      weights: { '1|حالات المادة': 13.5, '1|المحاليل': 8, '1|الاتزان الكيميائي': 10.8, '1|الحموض والقواعد وتطبيقاتها': 18.9, '2|الكيمياء الحركيه': 13.5, '2|الكيمياء الكهربائيه': 17.5, '2|الكيمياء العضويه': 17.5 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['حالات المادة','المحاليل','الاتزان الكيميائي','الحموض والقواعد وتطبيقاتها'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['الكيمياء الحركيه','الكيمياء الكهربائيه','الكيمياء العضويه'] }
      ]
    },
    {
      code: 'life_sciences', nameAr: 'الأحياء', examMode: 'OMR_MCQ',
      weights: { '1|كيمياء الحياة': 16.9, '1|دوره الخليه وتصنيع البروتينات': 12.8, '1|الوراثة': 14.9, '1|التكنولوجيا الحيوية': 8.2, '2|التنظيم والاتزان': 11.8, '2|الدعامه والحركه': 6.1, '2|الهضم والنقل وتبادل الغازات': 10.7, '2|الاخراج والتكاثر': 11.3, '2|المناعه والمضادات الحيويه': 6.9 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['كيمياء الحياة','دوره الخليه وتصنيع البروتينات','الوراثة','التكنولوجيا الحيوية'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['التنظيم والاتزان','الدعامه والحركه','الهضم والنقل وتبادل الغازات','الاخراج والتكاثر','المناعه والمضادات الحيويه'] }
      ]
    },
    {
      code: 'islamic_education', nameAr: 'التربية الإسلامية', examMode: 'OMR_MCQ',
      weights: { '1|علاقه الانسان بربه': 16.66, '1|علاقه الانسان بنفسه': 16.66, '1|علاقه الانسان بمن حوله': 16.66, '2|علاقه الانسان بربه': 16.66, '2|علاقه الانسان بنفسه': 16.66, '2|علاقه الانسان بمن حوله': 16.66 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] }
      ]
    },
    {
      code: 'english', nameAr: 'Advance English', examMode: 'HYBRID',
      weights: { '1|Unit 1': 10, '1|Unit 2': 10, '1|Unit 3': 10, '1|Unit 4': 10, '1|Unit 5': 10, '2|Unit 6': 10, '2|Unit 7': 10, '2|Unit 8': 10, '2|Unit 9': 10, '2|Unit 10': 10 },
      semesters: [
        { semester: 1, titleAr: 'Semester 1', units: ['Unit 1','Unit 2','Unit 3','Unit 4','Unit 5'] },
        { semester: 2, titleAr: 'Semester 2', units: ['Unit 6','Unit 7','Unit 8','Unit 9','Unit 10'] }
      ]
    }
  ]
};

const THEMES = [
  { border: 'border-brand-500', bgOuter: 'bg-brand-50 dark:bg-brand-900/10', textMain: 'text-brand-700 dark:text-brand-400', badge: 'bg-brand-100 text-brand-800 dark:bg-brand-900/40 dark:text-brand-300' },
  { border: 'border-blue-500', bgOuter: 'bg-blue-50 dark:bg-blue-900/10', textMain: 'text-blue-700 dark:text-blue-400', badge: 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300' },
  { border: 'border-purple-500', bgOuter: 'bg-purple-50 dark:bg-purple-900/10', textMain: 'text-purple-700 dark:text-purple-400', badge: 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300' },
  { border: 'border-indigo-500', bgOuter: 'bg-indigo-50 dark:bg-indigo-900/10', textMain: 'text-indigo-700 dark:text-indigo-400', badge: 'bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300' },
  { border: 'border-rose-500', bgOuter: 'bg-rose-50 dark:bg-rose-900/10', textMain: 'text-rose-700 dark:text-rose-400', badge: 'bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300' }
];

function getTheme(index) { return THEMES[index % THEMES.length]; }

const state = {
  user: loadLocal(CONFIG.STORAGE_KEYS.user, null),
  darkMode: loadLocal(CONFIG.STORAGE_KEYS.darkMode, false),
  loading: false, toast: null,
  data: { exams: [], results: [], analytics: { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] }, questionBankSummary: { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] } },
  subjectCode: null, subjectTab: 'units', unitKey: null,
  prestartExam: null, examSession: null, reviewAttempt: null, timerId: null,
  admin: { open: false, authenticated: false, tab: 'upload', allResults: [], selectedUserId: null, selectedSubjectCode: null, form: { subjectCode: '', unitKey: '', editingExamId: null, pdfDataUrl: null, pdfFileName: '' } },
  builder: { totalQuestions: 100, mode: 'weighted', selectedUnitKeys: [], explicitCounts: {}, selectedExamIds: [] }
};

window.__PDF_SOURCES = {};
window.__PDF_DOCS = {};

function loadLocal(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; } }
function saveLocal(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

function setDarkMode(value) { state.darkMode = !!value; document.documentElement.classList.toggle('dark', state.darkMode); saveLocal(CONFIG.STORAGE_KEYS.darkMode, state.darkMode); }
setDarkMode(state.darkMode);

function escapeHtml(v) { return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function initials(n) { return String(n||'').split(/\s+/).filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase() || 'ط'; }
function formatDate(v) { if(!v) return '-'; try { return new Date(v).toLocaleString('ar-JO', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch { return String(v); } }
function percent(c, t) { if (!t) return 0; return Math.round((Number(c||0) / Number(t||1)) * 100); }

function getSubject(code) { return CURRICULUM.subjects.find(s => s.code === code) || null; }
function getSubjectSummary(code) { return (state.data.questionBankSummary.subjects || []).find(s => s.subjectCode === code) || { totalQuestions: 0, totalExams: 0, units: [] }; }
function makeUnitKey(sc, sem, ut) { return [sc, Number(sem||0), ut||''].join('||'); }
function parseUnitKey(uk) { const p = String(uk||'').split('||'); return { subjectCode: p[0]||'', semester: Number(p[1]||0), unitTitleAr: p.slice(2).join('||')||'' }; }

function buildSubjectUnits(sc) {
  const sub = getSubject(sc); if(!sub) return []; const units = [];
  sub.semesters.forEach(sem => { sem.units.forEach(ut => { units.push({ key: makeUnitKey(sc, sem.semester, ut), subjectCode: sc, semester: sem.semester, semesterTitleAr: sem.titleAr, unitTitleAr: ut, weight: Number(sub.weights[`${sem.semester}|${ut}`]||0) }); }); });
  units.push({ key: makeUnitKey(sc, 0, CURRICULUM.comprehensiveLabel), subjectCode: sc, semester: 0, semesterTitleAr: 'الفصلان معاً', unitTitleAr: CURRICULUM.comprehensiveLabel, weight: 0, comprehensive: true });
  return units;
}

function getExamsForSubject(sc) { return (state.data.exams || []).filter(e => e.subjectCode === sc); }
function getExamsForUnit(sc, uk) { const inf = parseUnitKey(uk); return getExamsForSubject(sc).filter(e => Number(e.semester||0) === Number(inf.semester||0) && String(e.unitTitleAr||'').trim() === String(inf.unitTitleAr||'').trim()); }
function getQuestionCountForUnit(uk) { return Number((state.data.questionBankSummary.byUnitKey||{})[uk]||0); }
function getAttemptsForSubject(sc) { return (state.data.results || []).filter(r => r.subjectCode === sc); }
function getUnitAnalytics(sc) { return (state.data.analytics.unitMastery || []).filter(i => i.subjectCode === sc); }
function getSubjectAnalytics(sc) { return (state.data.analytics.subjectMastery || []).find(i => i.subjectCode === sc) || null; }
function hasApiBase() { return String(CONFIG.API_BASE||'').startsWith('https://script.google.com/'); }

async function api(action, payload) {
  if (!hasApiBase()) throw new Error('رابط API غير صالح');
  const res = await fetch(CONFIG.API_BASE, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(Object.assign({ action }, payload || {})) });
  if (!res.ok) throw new Error('فشل الاتصال بالخادم');
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'خطأ في العملية');
  return data;
}

function showToast(msg, type='success') {
  state.toast = { msg, type }; render();
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { state.toast = null; render(); }, 3200);
}

function setLoading(v) { state.loading = !!v; render(); }

async function refreshData() {
  if (!state.user) return;
  try {
    setLoading(true);
    const [exams, results, analytics, bank] = await Promise.all([ api('getCatalog'), api('getUserResults', { userId: state.user.id }), api('getUserAnalytics', { userId: state.user.id }), api('getQuestionBankSummary') ]);
    state.data.exams = exams.exams || []; state.data.results = results.results || [];
    state.data.analytics = analytics.analytics || { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] };
    state.data.questionBankSummary = bank.summary || { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] };
    render();
  } catch (err) { showToast('خطأ المزامنة: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

function resetBuilderForSubject(sc) {
  const units = buildSubjectUnits(sc).filter(u => !u.comprehensive);
  state.builder.selectedUnitKeys = units.slice(0, Math.min(4, units.length)).map(u => u.key);
  state.builder.selectedExamIds = []; 
  state.builder.selectedUnitKeys.forEach(uk => { getExamsForUnit(sc, uk).forEach(e => { if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); }); });
  state.builder.explicitCounts = {}; state.builder.mode = 'weighted'; state.builder.totalQuestions = 100;
}

function openSubject(sc) { state.subjectCode = sc; state.subjectTab = 'units'; state.unitKey = null; resetBuilderForSubject(sc); render(); }
function backToHome() { state.subjectCode = null; state.subjectTab = 'units'; state.unitKey = null; state.reviewAttempt = null; state.examSession = null; clearExamTimer(); render(); }
function openAdmin() { state.admin.open = true; render(); }
function closeAdmin() { state.admin.open = false; render(); }

async function adminLogin(pw) {
  if (pw !== CONFIG.ADMIN_PASSWORD) { showToast('كلمة المرور غير صحيحة', 'error'); return; }
  state.admin.authenticated = true;
  try {
    setLoading(true);
    const res = await api('listAllResults', { adminPassword: pw });
    state.admin.allResults = res.results || [];
    if (!state.admin.form.subjectCode && CURRICULUM.subjects.length > 0) state.admin.form.subjectCode = CURRICULUM.subjects[0].code;
  } catch (err) { showToast('خطأ الإدارة: ' + err.message, 'error'); }
  finally { setLoading(false); render(); }
}

function renderLogin() {
  return `
    <div class="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-950">
      <div class="w-full max-w-4xl grid md:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2rem] overflow-hidden shadow-soft border border-slate-100 dark:border-slate-800">
        <div class="p-8 md:p-12 flex flex-col justify-center bg-gradient-to-br from-brand-600 to-brand-800 text-white relative overflow-hidden">
          <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl"></div>
          <div class="relative z-10">
            <h1 class="text-4xl font-black mb-4 tracking-tight">${escapeHtml(CONFIG.APP_NAME)}</h1>
            <p class="text-brand-100 text-base leading-relaxed">${escapeHtml(CONFIG.APP_SUBTITLE)}</p>
            <div class="mt-8 grid grid-cols-2 gap-4 opacity-80">
              <div><div class="text-2xl font-black">100%</div><div class="text-sm">تغطية للمنهاج</div></div>
              <div><div class="text-2xl font-black">PDF</div><div class="text-sm">أسئلة تفاعلية</div></div>
            </div>
          </div>
        </div>
        <div class="p-8 md:p-12 flex flex-col justify-center">
          <div class="text-sm font-bold text-brand-600 dark:text-brand-400 mb-2">تسجيل الدخول</div>
          <h2 class="text-2xl font-black text-slate-900 dark:text-white mb-6">ابدأ رحلتك الآن</h2>
          <div class="space-y-6">
            <div>
              <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">الاسم الكامل</label>
              <input id="login-name" class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-brand-500 outline-none transition-all text-slate-900 dark:text-white text-base font-semibold" placeholder="أدخل اسمك..." />
            </div>
            <button data-action="login" class="w-full py-4 bg-slate-900 hover:bg-slate-800 dark:bg-brand-600 dark:hover:bg-brand-500 text-white rounded-2xl font-bold text-lg transition-transform transform hover:-translate-y-1 shadow-md">دخول للمنصة</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderHeaderControls() {
  return `
    <div class="bg-white dark:bg-slate-900 rounded-[2rem] p-5 mb-8 flex flex-col md:flex-row justify-between items-center gap-4 shadow-soft border border-slate-100 dark:border-slate-800 animate-enter">
      <div class="flex items-center gap-4 w-full md:w-auto">
        <div class="w-12 h-12 rounded-[1rem] bg-brand-50 text-brand-600 dark:bg-brand-900/30 dark:text-brand-400 flex items-center justify-center text-lg font-black shrink-0">${escapeHtml(initials(state.user.name))}</div>
        <div class="min-w-0">
          <h2 class="text-lg font-black text-slate-900 dark:text-white truncate">${escapeHtml(state.user.name)}</h2>
          <div class="text-xs font-semibold text-slate-500 mt-0.5">طالب • ${escapeHtml(CURRICULUM.gradeAr)}</div>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-950 p-2 rounded-2xl border border-slate-100 dark:border-slate-800 w-full md:w-auto justify-center">
        <button data-action="toggle-dark" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:text-brand-600 shadow-sm transition-colors" title="الوضع الليلي/النهاري">
          ${state.darkMode ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>' : '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>'}
        </button>
        <button data-action="open-admin" class="px-4 py-2 rounded-xl bg-white dark:bg-slate-900 font-bold text-xs text-slate-700 dark:text-slate-200 hover:text-brand-600 shadow-sm transition-colors">الإدارة</button>
        <button data-action="logout" class="px-4 py-2 rounded-xl bg-rose-50 dark:bg-rose-900/20 font-bold text-xs text-rose-600 hover:bg-rose-100 transition-colors">خروج</button>
      </div>
    </div>
  `;
}

function renderBackButton() {
  return `
    <button data-action="go-home" class="group flex items-center gap-2 px-4 py-2.5 mb-6 w-fit rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-all font-bold text-slate-600 dark:text-slate-300 text-sm">
      <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      العودة للرئيسية
    </button>
  `;
}

function buildSubjectCards() {
  return CURRICULUM.subjects.map(sub => {
    const sum = getSubjectSummary(sub.code);
    const anl = getSubjectAnalytics(sub.code);
    const qs = state.data.questionBankSummary.bySubject[sub.code] || 0;
    return `
      <button data-action="open-subject" data-subject-code="${escapeHtml(sub.code)}" class="text-right flex flex-col bg-white dark:bg-slate-900 rounded-[2rem] p-6 border border-slate-100 dark:border-slate-800 shadow-soft hover:shadow-float transition-all duration-300 group">
        <div class="flex justify-between items-start mb-4">
          <div class="w-12 h-12 rounded-[1rem] bg-brand-50 dark:bg-brand-900/20 text-brand-600 dark:text-brand-400 flex items-center justify-center text-xl font-black group-hover:scale-110 transition-transform shrink-0">${escapeHtml(sub.nameAr.charAt(0))}</div>
          <div class="px-2 py-1 bg-slate-50 dark:bg-slate-800 rounded-md text-[10px] font-bold text-slate-500">${escapeHtml(sub.examMode)}</div>
        </div>
        <h3 class="text-xl font-black text-slate-900 dark:text-white mb-1 truncate">${escapeHtml(sub.nameAr)}</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400 mb-4 truncate">اضغط للدخول والتدريب</p>
        <div class="mt-auto grid grid-cols-3 gap-2 text-center text-xs border-t border-slate-100 dark:border-slate-800 pt-3">
          <div><div class="font-black text-slate-900 dark:text-white">${sum.units.length || buildSubjectUnits(sub.code).length - 1}</div><div class="text-[9px] text-slate-500 mt-1">وحدة</div></div>
          <div><div class="font-black text-slate-900 dark:text-white">${qs}</div><div class="text-[9px] text-slate-500 mt-1">سؤال</div></div>
          <div><div class="font-black text-brand-600 dark:text-brand-400">${anl ? anl.mastery + '%' : '-'}</div><div class="text-[9px] text-slate-500 mt-1">إتقان</div></div>
        </div>
      </button>
    `;
  }).join('');
}

function renderHome() {
  const recent = (state.data.results || []).slice(0, 5);

  } else {
    const weights = sel.map(u => Number(getSubject(sc).weights[`${u.semester}|${u.unitTitleAr}`] || 1));

}

function getQuestionPdfSource(q, exam) { return q.sourcePdfBase64 || (exam && exam.sourcePdfsMap && q.sourceExamId && exam.sourcePdfsMap[q.sourceExamId]) || (exam && exam.sourcePdf && exam.sourcePdf.base64) || ''; }
function stripBase64Exam(ex) { const c = JSON.parse(JSON.stringify(ex)); if(c.sourcePdf&&c.sourcePdf.base64) delete c.sourcePdf.base64; if(c.sourcePdfsMap) delete c.sourcePdfsMap; ['questions','openQuestions'].forEach(f=>{ (c[f]||[]).forEach(i=>{ if(i&&i.sourcePdfBase64) delete i.sourcePdfBase64; }); }); return c; }

function renderPdfPreview(q, ex, sfx) {
  if (!q || !q.pdfPageRef || !q.pdfPageRef.page) return '';
  const b64 = getQuestionPdfSource(q, ex); if (!b64) return '<div class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-[10px] font-bold text-slate-500 text-center">لا يتوفر PDF أو جاري التحميل...</div>';
  const k = `${q.questionKey || q.id || 'q'}_${sfx || 'exam'}`; window.__PDF_SOURCES[k] = b64;
  return `
    <div class="p-3 bg-slate-50 dark:bg-slate-950 rounded-2xl border border-slate-100 dark:border-slate-800/60 mt-4 md:mt-0">
      <div class="flex items-center gap-2 mb-2"><span class="bg-brand-100 text-brand-700 dark:bg-brand-900/40 dark:text-brand-300 px-2 py-0.5 rounded text-[9px] font-black uppercase">مرجع PDF</span><span class="text-[10px] font-bold">صفحة ${escapeHtml(q.pdfPageRef.page)}</span></div>

    </div>

function renderQuestionCard(q, i, ex, mode) {
  const sess = state.examSession; const rev = state.reviewAttempt;
  const ans = mode === 'review' ? (rev ? rev.answers[q.id] : null) : (sess ? sess.answers[q.id] : null);
  const ro = mode === 'review';
  return `
    <div class="bg-white dark:bg-slate-900 p-5 md:p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-800 mb-5 ${ro ? 'bg-slate-50 dark:bg-slate-900/40' : ''}">
      <div class="text-base md:text-lg font-black leading-relaxed mb-4" data-math><span class="text-brand-600 mr-1">${i+1}.</span> ${escapeHtml(q.text)}</div>
      <div class="grid grid-cols-1 ${q.pdfPageRef ? 'lg:grid-cols-[1fr,250px]' : ''} gap-4 items-start">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 question-options-container">
          ${(q.options||[]).map((opt, oIdx) => {
            const isSel = Number(ans) === oIdx; const isCor = Number(q.correctIndex) === oIdx;
            const cls = ro ? (isCor ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20' : isSel ? 'border-rose-500 bg-rose-50 dark:bg-rose-900/20' : 'border-slate-200 dark:border-slate-700') : (isSel ? 'border-slate-900 bg-slate-900 text-white dark:border-brand-500 dark:bg-brand-900/20 dark:text-brand-300' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400');
            const letCls = (isSel && !ro) ? 'bg-white text-slate-900 dark:bg-brand-500 dark:text-white' : 'border-2 border-slate-200 dark:border-slate-600 text-slate-500';
            return `
              <button ${ro?'disabled':''} data-action="select-answer" data-question-id="${q.id}" data-index="${oIdx}" class="text-right p-3 rounded-xl border-2 transition-all flex items-center gap-3 ${cls}">
                <div class="w-6 h-6 rounded-full shrink-0 flex items-center justify-center font-black text-[10px] transition-colors ${letCls}">${String.fromCharCode(65+oIdx)}</div>
                <div class="font-bold text-sm leading-snug" data-math>${escapeHtml(opt)}</div>
              </button>
            `;

    renderPdfCanvases();

async function renderPdfCanvases() {
  if (!window.pdfjsLib) return;
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const canvases = Array.from(document.querySelectorAll('.pdf-canvas:not([data-rendered="true"])'));
  for (const canvas of canvases) {
    canvas.setAttribute('data-rendered', 'true');
    const k = canvas.getAttribute('data-pdf-key'); const pNum = Number(canvas.getAttribute('data-page')||1);
    const b64 = window.__PDF_SOURCES[k]; if (!b64) continue;
    try {
      if (!window.__PDF_DOCS[k]) {
        const bin = atob(b64); const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        window.__PDF_DOCS[k] = await window.pdfjsLib.getDocument({ data: bytes }).promise;
      }
      const pdf = window.__PDF_DOCS[k]; const page = await pdf.getPage(pNum);
      const vp = page.getViewport({ scale: 1.5 }); const ctx = canvas.getContext('2d');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
    } catch (e) { canvas.parentElement.innerHTML = '<div class="p-3 text-[10px] font-bold text-rose-500 text-center">خطأ في قراءة الـ PDF</div>'; }
  }
}

function clearExamTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }
function updateProgressUI() {
  if (!state.examSession) return;
  const p = percent(Object.keys(state.examSession.answers).length, (state.examSession.exam.questions||[]).length||1);
  const pt = document.getElementById('exam-progress-text'); if(pt) pt.innerText = `أُنجز ${p}%`;
  const pb = document.getElementById('exam-progress-bar'); if(pb) pb.style.width = `${p}%`;
}
function startExamTimer() {
  clearExamTimer(); if (!state.examSession) return;
  state.examSession.timeSpent = 0;
  state.timerId = setInterval(() => {
    if (!state.examSession) { clearExamTimer(); return; }
    state.examSession.timeSpent += 1;
    const c = document.getElementById('exam-timer-display');
    if (c) c.innerText = `${String(Math.floor(state.examSession.timeSpent/60)).padStart(2,'0')}:${String(state.examSession.timeSpent%60).padStart(2,'0')}`;
  }, 1000);
}

async function loadExam(id) { const r = await api('getExamBundle', { examId: id }); return r.exam; }
function prepareExamForStart(ex) { state.prestartExam = { exam: ex }; render(); }
function beginExam(ex) { state.prestartExam = null; state.reviewAttempt = null; state.examSession = { exam: ex, answers: {}, timeSpent: 0 }; render(); startExamTimer(); }

async function submitExam() {
  if (!state.examSession) return;
  const s = state.examSession; const ex = s.exam; const w = []; let cc = 0; let tq = 0;
  (ex.questions||[]).forEach(q => {
    if (q.correctIndex == null) return;
    tq++; const isCor = Number(s.answers[q.id]) === Number(q.correctIndex);
    if (isCor) cc++;
    else { const snp = JSON.parse(JSON.stringify(q)); delete snp.sourcePdfBase64; w.push({ questionId: q.id, sourceExamId: q.sourceExamId || ex.id, subjectCode: q.subjectCode||ex.subjectCode||'', subjectAr: q.subjectAr||ex.subjectAr||'', semester: q.semester!=null?q.semester:ex.semester, unitTitleAr: q.unitTitleAr||ex.unitTitleAr||'', questionSnapshot: snp }); }
  });
  const sc = percent(cc, tq||1);
  try {
    setLoading(true);
    const r = await api('submitResult', { userId: state.user.id, userName: state.user.name, examId: ex.id, examTitle: ex.title||'', subjectCode: ex.subjectCode||'', subjectAr: ex.subjectAr||'', semester: ex.semester!=null?ex.semester:0, unitTitleAr: ex.unitTitleAr||'', score: sc, totalQuestions: tq, correctCount: cc, answers: s.answers, wrongItems: w, examSnapshot: stripBase64Exam(ex) });
    clearExamTimer(); state.examSession = null; await refreshData(); await openAttemptReview(r.attemptId); showToast('تم الحفظ بنجاح');
  } catch (e) { showToast('خطأ التسليم: '+e.message, 'error'); } finally { setLoading(false); render(); }
}

async function openAttemptReview(id) { try { setLoading(true); const r = await api('getAttemptReview', { attemptId: id }); state.reviewAttempt = r.attempt; state.examSession = null; clearExamTimer(); } catch(e) { showToast(e.message, 'error'); } finally { setLoading(false); render(); } }
async function generateRedo(p) { try { setLoading(true); let r; if(p.attemptId) r = await api('buildWrongRedo', { userId: state.user.id, resultId: p.attemptId }); else r = await api('generateRedoExam', Object.assign({ userId: state.user.id, limit: 50 }, p)); prepareExamForStart(r.exam); } catch(e) { showToast(e.message, 'error'); } finally { setLoading(false); render(); } }
async function generateCustomExam() {
  try {
    const sel = state.builder.selectedUnitKeys; if(!sel.length) return showToast('اختر وحدة واحدة على الأقل', 'error');
    if(state.builder.mode==='manual' && !sel.some(k=>Number(state.builder.explicitCounts[k]||0)>0)) return showToast('حدد عدد الأسئلة', 'error');
    setLoading(true);
    const r = await api('buildCustomExam', { subjectCode: state.subjectCode, totalQuestions: Number(state.builder.totalQuestions||100), duration: 0, mode: state.builder.mode, selectedUnits: sel, selectedExamIds: state.builder.selectedExamIds, explicitUnitCounts: state.builder.explicitCounts, title: 'اختبار مخصص' });
    prepareExamForStart(r.exam);
  } catch(e) { showToast(e.message, 'error'); } finally { setLoading(false); render(); }
}

document.addEventListener('click', async e => {
  const t = e.target.closest('[data-action]'); if(!t) return;
  const a = t.getAttribute('data-action');
  try {
    if(a==='login'){ const v=String(document.getElementById('login-name')?.value||'').trim(); if(!v)return showToast('أدخل اسمك','error'); state.user={id:v.replace(/\s+/g,'_'),name:v}; saveLocal(CONFIG.STORAGE_KEYS.user,state.user); await refreshData(); return; }
    if(a==='logout'){ localStorage.removeItem(CONFIG.STORAGE_KEYS.user); state.user=null; state.examSession=null; state.reviewAttempt=null; state.subjectCode=null; clearExamTimer(); render(); return; }
    if(a==='toggle-dark'){ setDarkMode(!state.darkMode); return; }
    if(a==='go-home'){ backToHome(); return; }
    if(a==='open-subject'){ openSubject(t.getAttribute('data-subject-code')); return; }
    if(a==='subject-tab'){ state.subjectTab=t.getAttribute('data-tab'); render(); return; }
    if(a==='select-unit'){ state.unitKey=t.getAttribute('data-unit-key'); render(); return; }
    if(a==='prepare-exam'){ setLoading(true); const ex=await loadExam(t.getAttribute('data-exam-id')); prepareExamForStart(ex); state.loading=false; render(); return; }
    if(a==='close-prestart'){ state.prestartExam=null; render(); return; }
    if(a==='start-prepared-exam'){ beginExam(state.prestartExam.exam); return; }
    if(a==='select-answer'){
      if(!state.examSession)return; const qid=t.getAttribute('data-question-id'); const idx=Number(t.getAttribute('data-index')); state.examSession.answers[qid]=idx;
      const c=t.closest('.question-options-container'); if(c){ c.querySelectorAll('button[data-action="select-answer"]').forEach((b,bi)=>{ const s=bi===idx; b.className=`text-right p-3 rounded-xl border-2 transition-all flex items-center gap-3 ${s?'border-slate-900 bg-slate-900 text-white dark:border-brand-500 dark:bg-brand-900/20 dark:text-brand-300':'border-slate-200 dark:border-slate-700 hover:border-slate-400'}`; const l=b.querySelector('div.w-6'); if(l) l.className=`w-6 h-6 rounded-full shrink-0 flex items-center justify-center font-black text-[10px] transition-colors ${s?'bg-white text-slate-900 dark:bg-brand-500 dark:text-white':'border-2 border-slate-200 dark:border-slate-600 text-slate-500'}`; }); }
      updateProgressUI(); return;
    }
    if(a==='submit-exam'){ if(confirm('متأكد من تسليم الامتحان؟')) await submitExam(); return; }
    if(a==='review-attempt'){ await openAttemptReview(t.getAttribute('data-attempt-id')); return; }
    if(a==='close-review'){ state.reviewAttempt=null; render(); return; }
    if(a==='redo-attempt'){ await generateRedo({ attemptId: t.getAttribute('data-attempt-id') }); return; }
    if(a==='redo-by-subject'){ await generateRedo({ subjectCode: t.getAttribute('data-subject-code') }); return; }
    if(a==='toggle-builder-unit'){
      const uk=t.getAttribute('data-unit-key'); if(t.checked){ if(!state.builder.selectedUnitKeys.includes(uk)){ state.builder.selectedUnitKeys.push(uk); getExamsForUnit(state.subjectCode,uk).forEach(e=>{ if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); }); } }
      else { state.builder.selectedUnitKeys=state.builder.selectedUnitKeys.filter(k=>k!==uk); delete state.builder.explicitCounts[uk]; const ue=getExamsForUnit(state.subjectCode,uk).map(x=>x.id); state.builder.selectedExamIds=state.builder.selectedExamIds.filter(id=>!ue.includes(id)); } render(); return;
    }
    if(a==='build-custom-exam'){ await generateCustomExam(); return; }
    if(a==='open-admin'){ openAdmin(); return; }
    if(a==='close-admin'){ closeAdmin(); return; }
    if(a==='admin-login-submit'){ await adminLogin(document.getElementById('admin-password-input').value); return; }
    
    // مسارات التتبع للوحة الإدارة 
    if(a==='admin-tab'){ state.admin.tab=t.getAttribute('data-tab'); state.admin.selectedUserId=null; state.admin.selectedSubjectCode=null; render(); return; }
    if(a==='admin-select-user'){ state.admin.selectedUserId=t.getAttribute('data-uid'); state.admin.selectedSubjectCode=null; render(); return; }
    if(a==='admin-select-subject'){ state.admin.selectedSubjectCode=t.getAttribute('data-sc'); render(); return; }
    if(a==='admin-view-attempt'){ state.admin.open=false; await openAttemptReview(t.getAttribute('data-attempt-id')); return; }

    if(a==='admin-edit-exam'){ try{ setLoading(true); const ex=await loadExam(t.getAttribute('data-exam-id')); state.admin.tab='upload'; state.admin.form.editingExamId=ex.id; state.admin.form.subjectCode=ex.subjectCode; state.admin.form.unitKey=makeUnitKey(ex.subjectCode,ex.semester,ex.unitTitleAr); const c=JSON.parse(JSON.stringify(ex)); delete c.id; if(c.sourcePdf&&c.sourcePdf.base64) delete c.sourcePdf.base64; window.__EDIT_JSON=JSON.stringify(c,null,2); render(); }catch(e){ showToast('خطأ','error'); }finally{ setLoading(false); } return; }
    if(a==='admin-delete-exam'){ if(confirm('حذف الامتحان نهائياً؟')){ try{ setLoading(true); await api('deleteExam',{adminPassword:CONFIG.ADMIN_PASSWORD,examId:t.getAttribute('data-exam-id')}); showToast('تم الحذف'); await refreshData(); }catch(e){}finally{ setLoading(false); render(); } } return; }
    if(a==='admin-upload-submit'){
      if(!state.admin.form.subjectCode||!state.admin.form.unitKey)return showToast('اختر المادة والوحدة','error');
      const jt=document.getElementById('admin-json-input').value; if(!jt)return showToast('أدخل JSON','error');
      let pj; try{ pj=JSON.parse(jt); }catch(e){ return showToast('JSON غير صالح','error'); }
      const sInf=CURRICULUM.subjects.find(s=>s.code===state.admin.form.subjectCode); const uInf=parseUnitKey(state.admin.form.unitKey);
      pj.subjectCode=sInf.code; pj.subjectAr=sInf.nameAr; pj.semester=uInf.semester; pj.unitTitleAr=uInf.unitTitleAr;
      (pj.questions||[]).forEach(q=>{ q.subjectCode=sInf.code; q.subjectAr=sInf.nameAr; q.semester=uInf.semester; q.unitTitleAr=uInf.unitTitleAr; });
      try{ setLoading(true); await api('uploadExam',{adminPassword:CONFIG.ADMIN_PASSWORD,examJson:JSON.stringify(pj),pdfDataUrl:state.admin.form.pdfDataUrl,pdfFileName:state.admin.form.pdfFileName,examId:state.admin.form.editingExamId}); showToast('تم الحفظ'); state.admin.form.editingExamId=null; window.__EDIT_JSON=''; await refreshData(); }catch(e){ showToast(e.message,'error'); }finally{ setLoading(false); render(); } return;
    }
    if(a==='close-toast'){ state.toast=null; render(); return; }
  } catch(e) { showToast(e.message, 'error'); }
});

document.addEventListener('change', e => {
  const bf = e.target.getAttribute('data-builder-field');
  if(bf){ if(bf==='mode') state.builder.mode=e.target.value; if(bf==='totalQuestions') state.builder.totalQuestions=Number(e.target.value||0); render(); return; }
  if(e.target.getAttribute('data-action')==='set-builder-unit-count'){ state.builder.explicitCounts[e.target.getAttribute('data-unit-key')]=Number(e.target.value||0); render(); return; }
  if(e.target.id==='admin-subject-select'){ state.admin.form.subjectCode=e.target.value; state.admin.form.unitKey=''; render(); return; }
  if(e.target.id==='admin-unit-select'){ state.admin.form.unitKey=e.target.value; render(); return; }
  if(e.target.id==='admin-json-file'){ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ document.getElementById('admin-json-input').value=ev.target.result; }; r.readAsText(f); } }
  if(e.target.id==='admin-pdf-file'){ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ state.admin.form.pdfDataUrl=ev.target.result; state.admin.form.pdfFileName=f.name; render(); }; r.readAsDataURL(f); } }
});

render(); if(state.user) refreshData();
</script>
</body>
</html>
