const STRICT_JSON_PROMPT = `You are converting an exam PDF into a STRICT, VALID JSON file for an online exam system.

Your output must be a single raw JSON object only.

CRITICAL OUTPUT RULES:
1. Output JSON only.
2. Do NOT add markdown fences.
3. Do NOT wrap the JSON in quotation marks.
4. Do NOT add comments.
5. Do NOT add explanations before or after the JSON.
6. Every property name must be in double quotes.
7. Every string value must be in double quotes.
8. Escape any internal double quotes inside text using backslash, like: \"example\"
9. Do not leave trailing commas.
10. The result must be directly parseable by JSON.parse().

SOURCE RULES:
1. Use ONLY the provided PDF content.
2. Do NOT use outside knowledge.
3. Do NOT invent questions, answers, images, charts, tables, or explanations.
4. If an answer is not explicitly present in the PDF, set:
   "correctIndex": null
5. If a question depends on an image, chart, graph, table, or diagram in the PDF:
   - identify the PDF page that contains that visual
   - add a "pdfPageRef" object to that question
6. The visual reference must come only from the PDF itself.
7. If no visual is needed for a question, do not add "pdfPageRef".

LANGUAGE AND TEXT RULES:
1. Preserve the original question wording from the PDF as closely as possible.
2. Preserve Arabic exactly as it appears, but fix obvious OCR junk only when necessary for readability.
3. If the source contains quotation marks inside text, escape them properly.
4. Keep question order exactly as in the PDF.
5. Keep options order exactly as in the PDF.
6. Do not paraphrase unless OCR is clearly broken.

JSON SCHEMA:
The output must follow this exact structure:

{
  "title": "",
  "subjectCode": "",
  "subjectAr": "",
  "semester": null,
  "unitTitleAr": "",
  "subunitTitleAr": "",
  "examMode": "OMR_MCQ",
  "duration": null,
  "sourcePdf": {
    "fileName": "source.pdf"
  },
  "questions": [
    {
      "id": "q1",
      "text": "",
      "options": ["", "", "", ""],
      "correctIndex": 0,
      "explanation": ""
    }
  ],
  "openQuestions": []
}

RULES FOR QUESTIONS:
1. "id" must be sequential:
   q1, q2, q3, q4 ...
2. "text" must contain the full MCQ prompt.
3. "options" must be an array of the visible answer choices in the same order as the PDF.
4. "correctIndex" must be:
   - 0 for first option
   - 1 for second option
   - 2 for third option
   - 3 for fourth option
5. If no answer is explicitly present in the PDF, use:
   "correctIndex": null
6. "explanation" should be:
   - "" if no explanation exists in the PDF
   - or copied from the PDF only if explicitly present
7. Do not generate explanations from reasoning.

RULES FOR VISUAL QUESTIONS:
If a question depends on a picture, chart, graph, table, figure, or diagram from the PDF, add this field:

"pdfPageRef": {
  "page": 1,
  "visualType": "image",
  "description": "",
  "showFullPage": true
}

RULES FOR pdfPageRef:
1. "page" must be the PDF page number where the needed visual appears.
2. "visualType" must be one of:
   "image"
   "chart"
   "graph"
   "table"
   "diagram"
3. "description" must briefly describe what exists on that page and how it relates to the question.
4. "showFullPage" must always be true.
5. Add "pdfPageRef" only if the question actually needs a visual from the PDF.

IMPORTANT VALIDATION RULES:
1. The final result must be one JSON object starting with { and ending with }.
2. Do not output this:
   "{ ... }"
   It must be:
   { ... }
3. Make sure every object property is separated by a comma.
4. Make sure there is no comma after the last property in an object.
5. Make sure there is no comma after the last item in an array.
6. Escape internal quotes inside Arabic or English text.
7. Use null only without quotes when needed.
8. Use true only without quotes.
9. Do not use undefined.
10. Do not invent extra fields outside the schema unless the question needs "pdfPageRef".

FINAL INSTRUCTION:
Return raw valid JSON only, matching the schema exactly, with no markdown, no surrounding quotes, no comments, and no extra text.`;

function cls(...parts){ return parts.filter(Boolean).join(' '); }
function unitKey(subjectCode, semester, unitTitleAr){ return [subjectCode || '', semester == null ? '' : semester, unitTitleAr || ''].join('||'); }
function getSubjectByCode(code){ return CURRICULUM.subjects.find(s => s.code === code) || null; }
function getBankUnitMap(summary){ return summary?.byUnit || {}; }
function loadLocal(key, fallback){ try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; } }
function saveLocal(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function formatDate(value){ if(!value) return ''; try{ return new Date(value).toLocaleString('ar-JO'); }catch{ return value; } }
function normalizeText(v){ return String(v || '').trim().toLowerCase(); }
function round2(n){ return Math.round(Number(n || 0) * 100) / 100; }
function copy(obj){ return JSON.parse(JSON.stringify(obj)); }
function stripExamDataUrl(exam){ const next = copy(exam || {}); if(next.sourcePdf) delete next.sourcePdf.dataUrl; (next.questions || []).forEach(q => { if(q.sourcePdf) delete q.sourcePdf.dataUrl; }); (next.openQuestions || []).forEach(q => { if(q.sourcePdf) delete q.sourcePdf.dataUrl; }); return next; }

async function api(action, payload = {}){
  const res = await fetch(CONFIG.API_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload })
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || 'Unknown API error');
  return data;
}

async function readFileAsText(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => resolve(String(reader.result || ''));
    reader.readAsText(file, 'utf-8');
  });
}

async function readFileAsDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => resolve(String(reader.result || ''));
    reader.readAsDataURL(file);
  });
}

function useToast(){
  const [toast, setToast] = useState(null);
  function show(message, tone='success'){
    setToast({ id: Date.now(), message, tone });
    setTimeout(() => setToast(null), 3600);
  }
  return { toast, show, clear: () => setToast(null) };
}

  return <button {...props} className={cls('px-4 py-3 rounded-2xl font-bold transition disabled:opacity-50 disabled:cursor-not-allowed', styles[variant], className)} />;

function StartExamCard({exam, latestAttempt, onStart, onReview, onRedoWrong, onRetakeWhole}){
  const correct = Number(latestAttempt?.correctCount || 0);
  const total = Number(latestAttempt?.totalMcq || exam.questionCount || 0);
  const wrong = total ? Math.max(0, total - correct) : 0;
  const canRedoWrong = !!latestAttempt && Array.isArray(latestAttempt.wrongItems) && latestAttempt.wrongItems.length > 0;
  return (
    <Card className="p-5">
      <div className="flex items-start justify-between gap-3">
        <div>
          <div className="text-xs font-bold text-brand-600 dark:text-brand-300">{exam.examMode || 'OMR_MCQ'}</div>
          <div className="mt-2 text-xl font-black">{exam.title}</div>
          <div className="mt-2 text-sm text-slate-500 dark:text-slate-400">{exam.subjectAr} • {exam.unitTitleAr || 'بدون وحدة'}</div>
        </div>
        <div className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-1 text-sm font-black">{exam.duration ? Math.round(exam.duration / 60) : '-'} د</div>
      </div>
      <div className="mt-5 grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="rounded-2xl bg-slate-100 dark:bg-slate-800 p-3"><div className="text-xs text-slate-500 dark:text-slate-400">MCQ</div><div className="font-black text-xl mt-1">{exam.questionCount}</div></div>
        <div className="rounded-2xl bg-slate-100 dark:bg-slate-800 p-3"><div className="text-xs text-slate-500 dark:text-slate-400">تغيير الوقت</div><div className="font-black text-sm mt-2">{exam.settings?.allowStudentChangeTime ? 'متاح' : 'مغلق'}</div></div>
        <div className="rounded-2xl bg-slate-100 dark:bg-slate-800 p-3"><div className="text-xs text-slate-500 dark:text-slate-400">آخر صحيح</div><div className="font-black text-xl mt-1">{latestAttempt ? correct : '-'}</div></div>
        <div className="rounded-2xl bg-slate-100 dark:bg-slate-800 p-3"><div className="text-xs text-slate-500 dark:text-slate-400">آخر خطأ</div><div className="font-black text-xl mt-1">{latestAttempt ? wrong : '-'}</div></div>
      </div>
      {latestAttempt ? <div className="mt-3 text-sm text-slate-500 dark:text-slate-400">آخر محاولة: {formatDate(latestAttempt.createdAt)} • النتيجة {latestAttempt.score}%</div> : <div className="mt-3 text-sm text-slate-500 dark:text-slate-400">لم يتم تقديم هذا الامتحان بعد.</div>}
      <div className="mt-5 flex flex-wrap gap-2">
        <Button variant="brand" onClick={() => onStart(exam)}>ابدأ الامتحان</Button>
        {latestAttempt ? <Button variant="outline" onClick={() => onReview(latestAttempt.attemptId)}>مراجعة</Button> : null}
        {canRedoWrong ? <Button variant="soft" onClick={() => onRedoWrong(latestAttempt)}>إعادة الخاطئ فقط</Button> : null}
        {latestAttempt ? <Button variant="soft" onClick={() => onRetakeWhole(exam)}>إعادة الامتحان كاملًا</Button> : null}
      </div>
    </Card>
  );
}

function SubjectPage({subjectCode, catalog, results, analytics, onBackHome, onStartExam, onReviewAttempt, onRedoAttempt, onOpenCustomExam}){
  const subject = getSubjectByCode(subjectCode);
  const subjectExams = (catalog.exams || []).filter(ex => ex.subjectCode === subjectCode);
  const bankSummary = catalog.questionBankSummary || {};
  const unitMap = getBankUnitMap(bankSummary);
  const comprehensiveLabel = CURRICULUM.comprehensiveLabel;
  const unitCards = useMemo(() => {
    const list = (subject?.units || []).map(u => ({ ...u, key: unitKey(subjectCode, u.semester, u.titleAr), unitTitleAr: u.titleAr }));
    list.push({ semester: 'both', titleAr: comprehensiveLabel, unitTitleAr: comprehensiveLabel, weight: null, isComprehensive: true, key: unitKey(subjectCode, 'both', comprehensiveLabel) });
    return list;
  }, [subjectCode]);
  const [tab, setTab] = useState('units');
  const [selectedUnitKey, setSelectedUnitKey] = useState(unitCards[0]?.key || '');
  useEffect(() => { setSelectedUnitKey(unitCards[0]?.key || ''); }, [subjectCode]);

  const selectedUnit = unitCards.find(u => u.key === selectedUnitKey) || unitCards[0];
  const examsForSelectedUnit = useMemo(() => {
    if(!selectedUnit) return [];
    if(selectedUnit.isComprehensive){
      return subjectExams.filter(ex => ex.unitTitleAr === comprehensiveLabel || String(ex.semester) === 'both');
    }
    return subjectExams.filter(ex => String(ex.semester) === String(selectedUnit.semester) && ex.unitTitleAr === selectedUnit.unitTitleAr);
  }, [selectedUnitKey, subjectExams]);

  const resultsByExam = useMemo(() => {
    const map = {};
    results.forEach(r => {
      if(!r.examId || (r.subjectCode !== subjectCode)) return;
      if(!map[r.examId] || new Date(r.createdAt) > new Date(map[r.examId].createdAt)) map[r.examId] = r;
    });
    return map;
  }, [results, subjectCode]);

  const subjectAnalytics = analytics?.unitStats?.filter(u => u.subjectCode === subjectCode) || [];
  const subjectAttempts = results.filter(r => r.subjectCode === subjectCode).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  const totalBankQuestions = bankSummary.bySubject?.[subjectCode] || 0;

  return (
    <div className="space-y-6">
      <Card className={cls('p-6 bg-gradient-to-br text-white border-none shadow-glow', subject.colorFrom, subject.colorTo)}>
        <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">
          <div>
            <div className="text-sm font-bold text-white/75">{CONFIG.APP_NAME}</div>
            <div className="text-4xl font-black mt-2">{subject.nameAr}</div>
            <div className="mt-3 text-white/80">اختر الوحدة لعرض امتحاناتها، أو ابنِ امتحانك المخصص من بنك الأسئلة.</div>
          </div>
          <div className="grid grid-cols-2 gap-3 min-w-[220px]">
            <div className="rounded-3xl bg-white/10 p-4"><div className="text-white/70 text-sm">الأسئلة</div><div className="text-3xl font-black mt-1">{totalBankQuestions}</div></div>
            <div className="rounded-3xl bg-white/10 p-4"><div className="text-white/70 text-sm">الامتحانات</div><div className="text-3xl font-black mt-1">{subjectExams.length}</div></div>
          </div>
        </div>
      </Card>

      <div className="flex flex-wrap gap-2">
        {[
          ['units', 'الوحدات'],
          ['custom', 'امتحان مخصص من البنك'],
          ['analytics', 'التقييم'],
          ['reviews', 'المراجعات والأخطاء']
        ].map(([id,label]) => <button key={id} onClick={() => setTab(id)} className={cls('px-4 py-3 rounded-2xl font-bold', tab === id ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900' : 'bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800')}>{label}</button>)}
        <Button variant="outline" onClick={onBackHome}>العودة للمواد</Button>
      </div>

      {tab === 'units' ? (
        <>
          <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
            {unitCards.map(unit => {
              const bankCount = unit.isComprehensive ? 0 : (unitMap[unit.key]?.count || 0);
              const examCount = unit.isComprehensive
                ? subjectExams.filter(ex => ex.unitTitleAr === comprehensiveLabel || String(ex.semester) === 'both').length
                : subjectExams.filter(ex => String(ex.semester) === String(unit.semester) && ex.unitTitleAr === unit.unitTitleAr).length;
              return <UnitStatCard key={unit.key} unit={unit} selected={selectedUnitKey === unit.key} onSelect={setSelectedUnitKey} bankCount={bankCount} examCount={examCount} />;
            })}
          </div>

          {selectedUnit ? (
            <Card className="p-6">
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <div className="text-sm font-bold text-brand-600 dark:text-brand-300">{selectedUnit.isComprehensive ? 'الفصلان معًا' : `الفصل ${Number(selectedUnit.semester) === 1 ? 'الأول' : 'الثاني'}`}</div>
                  <h2 className="text-3xl font-black mt-1">{selectedUnit.unitTitleAr}</h2>
                </div>
                <Button variant="brand" onClick={() => setTab('custom')}>أضفها للامتحان المخصص</Button>
              </div>
              <div className="mt-5 grid gap-4 lg:grid-cols-2">
                {examsForSelectedUnit.length ? examsForSelectedUnit.map(exam => (
                  <StartExamCard

                    exam={exam}
                    latestAttempt={resultsByExam[exam.id]}
                    onStart={onStartExam}
                    onReview={onReviewAttempt}
                    onRedoWrong={onRedoAttempt}
                    onRetakeWhole={onStartExam}
                  />

              </div>

          ) : null}

      {tab === 'custom' ? (

      {tab === 'analytics' ? (
        <Card className="p-6">
          <h2 className="text-2xl font-black">تقييم المادة حسب الوحدات</h2>
          <div className="mt-5 grid md:grid-cols-2 xl:grid-cols-3 gap-4">
            {subjectAnalytics.length ? subjectAnalytics.map((row, i) => (
              <div key={i} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4">
                <div className="text-xs font-bold text-brand-600 dark:text-brand-300">{row.semester ? `الفصل ${Number(row.semester) === 1 ? 'الأول' : 'الثاني'}` : ''}</div>
                <div className="mt-2 text-xl font-black">{row.unitTitleAr}</div>
                <div className="mt-3 text-sm text-slate-500 dark:text-slate-400">الإتقان: {row.mastery}%</div>
                <div className="text-sm text-slate-500 dark:text-slate-400">المحاولات: {row.attempted}</div>
                <div className={cls('mt-3 inline-flex rounded-full px-3 py-1 text-sm font-bold', row.mastery >= 70 ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/30 dark:text-emerald-200' : 'bg-red-100 text-red-700 dark:bg-red-950/30 dark:text-red-200')}>{row.mastery >= 70 ? 'نقطة قوة' : 'نقطة ضعف'}</div>
              </div>
            )) : <div className="text-slate-500 dark:text-slate-400">لا توجد بيانات كافية بعد.</div>}
          </div>
        </Card>
      ) : null}

      {tab === 'reviews' ? (
        <Card className="p-6">
          <h2 className="text-2xl font-black">محاولات المادة</h2>
          <div className="mt-5 grid lg:grid-cols-2 gap-4">
            {subjectAttempts.length ? subjectAttempts.map(attempt => (
              <div key={attempt.attemptId} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4">
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <div className="font-black">{attempt.examTitle || attempt.subjectAr}</div>
                    <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">{attempt.unitTitleAr || 'بدون وحدة'} • {formatDate(attempt.createdAt)}</div>
                  </div>
                  <div className="text-3xl font-black text-brand-600 dark:text-brand-300">{attempt.score}%</div>
                </div>
                <div className="mt-4 flex flex-wrap gap-2">
                  <Button variant="outline" onClick={() => onReviewAttempt(attempt.attemptId)}>مراجعة</Button>
                  {attempt.wrongItems?.length ? <Button variant="soft" onClick={() => onRedoAttempt(attempt)}>إعادة الخاطئ فقط</Button> : null}
                </div>
              </div>
            )) : <div className="text-slate-500 dark:text-slate-400">لا توجد محاولات لهذه المادة بعد.</div>}
          </div>
        </Card>
      ) : null}
    </div>
  );
}

function CustomExamBuilder({subject, exams, bankSummary, onBuild}){
  const unitMap = getBankUnitMap(bankSummary);
  const [mode, setMode] = useState('weighted');
  const [totalQuestions, setTotalQuestions] = useState(100);
  const [duration, setDuration] = useState(120);
  const [selectedKeys, setSelectedKeys] = useState(subject.units.reduce((acc, unit) => ({ ...acc, [unitKey(subject.code, unit.semester, unit.titleAr)]: true }), {}));
  const [manualCounts, setManualCounts] = useState({});
  const [selectedExamIds, setSelectedExamIds] = useState({});

  const selectedUnits = subject.units.filter(unit => selectedKeys[unitKey(subject.code, unit.semester, unit.titleAr)]).map(unit => ({
    subjectCode: subject.code,
    semester: unit.semester,
    unitTitleAr: unit.titleAr,
    weight: unit.weight,
    key: unitKey(subject.code, unit.semester, unit.titleAr)
  }));

  const preview = useMemo(() => {
    const grouped = {};
    selectedUnits.forEach(unit => {
      grouped[unit.key] = { available: unitMap[unit.key]?.count || 0 };
    });
    if(mode === 'manual'){
      return selectedUnits.map(unit => ({
        ...unit,
        available: grouped[unit.key]?.available || 0,
        requested: Math.min(Number(manualCounts[unit.key] || 0), grouped[unit.key]?.available || 0),
        effectivePercent: 0,
        mode: 'manual'
      }));
    }
    const sum = selectedUnits.reduce((acc, unit) => acc + Number(unit.weight || 0), 0);
    return selectedUnits.map(unit => {
      const effectivePercent = sum ? round2((Number(unit.weight || 0) / sum) * 100) : 0;
      const requested = Math.min(Math.round((Number(totalQuestions || 0) * effectivePercent) / 100), grouped[unit.key]?.available || 0);
      return { ...unit, available: grouped[unit.key]?.available || 0, requested, effectivePercent, mode: 'weighted' };
    });
  }, [selectedKeys, manualCounts, totalQuestions, mode, bankSummary]);

  const selectedSourceExamIds = Object.keys(selectedExamIds).filter(id => selectedExamIds[id]);

  return (
    <Card className="p-6">
      <div className="grid xl:grid-cols-[1fr,1.1fr] gap-6">
        <div className="space-y-4">
          <h2 className="text-2xl font-black">ابنِ امتحانك المخصص من البنك</h2>
          <div className="grid md:grid-cols-3 gap-4">
            <Select label="وضع التوزيع" value={mode} onChange={e => setMode(e.target.value)}>
              <option value="weighted">توزيع وزني تلقائي</option>
              <option value="manual">تحديد يدوي لكل وحدة</option>
            </Select>
            <Input label="إجمالي الأسئلة" type="number" value={totalQuestions} onChange={e => setTotalQuestions(e.target.value)} disabled={mode === 'manual'} />
            <Input label="الوقت (بالدقائق)" type="number" value={duration} onChange={e => setDuration(e.target.value)} />
          </div>

          <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-3">
            {subject.units.map(unit => {
              const key = unitKey(subject.code, unit.semester, unit.titleAr);
              const available = unitMap[key]?.count || 0;
              return (
                <label key={key} className={cls('rounded-3xl border p-4 cursor-pointer', selectedKeys[key] ? 'border-brand-500 bg-brand-50 dark:bg-brand-950/20 dark:border-brand-700' : 'border-slate-200 dark:border-slate-800')}>
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <div className="text-xs font-bold text-brand-600 dark:text-brand-300">الفصل {Number(unit.semester) === 1 ? 'الأول' : 'الثاني'}</div>
                      <div className="mt-1 font-black">{unit.titleAr}</div>
                      <div className="mt-2 text-sm text-slate-500 dark:text-slate-400">الوزن: %{unit.weight} • البنك: {available}</div>
                    </div>
                    <input type="checkbox" checked={!!selectedKeys[key]} onChange={e => setSelectedKeys(prev => ({ ...prev, [key]: e.target.checked }))} />
                  </div>
                  {mode === 'manual' && selectedKeys[key] ? (
                    <div className="mt-4">
                      <Input label="عدد الأسئلة من هذه الوحدة" type="number" value={manualCounts[key] || ''} onChange={e => setManualCounts(prev => ({ ...prev, [key]: e.target.value }))} />
                    </div>
                  ) : null}
                </label>
              );
            })}
          </div>

          <Card className="p-4 bg-slate-50 dark:bg-slate-950">
            <div className="text-lg font-black">تحديد الامتحانات المصدرية (اختياري)</div>
            <div className="mt-4 max-h-80 overflow-y-auto space-y-4 scroll-thin">
              {subject.units.map(unit => {
                const unitExams = exams.filter(ex => String(ex.semester) === String(unit.semester) && ex.unitTitleAr === unit.titleAr);
                return (
                  <div key={unit.titleAr} className="rounded-2xl border border-slate-200 dark:border-slate-800 p-3">
                    <div className="font-black">{unit.titleAr}</div>
                    <div className="mt-3 space-y-2">
                      {unitExams.length ? unitExams.map(exam => (
                        <label key={exam.id} className="flex items-center justify-between gap-3 text-sm">
                          <span>{exam.title}</span>
                          <input type="checkbox" checked={!!selectedExamIds[exam.id]} onChange={e => setSelectedExamIds(prev => ({ ...prev, [exam.id]: e.target.checked }))} />
                        </label>
                      )) : <div className="text-sm text-slate-500 dark:text-slate-400">لا توجد امتحانات مرفوعة لهذه الوحدة. سيتم السحب من البنك العام إذا وُجد.</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>

        <div className="space-y-4">
          <Card className="p-4 bg-slate-50 dark:bg-slate-950">
            <div className="text-lg font-black">المعاينة الحالية</div>
            <div className="mt-4 space-y-3">
              {preview.length ? preview.map(item => (
                <div key={item.key} className="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4">
                  <div className="font-black">{item.unitTitleAr}</div>
                  <div className="mt-2 text-sm text-slate-500 dark:text-slate-400">{item.mode === 'weighted' ? `النسبة بعد التطبيع: %${item.effectivePercent}` : 'توزيع يدوي'}</div>
                  <div className="text-sm text-slate-500 dark:text-slate-400">المتاح في البنك: {item.available}</div>
                  <div className="text-sm text-slate-500 dark:text-slate-400">المطلوب: {item.requested}</div>
                </div>
              )) : <div className="text-slate-500 dark:text-slate-400">حدّد وحدة واحدة على الأقل.</div>}
            </div>
            <Button variant="brand" className="w-full mt-4" onClick={() => onBuild({
              subjectCode: subject.code,
              selectedUnits: selectedUnits,
              totalQuestions: Number(totalQuestions || 0),
              duration: Number(duration || 0) * 60,
              manualCounts: mode === 'manual' ? manualCounts : {},
              sourceExamIds: selectedSourceExamIds
            })} disabled={!selectedUnits.length}>كوّن الامتحان الآن</Button>
          </Card>
        </div>
      </div>
    </Card>
  );
}

function PdfPagePreview({pdfDataUrl, pageNumber, description}){
  const [imgSrc, setImgSrc] = useState('');
  const [error, setError] = useState('');
  useEffect(() => {
    let mounted = true;
    async function renderPage(){
      try{
        setError('');
        if(!pdfDataUrl || !pageNumber) return;
        const pdf = await pdfjsLib.getDocument({ data: atob(pdfDataUrl.split(',')[1]) }).promise;
        const page = await pdf.getPage(Number(pageNumber));
        const viewport = page.getViewport({ scale: 1.25 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        if(mounted) setImgSrc(canvas.toDataURL('image/png'));
      }catch(err){
        if(mounted) setError('تعذر عرض صفحة الـ PDF');
      }
    }
    renderPage();
    return () => { mounted = false; };
  }, [pdfDataUrl, pageNumber]);

  return (
    <div className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4 bg-slate-50 dark:bg-slate-950">
      <div className="text-xs font-bold text-brand-600 dark:text-brand-300">صفحة PDF رقم {pageNumber}</div>
      {description ? <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">{description}</div> : null}
      {error ? <div className="mt-3 text-sm text-red-600">{error}</div> : imgSrc ? <img src={imgSrc} alt="pdf page preview" className="mt-4 w-full rounded-2xl border border-slate-200 dark:border-slate-800" /> : <div className="mt-4 text-sm text-slate-500 dark:text-slate-400">جارٍ تجهيز الصفحة...</div>}
    </div>
  );
}

function ExamScreen({exam, user, onBack, onSubmitExam}){
  const questions = exam.questions || [];
  const [viewMode, setViewMode] = useState(exam.settings?.defaultQuestionView || 'single');
  const [currentIndex, setCurrentIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [timeLeft, setTimeLeft] = useState(Number(exam.duration || 3600));

  useEffect(() => {
    const timer = setInterval(() => {
      setTimeLeft(prev => {
        if(prev <= 1){ clearInterval(timer); handleSubmit(); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, []);

  const answered = Object.keys(answers).length;
  const progress = questions.length ? Math.round((answered / questions.length) * 100) : 0;
  const shownQuestions = viewMode === 'single' ? [questions[currentIndex]].filter(Boolean) : questions;
  const minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const seconds = String(timeLeft % 60).padStart(2, '0');

  async function handleSubmit(){
    if(submitting) return;
    setSubmitting(true);
    const correctCount = questions.reduce((count, q) => q.correctIndex != null && answers[q.id] === q.correctIndex ? count + 1 : count, 0);
    const scorable = questions.filter(q => q.correctIndex != null);
    const totalMcq = scorable.length;
    const score = totalMcq ? Math.round((correctCount / totalMcq) * 100) : 100;
    const wrongItems = scorable.filter(q => answers[q.id] !== q.correctIndex).map(q => ({
      examId: exam.id,
      questionId: q.id,
      questionText: q.text,
      userAnswerIndex: answers[q.id] ?? null,
      userAnswerText: answers[q.id] != null ? q.options?.[answers[q.id]] : '',
      correctIndex: q.correctIndex,
      correctAnswerText: q.correctIndex != null ? q.options?.[q.correctIndex] : '',
      explanation: q.explanation || '',
      subjectCode: q.subjectCode || exam.subjectCode,
      subjectAr: q.subjectAr || exam.subjectAr,
      semester: q.semester ?? exam.semester,
      unitTitleAr: q.unitTitleAr || exam.unitTitleAr,
      subunitTitleAr: q.subunitTitleAr || exam.subunitTitleAr,
      questionSnapshot: q
    }));

    const payload = {
      userId: user.id,
      userName: user.name,
      examId: exam.id,
      examTitle: exam.title,
      subjectCode: exam.subjectCode,
      subjectAr: exam.subjectAr,
      semester: exam.semester,
      unitTitleAr: exam.unitTitleAr,
      subunitTitleAr: exam.subunitTitleAr,
      score,
      correctCount,
      totalMcq,
      answers,
      wrongItems,
      examSnapshot: stripExamDataUrl(exam),
      customMeta: exam.customMeta || {}
    };
    await onSubmitExam(payload);
  }

  return (
    <div className="space-y-6">
      <Card className="p-6">
        <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-5">
          <div>
            <div className="text-sm font-bold text-brand-600 dark:text-brand-300">{exam.subjectAr}</div>
            <h1 className="text-3xl font-black mt-2">{exam.title}</h1>
            <div className="mt-3 flex flex-wrap gap-2 text-sm">
              <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">{exam.unitTitleAr || 'بدون وحدة'}</span>
              <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">الوقت: {minutes}:{seconds}</span>
              <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">التقدم: {progress}%</span>
            </div>
          </div>
          <div className="flex flex-wrap gap-3">
            {exam.settings?.allowSwitchView !== false ? (
              <Select label="طريقة العرض" value={viewMode} onChange={e => setViewMode(e.target.value)} className="min-w-[180px]">
                <option value="single">سؤال بسؤال</option>
                <option value="all">عرض كامل</option>
              </Select>
            ) : null}
            <div className="flex gap-2 items-end">
              <Button variant="outline" onClick={onBack}>خروج</Button>
              <Button variant="brand" onClick={handleSubmit} disabled={submitting}>{submitting ? 'جارٍ الحفظ...' : 'تسليم الامتحان'}</Button>
            </div>
          </div>
        </div>
        <div className="mt-5 h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden"><div className="h-full bg-brand-600" style={{ width: `${progress}%` }}></div></div>
      </Card>

      <div className="space-y-4">
        {shownQuestions.map((q, localIndex) => {
          const actualIndex = viewMode === 'single' ? currentIndex : localIndex;
          return <QuestionBlock key={q.id} q={q} index={actualIndex} selected={answers[q.id]} onSelect={value => setAnswers(prev => ({ ...prev, [q.id]: value }))} pdfDataUrl={exam.sourcePdf?.dataUrl} />;
        })}
      </div>

      {viewMode === 'single' ? (
        <div className="flex flex-wrap justify-between gap-3">
          <Button variant="outline" onClick={() => setCurrentIndex(prev => Math.max(0, prev - 1))} disabled={currentIndex === 0}>السابق</Button>
          <div className="text-sm font-bold text-slate-500 dark:text-slate-400">{currentIndex + 1} / {questions.length}</div>
          <Button variant="brand" onClick={() => setCurrentIndex(prev => Math.min(questions.length - 1, prev + 1))} disabled={currentIndex >= questions.length - 1}>التالي</Button>
        </div>
      ) : null}
    </div>
  );
}

function ReviewScreen({attempt, onBack, onRedoWrong, onRetakeWhole}){
  const exam = attempt.examSnapshot || { questions: [] };
  const answerMap = attempt.answers || {};
  const correct = Number(attempt.correctCount || 0);
  const total = Number(attempt.totalMcq || exam.questions?.filter(q => q.correctIndex != null).length || 0);
  const wrong = Math.max(0, total - correct);
  return (
    <div className="space-y-6">
      <Card className="p-6 bg-gradient-to-br from-slate-950 via-brand-700 to-slate-900 text-white border-none">
        <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-5">
          <div>
            <div className="text-sm text-white/75 font-bold">مراجعة محفوظة</div>
            <div className="text-3xl font-black mt-2">{attempt.examTitle || exam.title}</div>
            <div className="mt-2 text-white/80">{attempt.unitTitleAr || attempt.subjectAr} • {formatDate(attempt.createdAt)}</div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div className="rounded-3xl bg-white/10 p-4 text-center"><div className="text-sm text-white/70">النتيجة</div><div className="text-4xl font-black mt-2">{attempt.score}%</div></div>
            <div className="rounded-3xl bg-white/10 p-4 text-center"><div className="text-sm text-white/70">صحيح</div><div className="text-4xl font-black mt-2">{correct}</div></div>
            <div className="rounded-3xl bg-white/10 p-4 text-center"><div className="text-sm text-white/70">خطأ</div><div className="text-4xl font-black mt-2">{wrong}</div></div>
          </div>
        </div>
      </Card>
      <div className="flex flex-wrap gap-3">
        <Button variant="outline" onClick={onBack}>رجوع</Button>
        {attempt.wrongItems?.length ? <Button variant="soft" onClick={() => onRedoWrong(attempt)}>إعادة الخاطئ فقط</Button> : null}
        {attempt.examId ? <Button variant="brand" onClick={() => onRetakeWhole(attempt.examId)}>إعادة الامتحان كاملًا</Button> : null}
      </div>
      <div className="space-y-4">
        {(exam.questions || []).map((q, index) => {
          const selected = answerMap[q.id];
          const correctIndex = q.correctIndex;
          const isCorrect = correctIndex != null && selected === correctIndex;
          return (
            <Card key={q.id} className="p-5">
              <div className="text-xs font-bold text-brand-600 dark:text-brand-300">{q.unitTitleAr || attempt.unitTitleAr || ''}</div>
              <div className="mt-2 text-xl font-black">{index + 1}. <RichText text={q.text} /></div>
              {q.pdfPageRef?.page ? <div className="mt-4"><PdfPagePreview pdfDataUrl={exam.sourcePdf?.dataUrl} pageNumber={q.pdfPageRef.page} description={q.pdfPageRef.description} /></div> : null}
              <div className="mt-4 grid gap-3">
                {(q.options || []).map((opt, i) => (
                  <div key={i} className={cls('rounded-2xl border p-4', i === correctIndex ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-950/20' : selected === i ? 'border-red-500 bg-red-50 dark:bg-red-950/20' : 'border-slate-200 dark:border-slate-800')}>
                    <div className="flex items-center gap-3"><div className="h-8 w-8 rounded-full border flex items-center justify-center text-xs font-black">{String.fromCharCode(65+i)}</div><div>{opt}</div></div>
                  </div>
                ))}
              </div>
              <div className={cls('mt-4 font-bold', isCorrect ? 'text-emerald-600' : 'text-red-600')}>{isCorrect ? 'إجابتك صحيحة' : `إجابتك: ${selected != null ? q.options?.[selected] : 'لم تجب'}`}</div>
              {!isCorrect && correctIndex != null ? <div className="mt-1 text-sm text-emerald-700 dark:text-emerald-300">الإجابة الصحيحة: {q.options?.[correctIndex]}</div> : null}
              {q.explanation ? <div className="mt-3 text-sm text-slate-500 dark:text-slate-400">{q.explanation}</div> : null}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

function AdminModal({catalog, allResults, onRefresh, onClose, toast}){
  const [password, setPassword] = useState('');
  const [ok, setOk] = useState(false);
  const [tab, setTab] = useState('upload');
  const [busy, setBusy] = useState(false);
  const [subjectCode, setSubjectCode] = useState('chemistry');
  const [semester, setSemester] = useState(1);
  const [unitTitleAr, setUnitTitleAr] = useState('');
  const [subunitTitleAr, setSubunitTitleAr] = useState('');
  const [title, setTitle] = useState('');
  const [duration, setDuration] = useState(1800);
  const [allowStudentTime, setAllowStudentTime] = useState(false);
  const [minDuration, setMinDuration] = useState('');
  const [maxDuration, setMaxDuration] = useState('');
  const [jsonText, setJsonText] = useState(JSON.stringify(SAMPLE_EXAM, null, 2));
  const [pdfFile, setPdfFile] = useState(null);
  const [search, setSearch] = useState('');
  const [settingsDraft, setSettingsDraft] = useState({});
  const subject = getSubjectByCode(subjectCode);
  const unitOptions = [...(subject?.units || []).map(u => ({ semester: u.semester, titleAr: u.titleAr })), { semester: 'both', titleAr: CURRICULUM.comprehensiveLabel }];
  useEffect(() => { if(!unitTitleAr && unitOptions.length) setUnitTitleAr(unitOptions[0].titleAr); }, [subjectCode]);

  const filteredExams = (catalog.exams || []).filter(ex => !search || normalizeText(ex.title).includes(normalizeText(search)) || normalizeText(ex.subjectAr).includes(normalizeText(search)) || normalizeText(ex.unitTitleAr).includes(normalizeText(search)));
  const filteredResults = (allResults || []).filter(r => !search || normalizeText(r.userName).includes(normalizeText(search)) || normalizeText(r.subjectAr).includes(normalizeText(search)) || normalizeText(r.examTitle).includes(normalizeText(search)));

  function draftFor(exam){
    return settingsDraft[exam.id] || {
      duration: exam.duration || '',
      allowStudentChangeTime: !!exam.settings?.allowStudentChangeTime,
      minDuration: exam.settings?.minDuration ?? '',
      maxDuration: exam.settings?.maxDuration ?? ''
    };
  }

  async function uploadExam(){
    try{
      setBusy(true);
      const parsed = JSON.parse(jsonText);
      const exam = copy(parsed);
      exam.title = title.trim() || exam.title || `${subject?.nameAr || ''} - ${unitTitleAr || ''}`;
      exam.subjectCode = subjectCode;
      exam.subjectAr = subject?.nameAr || exam.subjectAr || '';
      exam.semester = unitTitleAr === CURRICULUM.comprehensiveLabel ? 'both' : Number(semester);
      exam.unitTitleAr = unitTitleAr || exam.unitTitleAr || '';
      exam.subunitTitleAr = subunitTitleAr || exam.subunitTitleAr || '';
      exam.duration = Number(duration || exam.duration || 1800);
      exam.settings = {
        ...(exam.settings || {}),
        allowSwitchView: true,
        defaultQuestionView: exam.settings?.defaultQuestionView || 'single',
        showOneQuestionPerRow: true,
        allowStudentChangeTime: allowStudentTime,
        minDuration: minDuration === '' ? null : Number(minDuration),
        maxDuration: maxDuration === '' ? null : Number(maxDuration)
      };
      exam.questions = (exam.questions || []).map((q, idx) => ({
        ...q,
        id: q.id || `q${idx + 1}`,
        subjectCode,
        subjectAr: subject?.nameAr || '',
        semester: q.semester ?? (unitTitleAr === CURRICULUM.comprehensiveLabel ? exam.semester : Number(semester)),
        unitTitleAr: q.unitTitleAr || unitTitleAr || '',
        subunitTitleAr: q.subunitTitleAr || subunitTitleAr || ''
      }));
      exam.openQuestions = (exam.openQuestions || []).map((q, idx) => ({
        ...q,
        id: q.id || `oq${idx + 1}`,
        subjectCode,
        subjectAr: subject?.nameAr || '',
        semester: q.semester ?? (unitTitleAr === CURRICULUM.comprehensiveLabel ? exam.semester : Number(semester)),
        unitTitleAr: q.unitTitleAr || unitTitleAr || '',
        subunitTitleAr: q.subunitTitleAr || subunitTitleAr || ''
      }));
      let pdfDataUrl = '';
      let pdfFileName = exam.sourcePdf?.fileName || 'source.pdf';
      if(pdfFile){
        pdfDataUrl = await readFileAsDataUrl(pdfFile);
        pdfFileName = pdfFile.name;
      }
      await api('uploadExam', { adminPassword: CONFIG.ADMIN_PASSWORD, exam, pdfDataUrl, pdfFileName });
      toast('تم رفع الامتحان وPDF وفهرسة الأسئلة في البنك');
      setPdfFile(null);
      await onRefresh();
    }catch(err){
      toast('فشل الرفع: ' + err.message, 'error');
    }finally{ setBusy(false); }
  }

  async function saveExamSettings(examId){
    try{
      setBusy(true);
      const patch = draftFor({ id: examId });
      await api('updateExamSettings', { adminPassword: CONFIG.ADMIN_PASSWORD, examId, patch });
      toast('تم تحديث إعدادات الامتحان');
      await onRefresh();
    }catch(err){
      toast('تعذر تحديث الإعدادات: ' + err.message, 'error');
    }finally{ setBusy(false); }
  }

    if(!confirm('هل تريد حذف الامتحان نهائيًا؟')) return;

      setBusy(true);
      await api('deleteExam', { adminPassword: CONFIG.ADMIN_PASSWORD, examId });

      await onRefresh();

      toast('فشل الحذف: ' + err.message, 'error');

                  <Select label="المادة" value={subjectCode} onChange={e => { setSubjectCode(e.target.value); setUnitTitleAr(''); }}>
                    {CURRICULUM.subjects.map(s => <option key={s.code} value={s.code}>{s.nameAr}</option>)}
                  </Select>

          {tab === 'bank' ? (
            <div className="space-y-4">
              <Input label="بحث" placeholder="ابحث بعنوان الامتحان أو المادة أو الوحدة" value={search} onChange={e => setSearch(e.target.value)} />
              <div className="grid lg:grid-cols-2 gap-4">
                {filteredExams.length ? filteredExams.map(exam => {
                  const draft = draftFor(exam);
                  return (
                    <Card key={exam.id} className="p-5">
                      <div className="flex items-start justify-between gap-3">
                        <div>
                          <div className="font-black text-xl">{exam.title}</div>
                          <div className="mt-2 text-sm text-slate-500 dark:text-slate-400">{exam.subjectAr} • {exam.unitTitleAr || 'بدون وحدة'} • {String(exam.semester) === 'both' ? 'شامل' : `الفصل ${Number(exam.semester) === 1 ? 'الأول' : 'الثاني'}`}</div>
                        </div>
                        <Button variant="danger" className="!px-3 !py-2 text-sm" onClick={() => deleteExam(exam.id)} disabled={busy}>حذف</Button>
                      </div>
                      <div className="mt-4 grid md:grid-cols-2 gap-3">
                        <Input label="المدة" type="number" value={draft.duration} onChange={e => setSettingsDraft(prev => ({ ...prev, [exam.id]: { ...draft, duration: e.target.value } }))} />
                        <label className="flex items-end gap-3 rounded-2xl border border-slate-200 dark:border-slate-800 px-4 py-3"><input type="checkbox" checked={!!draft.allowStudentChangeTime} onChange={e => setSettingsDraft(prev => ({ ...prev, [exam.id]: { ...draft, allowStudentChangeTime: e.target.checked } }))} /><span className="font-bold text-sm">السماح للطالب بتغيير الوقت</span></label>
                        <Input label="أقل وقت" type="number" value={draft.minDuration} onChange={e => setSettingsDraft(prev => ({ ...prev, [exam.id]: { ...draft, minDuration: e.target.value } }))} />
                        <Input label="أعلى وقت" type="number" value={draft.maxDuration} onChange={e => setSettingsDraft(prev => ({ ...prev, [exam.id]: { ...draft, maxDuration: e.target.value } }))} />
                      </div>
                      <Button variant="brand" className="w-full mt-4" onClick={() => saveExamSettings(exam.id)} disabled={busy}>حفظ الإعدادات</Button>
                    </Card>
                  );
                }) : <div className="text-slate-500 dark:text-slate-400">لا توجد امتحانات.</div>}
              </div>
            </div>
          ) : null}

          {tab === 'results' ? (
            <div className="space-y-4">
              <Input label="بحث" placeholder="ابحث باسم الطالب أو المادة أو الامتحان" value={search} onChange={e => setSearch(e.target.value)} />
              <div className="grid lg:grid-cols-2 gap-4">
                {filteredResults.length ? filteredResults.map(attempt => (
                  <Card key={attempt.attemptId} className="p-4">
                    <div className="flex items-start justify-between gap-3">
                      <div>
                        <div className="font-black">{attempt.userName}</div>
                        <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">{attempt.examTitle || attempt.subjectAr}</div>
                      </div>
                      <div className="text-3xl font-black text-brand-600 dark:text-brand-300">{attempt.score}%</div>
                    </div>
                    <div className="mt-2 text-xs text-slate-500 dark:text-slate-400">{formatDate(attempt.createdAt)}</div>
                  </Card>
                )) : <div className="text-slate-500 dark:text-slate-400">لا توجد نتائج.</div>}
              </div>
            </div>
          ) : null}

          {tab === 'qbank' ? (
            <div className="space-y-4">
              <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-4">
                <Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">إجمالي الأسئلة</div><div className="text-3xl font-black mt-2">{catalog.questionBankSummary?.totalQuestions || 0}</div></Card>
                {CURRICULUM.subjects.map(subject => <Card key={subject.code} className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">{subject.nameAr}</div><div className="text-3xl font-black mt-2">{catalog.questionBankSummary?.bySubject?.[subject.code] || 0}</div></Card>)}
              </div>
              <Card className="p-5">
                <div className="text-xl font-black">الوحدات</div>
                <div className="mt-4 grid lg:grid-cols-2 xl:grid-cols-3 gap-4">
                  {(catalog.questionBankSummary?.units || []).map(row => (
                    <div key={row.key} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4">
                      <div className="text-xs font-bold text-brand-600 dark:text-brand-300">{row.subjectAr}</div>
                      <div className="mt-2 font-black">{row.unitTitleAr}</div>
                      <div className="mt-2 text-sm text-slate-500 dark:text-slate-400">الفصل: {row.semester}</div>
                      <div className="text-sm text-slate-500 dark:text-slate-400">الأسئلة: {row.count}</div>
                      <div className="text-sm text-slate-500 dark:text-slate-400">الامتحانات: {row.examCount}</div>
                    </div>
                  ))}
                </div>
              </Card>
            </div>
          ) : null}

          {tab === 'prompt' ? <Card className="p-5"><TextArea label="Prompt التحويل" rows={28} value={STRICT_JSON_PROMPT} readOnly /></Card> : null}
        </div>
      )}
    </Modal>
  );
}

function App(){
  const [user, setUser] = useState(loadLocal(CONFIG.STORAGE_KEYS.user, null));
  const [darkMode, setDarkMode] = useState(loadLocal(CONFIG.STORAGE_KEYS.darkMode, false));
  const [loading, setLoading] = useState(false);
  const [catalog, setCatalog] = useState({ exams: [], questionBankSummary: {} });
  const [results, setResults] = useState([]);
  const [allResults, setAllResults] = useState([]);
  const [analytics, setAnalytics] = useState({});
  const [route, setRoute] = useState({ name: 'home' });
  const [adminOpen, setAdminOpen] = useState(false);
  const toast = useToast();

  useEffect(() => { document.documentElement.classList.toggle('dark', !!darkMode); }, [darkMode]);

  async function refresh(){
    if(!user) return;
    try{
      setLoading(true);
      const [catalogRes, resultsRes, analyticsRes] = await Promise.all([
        api('listExams'),
        api('getUserResults', { userId: user.id }),
        api('getUserAnalytics', { userId: user.id })
      ]);
      setCatalog({ exams: catalogRes.exams || [], questionBankSummary: catalogRes.questionBankSummary || {} });
      setResults(resultsRes.results || []);
      setAnalytics(analyticsRes.analytics || {});
      try{
        const adminRes = await api('listAllResults', { adminPassword: CONFIG.ADMIN_PASSWORD });
        setAllResults(adminRes.results || []);
      }catch{}
    }catch(err){
      toast.show('خطأ في التحميل: ' + err.message, 'error');
    }finally{ setLoading(false); }
  }

  useEffect(() => { if(user) refresh(); }, [user]);

  async function startExamFromSummary(summary){
    try{
      setLoading(true);
      const res = summary.questions ? { exam: summary } : await api('getExam', { examId: summary.id || summary.examId || summary });
      let exam = res.exam;
      if(exam.settings?.allowStudentChangeTime){
        const min = exam.settings?.minDuration || 300;
        const max = exam.settings?.maxDuration || 14400;
        const currentMin = Math.round((exam.duration || min) / 60);
        const response = prompt(`أدخل مدة الامتحان بالدقائق بين ${Math.ceil(min/60)} و ${Math.floor(max/60)}`, String(currentMin));
        if(response != null && response !== ''){
          const nextSeconds = Number(response) * 60;
          if(!isNaN(nextSeconds) && nextSeconds >= min && nextSeconds <= max) exam.duration = nextSeconds;
        }
      }
      setRoute({ name: 'exam', exam });
    }catch(err){
      toast.show('تعذر تحميل الامتحان: ' + err.message, 'error');
    }finally{ setLoading(false); }
  }

  async function submitExam(payload){
    try{
      const res = await api('submitResult', payload);
      toast.show('تم حفظ النتيجة، ويمكنك مراجعتها في أي وقت');
      await refresh();
      await openReview(res.attemptId);
    }catch(err){
      toast.show('فشل حفظ النتيجة: ' + err.message, 'error');
      throw err;
    }
  }

  async function openReview(attemptId){
    try{
      setLoading(true);
      const res = await api('getAttemptReview', { attemptId });
      setRoute({ name: 'review', attempt: res.attempt });
    }catch(err){
      toast.show('تعذر تحميل المراجعة: ' + err.message, 'error');
    }finally{ setLoading(false); }
  }

  async function openRedo(attempt){
    try{
      setLoading(true);
      const res = await api('generateRedoExam', { userId: user.id, resultId: attempt.attemptId });
      setRoute({ name: 'exam', exam: res.exam });
      toast.show('تم تجهيز نفس الأسئلة الخاطئة');
    }catch(err){
      toast.show('تعذر إنشاء تدريب الأخطاء: ' + err.message, 'error');
    }finally{ setLoading(false); }
  }

  async function buildCustomExam(payload){
    try{
      setLoading(true);
      const res = await api('buildCustomExam', payload);
      setRoute({ name: 'exam', exam: res.exam });
      toast.show('تم تكوين الامتحان المخصص من بنك الأسئلة');
    }catch(err){
      toast.show('تعذر بناء الامتحان المخصص: ' + err.message, 'error');
    }finally{ setLoading(false); }
  }

  function logout(){
    localStorage.removeItem(CONFIG.STORAGE_KEYS.user);
    setUser(null);
    setRoute({ name: 'home' });
  }

  if(!user) return <LoginScreen onLogin={setUser} />;

  const topTitle = route.name === 'subject' ? `${getSubjectByCode(route.subjectCode)?.nameAr || ''} - ${CONFIG.APP_SUBTITLE}` : CONFIG.APP_SUBTITLE;

  return (
    <div className="min-h-screen">
      <TopBar
        user={user}
        darkMode={darkMode}
        onToggleDark={() => { const next = !darkMode; setDarkMode(next); saveLocal(CONFIG.STORAGE_KEYS.darkMode, next); }}
        onLogout={logout}
        onOpenAdmin={() => setAdminOpen(true)}
        onGoHome={() => setRoute({ name: 'home' })}
        title={topTitle}
      />

      <main className="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        {loading ? <Card className="p-6">جارٍ التحميل...</Card> : null}
        {!loading && route.name === 'home' ? <HomeScreen catalog={catalog} results={results} analytics={analytics} onOpenSubject={(subjectCode) => setRoute({ name: 'subject', subjectCode })} /> : null}
        {!loading && route.name === 'subject' ? <SubjectPage subjectCode={route.subjectCode} catalog={catalog} results={results} analytics={analytics} onBackHome={() => setRoute({ name: 'home' })} onStartExam={startExamFromSummary} onReviewAttempt={openReview} onRedoAttempt={openRedo} onOpenCustomExam={buildCustomExam} /> : null}
        {!loading && route.name === 'exam' ? <ExamScreen exam={route.exam} user={user} onBack={() => setRoute({ name: 'subject', subjectCode: route.exam.subjectCode })} onSubmitExam={submitExam} /> : null}
        {!loading && route.name === 'review' ? <ReviewScreen attempt={route.attempt} onBack={() => setRoute({ name: 'subject', subjectCode: route.attempt.subjectCode })} onRedoWrong={openRedo} onRetakeWhole={startExamFromSummary} /> : null}
      </main>

      {adminOpen ? <AdminModal catalog={catalog} allResults={allResults} onRefresh={refresh} onClose={() => setAdminOpen(false)} toast={toast.show} /> : null}
      <Toast toast={toast.toast} onClose={toast.clear} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
