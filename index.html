<script>
const CONFIG = {

const CURRICULUM = {

        { semester: 2, titleAr: 'الفصل الثاني', units: ['الكيمياء الحركيه','الكيمياء الكهربائيه','الكيمياء العضويه'] }
      ]
    },
    {
      code: 'life_sciences',
      nameAr: 'الأحياء',
      examMode: 'OMR_MCQ',
      weights: {
        '1|كيمياء الحياة': 16.9, '1|دوره الخليه وتصنيع البروتينات': 12.8, '1|الوراثة': 14.9, '1|التكنولوجيا الحيوية': 8.2,
        '2|التنظيم والاتزان': 11.8, '2|الدعامه والحركه': 6.1, '2|الهضم والنقل وتبادل الغازات': 10.7, '2|الاخراج والتكاثر': 11.3, '2|المناعه والمضادات الحيويه': 6.9
      },

    },

        '2|علاقه الانسان بربه': 16.66, '2|علاقه الانسان بنفسه': 16.66, '2|علاقه الانسان بمن حوله': 16.66
      },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] }
      ]
    },
    {
      code: 'english',

      examMode: 'HYBRID',

        '1|Unit 1': 10, '1|Unit 2': 10, '1|Unit 3': 10, '1|Unit 4': 10, '1|Unit 5': 10,

      },

        { semester: 1, titleAr: 'Semester 1', units: ['Unit 1','Unit 2','Unit 3','Unit 4','Unit 5'] },
        { semester: 2, titleAr: 'Semester 2', units: ['Unit 6','Unit 7','Unit 8','Unit 9','Unit 10'] }
      ]

};

const state = {
  user: loadLocal(CONFIG.STORAGE_KEYS.user, null),
  darkMode: loadLocal(CONFIG.STORAGE_KEYS.darkMode, false),
  loading: false,
  toast: null,
  data: {
    exams: [],
    results: [],
    analytics: { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] },
    questionBankSummary: { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] }
  },
  subjectCode: null,
  subjectTab: 'units',
  unitKey: null,
  prestartExam: null,
  examSession: null,
  reviewAttempt: null,
  timerId: null,
  admin: {
    open: false,
    authenticated: false,
    tab: 'upload',
    allResults: [],
    form: { pdfDataUrl: null, pdfFileName: '' }
  },
  builder: { totalQuestions: 100, duration: 120, selectedUnitKeys: [], explicitCounts: {}, selectedExamIds: [], mode: 'weighted', noTimer: false }
};

window.__PDF_SOURCES = {};
window.__PDF_DOCS = {};

function loadLocal(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (err) { return fallback; }
}

function saveLocal(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

function setDarkMode(value) {
  state.darkMode = !!value;
  document.documentElement.classList.toggle('dark', state.darkMode);
  saveLocal(CONFIG.STORAGE_KEYS.darkMode, state.darkMode);
}

setDarkMode(state.darkMode);

function escapeHtml(value) {
  return String(value == null ? '' : value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function initials(name) { return String(name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join('').toUpperCase() || 'ط'; }

function formatDate(value) {
  if (!value) return '-';
  try { return new Date(value).toLocaleString('ar-JO'); } catch (err) { return String(value); }
}

function minutesLabel(seconds) { return Math.max(1, Math.round(Number(seconds || 0) / 60)); }

function percent(correct, total) {
  if (!total) return 0;
  return Math.round((Number(correct || 0) / Number(total || 1)) * 100);
}

function getSubject(code) { return CURRICULUM.subjects.find(subject => subject.code === code) || null; }

function getSubjectSummary(code) { return (state.data.questionBankSummary.subjects || []).find(subject => subject.subjectCode === code) || { totalQuestions: 0, totalExams: 0, units: [] }; }

function makeUnitKey(subjectCode, semester, unitTitleAr) { return [subjectCode, Number(semester || 0), unitTitleAr || ''].join('||'); }

function parseUnitKey(unitKey) {
  const parts = String(unitKey || '').split('||');
  return { subjectCode: parts[0] || '', semester: Number(parts[1] || 0), unitTitleAr: parts.slice(2).join('||') || '' };
}

function buildSubjectUnits(subjectCode) {
  const subject = getSubject(subjectCode);
  if (!subject) return [];
  const units = [];
  subject.semesters.forEach(semester => {
    semester.units.forEach(unitTitleAr => {
      const key = makeUnitKey(subjectCode, semester.semester, unitTitleAr);
      units.push({ key, subjectCode, semester: semester.semester, semesterTitleAr: semester.titleAr, unitTitleAr, weight: Number(subject.weights[`${semester.semester}|${unitTitleAr}`] || 0) });
    });
  });
  units.push({ key: makeUnitKey(subjectCode, 0, CURRICULUM.comprehensiveLabel), subjectCode, semester: 0, semesterTitleAr: 'الفصلان معًا', unitTitleAr: CURRICULUM.comprehensiveLabel, weight: 0, comprehensive: true });
  return units;
}

function getExamsForSubject(subjectCode) { return (state.data.exams || []).filter(exam => exam.subjectCode === subjectCode); }

function getExamsForUnit(subjectCode, unitKey) {
  const info = parseUnitKey(unitKey);
  return getExamsForSubject(subjectCode).filter(exam => { return Number(exam.semester || 0) === Number(info.semester || 0) && String(exam.unitTitleAr || '') === String(info.unitTitleAr || ''); });
}

function getQuestionCountForUnit(unitKey) { return Number((state.data.questionBankSummary.byUnitKey || {})[unitKey] || 0); }

function getAttemptsForSubject(subjectCode) { return (state.data.results || []).filter(result => result.subjectCode === subjectCode); }

function getUnitAnalytics(subjectCode) { return (state.data.analytics.unitMastery || []).filter(item => item.subjectCode === subjectCode); }

function getSubjectAnalytics(subjectCode) { return (state.data.analytics.subjectMastery || []).find(item => item.subjectCode === subjectCode) || null; }

function hasApiBase() { return String(CONFIG.API_BASE || '').startsWith('https://script.google.com/macros/s/'); }

async function api(action, payload) {
  if (!hasApiBase()) throw new Error('ضع رابط Google Apps Script أولًا داخل CONFIG.API_BASE');
  const response = await fetch(CONFIG.API_BASE, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(Object.assign({ action }, payload || {})) });
  if (!response.ok) throw new Error('فشل الاتصال بالخادم');
  const data = await response.json();
  if (!data.ok) throw new Error(data.error || 'API Error');
  return data;
}

function showToast(message, type) {
  state.toast = { message, type: type || 'success' }; render();
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { state.toast = null; render(); }, 3200);
}

function setLoading(value) { state.loading = !!value; render(); }

async function refreshData() {
  if (!state.user) return;
  try {
    setLoading(true);
    const [examsRes, resultsRes, analyticsRes, bankRes] = await Promise.all([
      api('getCatalog'), api('getUserResults', { userId: state.user.id }),
      api('getUserAnalytics', { userId: state.user.id }), api('getQuestionBankSummary')
    ]);
    state.data.exams = examsRes.exams || [];
    state.data.results = resultsRes.results || [];
    state.data.analytics = analyticsRes.analytics || { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] };
    state.data.questionBankSummary = bankRes.summary || { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] };
    render();
  } catch (err) { showToast('خطأ في التحميل: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

function resetBuilderForSubject(subjectCode) {
  const units = buildSubjectUnits(subjectCode).filter(unit => !unit.comprehensive);
  state.builder.selectedUnitKeys = units.slice(0, Math.min(4, units.length)).map(unit => unit.key);
  state.builder.selectedExamIds = []; 
  
  // Auto-select exams for default checked units
  state.builder.selectedUnitKeys.forEach(uk => {
     getExamsForUnit(subjectCode, uk).forEach(e => {
        if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id);
     });
  });

  state.builder.explicitCounts = {};
  state.builder.mode = 'weighted'; state.builder.totalQuestions = 100; state.builder.duration = 120; state.builder.noTimer = false;
}

function openSubject(subjectCode) { state.subjectCode = subjectCode; state.subjectTab = 'units'; state.unitKey = null; resetBuilderForSubject(subjectCode); render(); }

function backToHome() { state.subjectCode = null; state.subjectTab = 'units'; state.unitKey = null; state.reviewAttempt = null; state.examSession = null; clearExamTimer(); render(); }

function openAdmin() { state.admin.open = true; render(); }
function closeAdmin() { state.admin.open = false; render(); }

async function adminLogin(password) {
  if (password !== CONFIG.ADMIN_PASSWORD) { showToast('كلمة مرور الإدارة غير صحيحة', 'error'); return; }
  state.admin.authenticated = true;
  try {
    setLoading(true);
    const res = await api('listAllResults', { adminPassword: CONFIG.ADMIN_PASSWORD });
    state.admin.allResults = res.results || [];
  } catch (err) { showToast('تعذر تحميل نتائج الإدارة: ' + err.message, 'error'); }
  finally { setLoading(false); render(); }
}

            <div class="mt-2 text-sm text-slate-500 dark:text-slate-400">اضغط لعرض الوحدات والامتحانات</div>
          </div>
          <div class="h-14 w-14 rounded-3xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 flex items-center justify-center text-xl font-black shadow-md group-hover:scale-110 transition-transform">${escapeHtml(subject.nameAr.slice(0,1))}</div>
        </div>
        <div class="mt-6 grid grid-cols-3 gap-3 text-sm">
          <div class="rounded-2xl bg-slate-50 dark:bg-slate-800 p-3 text-center"><div class="text-slate-500 dark:text-slate-400 text-xs">الوحدات</div><div class="mt-1 font-black text-brand-600 dark:text-brand-400">${summary.units.length || buildSubjectUnits(subject.code).length - 1}</div></div>
          <div class="rounded-2xl bg-slate-50 dark:bg-slate-800 p-3 text-center"><div class="text-slate-500 dark:text-slate-400 text-xs">الأسئلة</div><div class="mt-1 font-black text-brand-600 dark:text-brand-400">${subjectQuestions}</div></div>
          <div class="rounded-2xl bg-slate-50 dark:bg-slate-800 p-3 text-center"><div class="text-slate-500 dark:text-slate-400 text-xs">الإتقان</div><div class="mt-1 font-black text-brand-600 dark:text-brand-400">${analytics ? analytics.mastery + '%' : '0%'}</div></div>
        </div>
      </button>
    `;
  }).join('');
}

function computeBuilderPreview(subjectCode) {
  const subject = getSubject(subjectCode);
  const selectedUnits = buildSubjectUnits(subjectCode).filter(unit => state.builder.selectedUnitKeys.includes(unit.key) && !unit.comprehensive);
  const preview = [];
  if (!selectedUnits.length) return preview;
  if (state.builder.mode === 'manual') {
    selectedUnits.forEach(unit => { preview.push({ key: unit.key, semester: unit.semester, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Number(state.builder.explicitCounts[unit.key] || 0), normalizedWeight: null }); });
    return preview;
  }
  const weights = selectedUnits.map(unit => Number(subject.weights[`${unit.semester}|${unit.unitTitleAr}`] || 1));
  const totalWeight = weights.reduce((sum, value) => sum + value, 0) || selectedUnits.length;
  selectedUnits.forEach((unit, index) => {
    const normalizedWeight = ((weights[index] / totalWeight) * 100);
    preview.push({ key: unit.key, semester: unit.semester, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Math.round((normalizedWeight / 100) * Number(state.builder.totalQuestions || 0)), normalizedWeight: normalizedWeight });
  });
  return preview;
}

function getQuestionPdfSource(question, exam) {
  return question.sourcePdfBase64 || (exam && exam.sourcePdf && exam.sourcePdf.base64) || '';
}

function stripBase64Exam(exam) {
  const clone = JSON.parse(JSON.stringify(exam));
  if (clone.sourcePdf && clone.sourcePdf.base64) delete clone.sourcePdf.base64;
  ['questions', 'openQuestions'].forEach(field => { (clone[field] || []).forEach(item => { if (item && item.sourcePdfBase64) delete item.sourcePdfBase64; }); });
  return clone;
}

function renderPdfPreview(question, exam, suffix) {
  if (!question || !question.pdfPageRef || !question.pdfPageRef.page) return '';
  const pdfBase64 = getQuestionPdfSource(question, exam);
  if (!pdfBase64) return '<div class="text-sm text-slate-500 dark:text-slate-400 p-4 bg-slate-100 dark:bg-slate-800 rounded-xl">لا يتوفر PDF لهذا السؤال أو جاري التحميل.</div>';
  const pdfKey = `${question.questionKey || question.id || 'q'}_${suffix || 'exam'}`;
  window.__PDF_SOURCES[pdfKey] = pdfBase64;
  return `
    <div class="rounded-3xl border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 p-4 space-y-4 shadow-sm">
      <div class="flex items-center gap-2">
        <div class="bg-brand-100 dark:bg-brand-900/50 text-brand-700 dark:text-brand-300 px-3 py-1 rounded-lg text-xs font-black">مرجع PDF</div>
        <div class="text-sm font-black text-slate-700 dark:text-slate-200">صفحة ${escapeHtml(question.pdfPageRef.page)}</div>
      </div>
      ${question.pdfPageRef.description ? `<div class="text-sm font-semibold text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-950 p-3 rounded-xl border border-slate-100 dark:border-slate-800">${escapeHtml(question.pdfPageRef.description)}</div>` : ''}
      <div class="overflow-auto rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 shadow-inner">
        <canvas class="block max-w-full h-auto mx-auto pdf-canvas" data-pdf-key="${escapeHtml(pdfKey)}" data-page="${escapeHtml(question.pdfPageRef.page)}"></canvas>
      </div>
    </div>
  `;
}

function renderQuestionCard(question, index, exam, mode) {
  const session = state.examSession;
  const review = state.reviewAttempt;
  const selected = session ? session.answers[question.id] : undefined;
  const reviewMap = review ? review.answers || {} : {};
  const userAnswer = mode === 'review' ? reviewMap[question.id] : selected;
  const readOnly = mode === 'review';
  return `
    <div class="rounded-[32px] border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 md:p-8 shadow-sm ${mode === 'review' ? 'shadow-none bg-slate-50 dark:bg-slate-900/40' : ''} mb-6">
      <div class="inline-block text-xs font-bold text-brand-600 dark:text-brand-400 bg-brand-50 dark:bg-brand-900/30 px-3 py-1.5 rounded-lg mb-4">${escapeHtml(question.unitTitleAr || exam.unitTitleAr || '')}${question.subunitTitleAr ? ' • ' + escapeHtml(question.subunitTitleAr) : ''}</div>
      <div class="text-xl md:text-2xl font-black text-slate-900 dark:text-white leading-relaxed" data-math>${escapeHtml(index + 1)}. ${escapeHtml(question.text || '')}</div>
      <div class="mt-6 ${question.pdfPageRef ? 'grid xl:grid-cols-[minmax(0,1fr),360px] gap-6 items-start' : ''}">
        <div class="${question.pdfPageRef ? 'order-2 xl:order-1' : ''}">
          <div class="grid gap-3 lg:grid-cols-2 question-options-container">
            ${(question.options || []).map((option, optionIndex) => {
              const isSelected = Number(userAnswer) === Number(optionIndex);
              const isCorrect = Number(question.correctIndex) === Number(optionIndex);
              const reviewClasses = mode === 'review'
                ? isCorrect ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 shadow-sm' : isSelected ? 'border-red-500 bg-red-50 dark:bg-red-900/20 shadow-sm' : 'border-slate-200 dark:border-slate-800'
                : isSelected ? 'border-brand-600 bg-brand-50 dark:bg-brand-900/20 shadow-sm' : 'border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/70 hover:border-slate-300 dark:hover:border-slate-700';
              return `
                <button ${readOnly ? 'disabled' : ''} data-action="select-answer" data-question-id="${escapeHtml(question.id)}" data-index="${escapeHtml(optionIndex)}" class="rounded-2xl border-2 p-4 text-right transition-all duration-200 ${reviewClasses}">
                  <div class="flex items-center gap-4">
                    <div class="h-8 w-8 rounded-full border-2 flex shrink-0 items-center justify-center text-sm font-black ${isSelected && mode !== 'review' ? 'bg-brand-600 text-white border-brand-600' : 'border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400'}">${String.fromCharCode(65 + optionIndex)}</div>
                    <div class="flex-1 font-semibold text-base" data-math>${escapeHtml(option)}</div>
                  </div>
                </button>
              `;
            }).join('')}
          </div>
          ${mode === 'review' ? `
            <div class="mt-6 space-y-3 text-base">
              <div class="bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl flex items-center justify-between font-bold">
                <span class="text-slate-600 dark:text-slate-300">إجابتك:</span>
                <span class="${userAnswer == null ? 'text-slate-500' : Number(userAnswer) === Number(question.correctIndex) ? 'text-emerald-600' : 'text-red-600'}">${userAnswer == null ? 'لم تجب' : escapeHtml(question.options[userAnswer] || '')}</span>
              </div>
              ${question.correctIndex == null ? '<div class="p-4 rounded-2xl bg-amber-50 text-amber-700 font-bold border border-amber-200">لا يوجد مفتاح إجابة صريح محفوظ لهذا السؤال.</div>' : `<div class="p-4 rounded-2xl bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 font-bold border border-emerald-200 dark:border-emerald-800">الإجابة الصحيحة: ${escapeHtml(question.options[question.correctIndex] || '')}</div>`}
              ${question.explanation ? `<div class="rounded-2xl bg-brand-50 dark:bg-brand-900/10 border border-brand-100 dark:border-brand-900/30 p-4"><div class="text-xs font-black text-brand-600 dark:text-brand-400 mb-1">تفسير الحل:</div><div class="text-slate-800 dark:text-slate-200 font-semibold leading-relaxed">${escapeHtml(question.explanation)}</div></div>` : ''}
            </div>
          ` : ''}
        </div>
        ${question.pdfPageRef ? `<div class="${question.pdfPageRef ? 'order-1 xl:order-2' : ''}">${renderPdfPreview(question, exam, mode)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderEssayCard(question, index, exam, mode) {
  const session = state.examSession;
  const review = state.reviewAttempt;
  const value = mode === 'review' ? ((review.openAnswers || {})[question.id] || '') : ((session.openAnswers || {})[question.id] || '');
  return `
    <div class="rounded-[32px] border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 md:p-8 shadow-sm ${mode === 'review' ? 'shadow-none bg-slate-50 dark:bg-slate-900/40' : ''} mb-6">

      ${question.pdfPageRef ? `<div class="mt-6">${renderPdfPreview(question, exam, mode)}</div>` : ''}
      ${mode === 'review'
        ? `<div class="mt-6 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 p-5 whitespace-pre-wrap font-semibold leading-relaxed">${escapeHtml(value || 'لم تتم الإجابة')}</div>`
        : `<textarea data-action="set-open-answer" data-question-id="${escapeHtml(question.id)}" rows="6" class="w-full mt-6 rounded-2xl border-2 border-slate-200 dark:border-slate-700 focus:border-brand-500 bg-slate-50 dark:bg-slate-950 px-5 py-4 font-semibold outline-none transition-colors" placeholder="اكتب إجابتك هنا بوضوح...">${escapeHtml(value)}</textarea>`}
      ${question.idealAnswer ? `<div class="mt-6 rounded-2xl border border-emerald-200 dark:border-emerald-800 bg-emerald-50 dark:bg-emerald-900/20 p-5"><div class="text-xs font-black text-emerald-600 dark:text-emerald-400 mb-2">الإجابة النموذجية (للمقارنة):</div><div class="text-emerald-900 dark:text-emerald-200 whitespace-pre-wrap font-semibold leading-relaxed">${escapeHtml(question.idealAnswer)}</div></div>` : ''}
    </div>
  `;
}

function renderExamScreen() {
  const session = state.examSession;

  const answeredCount = Object.keys(session.answers).length + Object.values(session.openAnswers).filter(Boolean).length;
  const totalItems = items.length || 1;

  let timerDisplay = 'مفتوح ∞';

     const minutes = String(Math.floor(session.timeLeft / 60)).padStart(2, '0');

  return `

              <span class="rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900/50 text-red-600 dark:text-red-400 px-3 py-1.5 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="exam-timer-display" class="font-black text-base tracking-wider">${timerDisplay}</span>
              </span>
              <span id="exam-progress-text" class="rounded-xl bg-brand-50 dark:bg-brand-900/20 border border-brand-100 dark:border-brand-900/50 text-brand-700 dark:text-brand-300 px-3 py-1.5">التقدم: ${progress}%</span>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            ${exam.settings && exam.settings.allowSwitchView !== false ? `

                <button data-action="set-view-mode" data-view-mode="single" class="px-4 py-2 rounded-xl text-sm font-black transition-colors ${session.viewMode === 'single' ? 'bg-white dark:bg-slate-900 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}">سؤال بسؤال</button>
                <button data-action="set-view-mode" data-view-mode="all" class="px-4 py-2 rounded-xl text-sm font-black transition-colors ${session.viewMode === 'all' ? 'bg-white dark:bg-slate-900 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}">عرض كامل</button>
              </div>
            ` : ''}
            <button data-action="cancel-exam" class="px-5 py-3 rounded-2xl font-bold border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 transition-colors">إلغاء</button>
            <button data-action="submit-exam" class="px-6 py-3 rounded-2xl font-black bg-brand-600 hover:bg-brand-700 text-white shadow-glow transition-transform transform hover:-translate-y-1">تسليم الآن</button>
          </div>
        </div>
        <div class="mt-5 h-2.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden shadow-inner"><div id="exam-progress-bar" class="h-full bg-brand-600 rounded-full transition-all duration-300 ease-out" style="width:${progress}%"></div></div>
      </div>
      
      ${session.viewMode === 'single'
        ? `<div class="space-y-6">
            <div class="flex justify-between items-center px-4">
               <div class="text-xl font-black text-slate-700 dark:text-slate-300">السؤال <span class="text-brand-600 dark:text-brand-400 text-2xl">${session.currentIndex + 1}</span> من ${totalItems}</div>

        `}
    </div>
  `;
}

  return `

function renderMath() {
  if (!window.renderMathInElement) return;
  document.querySelectorAll('[data-math]').forEach(node => {
    try { window.renderMathInElement(node, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }], throwOnError: false }); } catch (err) {}
  });
}

async function renderPdfCanvases() {
  if (!window.pdfjsLib) return;
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  
  const canvases = Array.from(document.querySelectorAll('.pdf-canvas:not([data-rendered="true"])'));
  for (const canvas of canvases) {
    canvas.setAttribute('data-rendered', 'true');
    const pdfKey = canvas.getAttribute('data-pdf-key');
    const pageNumber = Number(canvas.getAttribute('data-page') || 1);
    const base64 = window.__PDF_SOURCES[pdfKey];
    if (!base64) continue;
    
    try {
      if (!window.__PDF_DOCS[pdfKey]) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        window.__PDF_DOCS[pdfKey] = await window.pdfjsLib.getDocument({ data: bytes }).promise;
      }
      
      const pdf = window.__PDF_DOCS[pdfKey];
      const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1.2 });
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
    } catch (err) {
      const parent = canvas.parentElement;
      if (parent) parent.innerHTML = '<div class="p-4 text-sm font-bold text-red-600 bg-red-50 rounded-xl text-center border border-red-200">تعذر عرض صفحة الـ PDF. تأكد من الملف الأصلي.</div>';
    }
  }
}

function clearExamTimer() {
  if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
}

function updateProgressUI() {
  if (!state.examSession) return;
  const answeredCount = Object.keys(state.examSession.answers).length + Object.values(state.examSession.openAnswers).filter(Boolean).length;
  const totalItems = (state.examSession.exam.questions || []).length + (state.examSession.exam.openQuestions || []).length;
  const pct = percent(answeredCount, totalItems || 1);
  
  const pText = document.getElementById('exam-progress-text');
  if (pText) pText.innerText = `التقدم: ${pct}%`;
  
  const pBar = document.getElementById('exam-progress-bar');
  if (pBar) pBar.style.width = `${pct}%`;
}

function startExamTimer() {
  clearExamTimer();
  if (!state.examSession || state.examSession.noTimer) return;
  
  state.timerId = setInterval(async () => {
    if (!state.examSession || state.examSession.noTimer) { clearExamTimer(); return; }
    state.examSession.timeLeft -= 1;
    
    if (state.examSession.timeLeft <= 0) {
      state.examSession.timeLeft = 0;
      clearExamTimer();
      render();
      await submitExam();
      return;
    }
    
    const clockEl = document.getElementById('exam-timer-display');
    if (clockEl) {
      const minutes = String(Math.floor(state.examSession.timeLeft / 60)).padStart(2, '0');
      const seconds = String(state.examSession.timeLeft % 60).padStart(2, '0');
      clockEl.innerText = `${minutes}:${seconds}`;
      if (state.examSession.timeLeft < 300) clockEl.classList.add('animate-pulse', 'text-red-600');
    }
  }, 1000);
}

async function loadExam(examId) { const res = await api('getExamBundle', { examId }); return res.exam; }

function prepareExamForStart(exam) { state.prestartExam = { exam, duration: exam.duration }; render(); }

function beginExam(exam, durationSeconds) {
  state.prestartExam = null; state.reviewAttempt = null;
  const noTimer = durationSeconds === 0;
  state.examSession = { exam, answers: {}, openAnswers: {}, currentIndex: 0, viewMode: (exam.settings && exam.settings.defaultQuestionView) || 'single', timeLeft: durationSeconds, noTimer: noTimer };
  render(); startExamTimer();
}

async function submitExam() {
  if (!state.examSession) return;
  const session = state.examSession; const exam = session.exam;
  const questionOutcomes = []; const wrongItems = [];
  let correctCount = 0; let totalQuestions = 0;
  
  (exam.questions || []).forEach(question => {
    if (!Number.isInteger(question.correctIndex)) return;
    totalQuestions += 1;
    const userAnswer = session.answers[question.id];
    const isCorrect = Number(userAnswer) === Number(question.correctIndex);
    if (isCorrect) correctCount += 1;
    
    if (!isCorrect) {
      const snapshot = JSON.parse(JSON.stringify(question));
      if (snapshot.sourcePdfBase64) delete snapshot.sourcePdfBase64;
      wrongItems.push({
        questionKey: question.questionKey || `${exam.id}::${question.id}`, questionId: question.id, sourceExamId: question.sourceExamId || exam.id,
        subjectCode: question.subjectCode || exam.subjectCode || '', subjectAr: question.subjectAr || exam.subjectAr || '',
        semester: question.semester != null ? question.semester : exam.semester, unitTitleAr: question.unitTitleAr || exam.unitTitleAr || '',
        subunitTitleAr: question.subunitTitleAr || exam.subunitTitleAr || '', questionSnapshot: snapshot
      });
    }
  });

  const score = percent(correctCount, totalQuestions || 1);
  try {
    setLoading(true);
    const res = await api('submitResult', { userId: state.user.id, userName: state.user.name, examId: exam.id, examTitle: exam.title || '', subjectCode: exam.subjectCode || '', subjectAr: exam.subjectAr || '', semester: exam.semester != null ? exam.semester : 0, unitTitleAr: exam.unitTitleAr || '', subunitTitleAr: exam.subunitTitleAr || '', score, totalQuestions, correctCount, answers: session.answers, openAnswers: session.openAnswers, wrongItems, examSnapshot: stripBase64Exam(exam) });
    clearExamTimer(); state.examSession = null;
    await refreshData(); await openAttemptReview(res.attemptId);
    showToast('تم حفظ النتيجة والمراجعة بنجاح');
  } catch (err) { showToast('فشل حفظ النتيجة: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function openAttemptReview(attemptId) {
  try { setLoading(true); const res = await api('getAttemptReview', { attemptId }); state.reviewAttempt = res.attempt; state.examSession = null; clearExamTimer(); } 
  catch (err) { showToast('تعذر فتح المراجعة: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function generateRedo(payload) {
  try { setLoading(true); let res; if (payload.attemptId) { res = await api('buildWrongRedo', { userId: state.user.id, resultId: payload.attemptId }); } else { res = await api('generateRedoExam', Object.assign({ userId: state.user.id, limit: 50 }, payload)); } prepareExamForStart(res.exam); } 
  catch (err) { showToast('تعذر إنشاء إعادة الأخطاء: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function generateCustomExam() {
  try {
    const selectedUnits = state.builder.selectedUnitKeys;
    if (!selectedUnits.length) { showToast('اختر وحدة واحدة على الأقل.', 'error'); return; }
    if (state.builder.mode === 'manual') {
      let hasCounts = false;
      selectedUnits.forEach(key => { if (Number(state.builder.explicitCounts[key] || 0) > 0) hasCounts = true; });
      if (!hasCounts) { showToast('يرجى تحديد عدد الأسئلة لوحدة واحدة على الأقل.', 'error'); return; }
    }
    setLoading(true);
    // duration 0 means no timer
    const finalDuration = state.builder.noTimer ? 0 : Number(state.builder.duration || 120) * 60;
    const payload = { subjectCode: state.subjectCode, totalQuestions: Number(state.builder.totalQuestions || 100), duration: finalDuration, mode: state.builder.mode, selectedUnits: selectedUnits, selectedExamIds: state.builder.selectedExamIds.slice(), explicitUnitCounts: state.builder.explicitCounts, title: 'امتحان مخصص - ' + (getSubject(state.subjectCode) ? getSubject(state.subjectCode).nameAr : '') };
    const res = await api('buildCustomExam', payload);
    prepareExamForStart(res.exam);
  } catch (err) { showToast('تعذر تكوين الامتحان: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

document.addEventListener('click', async event => {
  const target = event.target.closest('[data-action]');
  if (!target) return;
  const action = target.getAttribute('data-action');
  try {
    if (action === 'login') {
      const input = document.getElementById('login-name'); const name = String(input ? input.value : '').trim();
      if (!name) { showToast('أدخل الاسم أولًا', 'error'); return; }
      state.user = { id: name.replace(/\s+/g, '_'), name }; saveLocal(CONFIG.STORAGE_KEYS.user, state.user);
      await refreshData(); return;
    }
    if (action === 'logout') { localStorage.removeItem(CONFIG.STORAGE_KEYS.user); state.user = null; state.examSession = null; state.reviewAttempt = null; state.subjectCode = null; clearExamTimer(); render(); return; }
    if (action === 'toggle-dark') { setDarkMode(!state.darkMode); return; } 
    if (action === 'go-home') { backToHome(); return; }
    if (action === 'open-subject') { openSubject(target.getAttribute('data-subject-code')); return; }
    if (action === 'subject-tab') { state.subjectTab = target.getAttribute('data-tab'); render(); return; }
    if (action === 'select-unit') { state.unitKey = target.getAttribute('data-unit-key'); render(); return; }
    if (action === 'jump-builder-with-unit') { const unitKey = target.getAttribute('data-unit-key'); state.subjectTab = 'builder'; if (!state.builder.selectedUnitKeys.includes(unitKey)) { state.builder.selectedUnitKeys.push(unitKey); getExamsForUnit(state.subjectCode, unitKey).forEach(e => { if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); }); } render(); return; }
    if (action === 'prepare-exam') { setLoading(true); const exam = await loadExam(target.getAttribute('data-exam-id')); prepareExamForStart(exam); state.loading = false; render(); return; }
    if (action === 'close-prestart') { state.prestartExam = null; render(); return; }
    if (action === 'start-prepared-exam') {
      const exam = state.prestartExam.exam; 
      let duration = Number(state.prestartExam.duration || exam.duration || 3600);
      if (exam.allowStudentTimeOverride) {
        const noTimerChk = document.getElementById('prestart-no-timer');
        if (noTimerChk && noTimerChk.checked) {
          duration = 0; // Infinite
        } else {
          const input = document.getElementById('prestart-duration'); 
          const minutes = Number(input ? input.value : minutesLabel(exam.duration));
          const minMinutes = minutesLabel(exam.minDuration || 300); const maxMinutes = minutesLabel(exam.maxDuration || Math.max(exam.duration || 3600, 3600));
          duration = Math.max(minMinutes, Math.min(maxMinutes, minutes)) * 60;
        }
      } else if (!exam.duration) {
         duration = 0;
      }
      beginExam(exam, duration); return;
    }
    if (action === 'set-view-mode') { if (state.examSession) { state.examSession.viewMode = target.getAttribute('data-view-mode'); render(); } return; }
    if (action === 'exam-prev') { state.examSession.currentIndex = Math.max(0, state.examSession.currentIndex - 1); render(); return; }
    if (action === 'exam-next') { const exam = state.examSession.exam; const total = (exam.questions || []).length + (exam.openQuestions || []).length; state.examSession.currentIndex = Math.min(total - 1, state.examSession.currentIndex + 1); render(); return; }
    
    if (action === 'select-answer') {
      if (!state.examSession) return;
      const qid = target.getAttribute('data-question-id');
      const index = Number(target.getAttribute('data-index'));
      state.examSession.answers[qid] = index;
      
      const container = target.closest('.question-options-container');
      if (container) {
         const buttons = container.querySelectorAll('button[data-action="select-answer"]');
         buttons.forEach((btn, btnIdx) => {
            const isSelected = btnIdx === index;
            btn.className = `rounded-2xl border-2 p-4 text-right transition-all duration-200 ${isSelected ? 'border-brand-600 bg-brand-50 dark:bg-brand-900/20 shadow-sm' : 'border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/70 hover:border-slate-300 dark:hover:border-slate-700'}`;
            const letterEl = btn.querySelector('.rounded-full.border-2');
            if (letterEl) {
                letterEl.className = `h-8 w-8 rounded-full border-2 flex shrink-0 items-center justify-center text-sm font-black ${isSelected ? 'bg-brand-600 text-white border-brand-600' : 'border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400'}`;
            }
         });
      }
      updateProgressUI();
      return;
    }
    
    if (action === 'submit-exam') { await submitExam(); return; }
    if (action === 'cancel-exam') { if (confirm('هل أنت متأكد من إنهاء الامتحان؟ لن يتم حفظ إجاباتك الحالية.')) { state.examSession = null; clearExamTimer(); render(); } return; }
    if (action === 'review-attempt') { await openAttemptReview(target.getAttribute('data-attempt-id')); return; }
    if (action === 'close-review') { state.reviewAttempt = null; render(); return; }
    if (action === 'redo-attempt') { await generateRedo({ attemptId: target.getAttribute('data-attempt-id') }); return; }
    if (action === 'redo-by-subject') { await generateRedo({ subjectCode: target.getAttribute('data-subject-code') }); return; }
    
    if (action === 'toggle-builder-exam') {
      const eid = target.getAttribute('data-exam-id');
      if (target.checked && !state.builder.selectedExamIds.includes(eid)) state.builder.selectedExamIds.push(eid);
      else if (!target.checked) state.builder.selectedExamIds = state.builder.selectedExamIds.filter(id => id !== eid);
      render(); return;
    }
    
    if (action === 'toggle-builder-unit') {
      const unitKey = target.getAttribute('data-unit-key');
      if (target.checked) { 
         if (!state.builder.selectedUnitKeys.includes(unitKey)) {
             state.builder.selectedUnitKeys.push(unitKey); 
             getExamsForUnit(state.subjectCode, unitKey).forEach(e => {
                if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id);
             });
         }
      } else { 
         state.builder.selectedUnitKeys = state.builder.selectedUnitKeys.filter(k => k !== unitKey); 
         delete state.builder.explicitCounts[unitKey]; 
         const unitExamIds = getExamsForUnit(state.subjectCode, unitKey).map(e => e.id);
         state.builder.selectedExamIds = state.builder.selectedExamIds.filter(id => !unitExamIds.includes(id));
      }
      render(); return;
    }
    
    if (action === 'build-custom-exam') { await generateCustomExam(); return; }
    
    // Admin Actions
    if (action === 'open-admin') { openAdmin(); return; }
    if (action === 'close-admin') { closeAdmin(); return; }
    if (action === 'admin-login-submit') {
       const pass = document.getElementById('admin-password-input').value;
       await adminLogin(pass);
       return;
    }
    if (action === 'admin-tab') { state.admin.tab = target.getAttribute('data-tab'); render(); return; }
    if (action === 'admin-upload-submit') {
       try {
         setLoading(true);
         const jsonText = document.getElementById('admin-json-input').value;
         const pdfFile = state.admin.form.pdfDataUrl;
         const pdfName = state.admin.form.pdfFileName;
         if(!jsonText) throw new Error('يجب وضع كود الـ JSON');
         await api('uploadExam', { adminPassword: CONFIG.ADMIN_PASSWORD, examJson: jsonText, pdfDataUrl: pdfFile, pdfFileName: pdfName });
         showToast('تم رفع وحفظ الامتحان في البنك بنجاح');
         state.admin.form.pdfDataUrl = null; state.admin.form.pdfFileName = '';
         await refreshData();
       } catch (err) { showToast('خطأ في الرفع: ' + err.message, 'error'); } 
       finally { setLoading(false); render(); }
       return;
    }
    if (action === 'admin-delete-exam') {
       if (!confirm('هل أنت متأكد من حذف هذا الامتحان بالكامل من المنصة؟')) return;
       try {
         setLoading(true);
         await api('deleteExam', { adminPassword: CONFIG.ADMIN_PASSWORD, examId: target.getAttribute('data-exam-id') });
         showToast('تم حذف الامتحان');
         await refreshData();
       } catch (err) { showToast('خطأ في الحذف: ' + err.message, 'error'); } 
       finally { setLoading(false); render(); }
       return;
    }
    if (action === 'close-toast') { state.toast = null; render(); return; }
  } catch (err) { showToast(err.message || 'حدث خطأ غير متوقع', 'error'); }
});

document.addEventListener('change', event => {
  const builderField = event.target.getAttribute('data-builder-field');
  if (builderField) {
    if (builderField === 'mode') state.builder.mode = event.target.value;
    if (builderField === 'totalQuestions') state.builder.totalQuestions = Number(event.target.value || 0);
    if (builderField === 'duration') state.builder.duration = Number(event.target.value || 0);
    if (builderField === 'noTimer') state.builder.noTimer = event.target.checked;
    render(); return;
  }
  if (event.target.getAttribute('data-action') === 'set-builder-unit-count') { state.builder.explicitCounts[event.target.getAttribute('data-unit-key')] = Number(event.target.value || 0); render(); return; }
  
  if (event.target.id === 'admin-pdf-file') {
     const file = event.target.files[0];
     if (file) {
        const reader = new FileReader();
        reader.onload = e => { state.admin.form.pdfDataUrl = e.target.result; state.admin.form.pdfFileName = file.name; render(); };
        reader.readAsDataURL(file);
     }
  }
});

document.addEventListener('input', event => {
  if (event.target.getAttribute('data-action') === 'set-open-answer') {
    if (!state.examSession) return;
    state.examSession.openAnswers[event.target.getAttribute('data-question-id')] = event.target.value;
    updateProgressUI(); 
    return;
  }
});

const style = document.createElement('style');
style.textContent = `
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
`;
document.head.appendChild(style);

render();
if (state.user) refreshData();
</script>
</body>
</html>
