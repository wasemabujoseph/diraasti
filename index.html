<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دراستي</title>
  <meta name="theme-color" content="#0f172a" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Cairo', 'Tahoma', 'Arial', 'sans-serif'],
          },
          colors: {
            brand: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' }
          },
          boxShadow: { soft: '0 20px 45px rgba(2, 6, 23, 0.10)', glow: '0 18px 45px rgba(79, 70, 229, 0.22)' }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <style>
    body { font-family: 'Cairo', Tahoma, Arial, sans-serif; }
    .glass { backdrop-filter: blur(18px); background: rgba(255,255,255,.72); }
    .dark .glass { background: rgba(15,23,42,.72); }
    .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,.35); border-radius: 999px; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 selection:bg-brand-500 selection:text-white">
  <div id="root"></div>

<script>
const CONFIG = {
  APP_NAME: 'دراستي',
  APP_SUBTITLE: 'محاكاة ذكية للتوجيهي مع بنك أسئلة وتحليل نقاط القوة والضعف',
  API_BASE: 'https://script.google.com/macros/s/AKfycbxbRTV0pYSXJDRQe2oTBzhVaNYkW9P-ILbB2FruLQp1Tgf7eJOM7OByJa6ioH7NK9Zalw/exec',
  ADMIN_PASSWORD: 'admin',
  STORAGE_KEYS: { user: 'dirasti_user_v7', darkMode: 'dirasti_dark_v7' }
};

const CURRICULUM = {
  gradeAr: 'الصف الثاني عشر',
  trackAr: 'المسار الأكاديمي',
  comprehensiveLabel: 'بنك شامل لكل المادة',
  subjects: [
    {
      code: 'chemistry', nameAr: 'الكيمياء', examMode: 'OMR_MCQ',
      weights: { '1|حالات المادة': 13.5, '1|المحاليل': 8, '1|الاتزان الكيميائي': 10.8, '1|الحموض والقواعد وتطبيقاتها': 18.9, '2|الكيمياء الحركيه': 13.5, '2|الكيمياء الكهربائيه': 17.5, '2|الكيمياء العضويه': 17.5 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['حالات المادة','المحاليل','الاتزان الكيميائي','الحموض والقواعد وتطبيقاتها'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['الكيمياء الحركيه','الكيمياء الكهربائيه','الكيمياء العضويه'] }
      ]
    },
    {
      code: 'life_sciences', nameAr: 'الأحياء', examMode: 'OMR_MCQ',
      weights: { '1|كيمياء الحياة': 16.9, '1|دوره الخليه وتصنيع البروتينات': 12.8, '1|الوراثة': 14.9, '1|التكنولوجيا الحيوية': 8.2, '2|التنظيم والاتزان': 11.8, '2|الدعامه والحركه': 6.1, '2|الهضم والنقل وتبادل الغازات': 10.7, '2|الاخراج والتكاثر': 11.3, '2|المناعه والمضادات الحيويه': 6.9 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['كيمياء الحياة','دوره الخليه وتصنيع البروتينات','الوراثة','التكنولوجيا الحيوية'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['التنظيم والاتزان','الدعامه والحركه','الهضم والنقل وتبادل الغازات','الاخراج والتكاثر','المناعه والمضادات الحيويه'] }
      ]
    },
    {
      code: 'islamic_education', nameAr: 'التربيه الاسلاميه', examMode: 'OMR_MCQ',
      weights: { '1|علاقه الانسان بربه': 16.66, '1|علاقه الانسان بنفسه': 16.66, '1|علاقه الانسان بمن حوله': 16.66, '2|علاقه الانسان بربه': 16.66, '2|علاقه الانسان بنفسه': 16.66, '2|علاقه الانسان بمن حوله': 16.66 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] }
      ]
    },
    {
      code: 'english', nameAr: 'Advance English', examMode: 'HYBRID',
      weights: { '1|Unit 1': 10, '1|Unit 2': 10, '1|Unit 3': 10, '1|Unit 4': 10, '1|Unit 5': 10, '2|Unit 6': 10, '2|Unit 7': 10, '2|Unit 8': 10, '2|Unit 9': 10, '2|Unit 10': 10 },
      semesters: [
        { semester: 1, titleAr: 'Semester 1', units: ['Unit 1','Unit 2','Unit 3','Unit 4','Unit 5'] },
        { semester: 2, titleAr: 'Semester 2', units: ['Unit 6','Unit 7','Unit 8','Unit 9','Unit 10'] }
      ]
    }
  ]
};

const THEMES = [
  { border: 'border-blue-500', bgOuter: 'bg-blue-50 dark:bg-blue-900/20', bgInner: 'bg-white dark:bg-blue-950', textMain: 'text-blue-700 dark:text-blue-400', hover: 'hover:border-blue-400', badge: 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300' },
  { border: 'border-purple-500', bgOuter: 'bg-purple-50 dark:bg-purple-900/20', bgInner: 'bg-white dark:bg-purple-950', textMain: 'text-purple-700 dark:text-purple-400', hover: 'hover:border-purple-400', badge: 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300' },
  { border: 'border-emerald-500', bgOuter: 'bg-emerald-50 dark:bg-emerald-900/20', bgInner: 'bg-white dark:bg-emerald-950', textMain: 'text-emerald-700 dark:text-emerald-400', hover: 'hover:border-emerald-400', badge: 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300' },
  { border: 'border-amber-500', bgOuter: 'bg-amber-50 dark:bg-amber-900/20', bgInner: 'bg-white dark:bg-amber-950', textMain: 'text-amber-700 dark:text-amber-400', hover: 'hover:border-amber-400', badge: 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300' },
  { border: 'border-rose-500', bgOuter: 'bg-rose-50 dark:bg-rose-900/20', bgInner: 'bg-white dark:bg-rose-950', textMain: 'text-rose-700 dark:text-rose-400', hover: 'hover:border-rose-400', badge: 'bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300' },
  { border: 'border-cyan-500', bgOuter: 'bg-cyan-50 dark:bg-cyan-900/20', bgInner: 'bg-white dark:bg-cyan-950', textMain: 'text-cyan-700 dark:text-cyan-400', hover: 'hover:border-cyan-400', badge: 'bg-cyan-100 text-cyan-800 dark:bg-cyan-900/40 dark:text-cyan-300' }
];

function getTheme(index) { return THEMES[index % THEMES.length]; }

const state = {
  user: loadLocal(CONFIG.STORAGE_KEYS.user, null),
  darkMode: loadLocal(CONFIG.STORAGE_KEYS.darkMode, false),
  loading: false, toast: null,
  data: { exams: [], results: [], analytics: { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] }, questionBankSummary: { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] } },
  subjectCode: null, subjectTab: 'units', unitKey: null,
  prestartExam: null, examSession: null, reviewAttempt: null, timerId: null,
  admin: { open: false, authenticated: false, tab: 'upload', allResults: [], selectedUserId: null, selectedSubjectCode: null, form: { subjectCode: '', unitKey: '', editingExamId: null, pdfDataUrl: null, pdfFileName: '' } },
  builder: { totalQuestions: 100, mode: 'weighted', selectedUnitKeys: [], explicitCounts: {}, selectedExamIds: [] }
};

window.__PDF_SOURCES = {};
window.__PDF_DOCS = {};

function loadLocal(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (err) { return fallback; } }
function saveLocal(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

function setDarkMode(value) { state.darkMode = !!value; document.documentElement.classList.toggle('dark', state.darkMode); saveLocal(CONFIG.STORAGE_KEYS.darkMode, state.darkMode); }
setDarkMode(state.darkMode);

function escapeHtml(value) { return String(value == null ? '' : value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function initials(name) { return String(name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join('').toUpperCase() || 'ط'; }
function formatDate(value) { if (!value) return '-'; try { return new Date(value).toLocaleString('ar-JO'); } catch (err) { return String(value); } }
function percent(correct, total) { if (!total) return 0; return Math.round((Number(correct || 0) / Number(total || 1)) * 100); }

function getSubject(code) { return CURRICULUM.subjects.find(subject => subject.code === code) || null; }
function getSubjectSummary(code) { return (state.data.questionBankSummary.subjects || []).find(subject => subject.subjectCode === code) || { totalQuestions: 0, totalExams: 0, units: [] }; }
function makeUnitKey(subjectCode, semester, unitTitleAr) { return [subjectCode, Number(semester || 0), unitTitleAr || ''].join('||'); }
function parseUnitKey(unitKey) { const parts = String(unitKey || '').split('||'); return { subjectCode: parts[0] || '', semester: Number(parts[1] || 0), unitTitleAr: parts.slice(2).join('||') || '' }; }

function buildSubjectUnits(subjectCode) {
  const subject = getSubject(subjectCode); if (!subject) return []; const units = [];
  subject.semesters.forEach(semester => { semester.units.forEach(unitTitleAr => { units.push({ key: makeUnitKey(subjectCode, semester.semester, unitTitleAr), subjectCode, semester: semester.semester, semesterTitleAr: semester.titleAr, unitTitleAr, weight: Number(subject.weights[`${semester.semester}|${unitTitleAr}`] || 0) }); }); });
  units.push({ key: makeUnitKey(subjectCode, 0, CURRICULUM.comprehensiveLabel), subjectCode, semester: 0, semesterTitleAr: 'الفصلان معًا', unitTitleAr: CURRICULUM.comprehensiveLabel, weight: 0, comprehensive: true });
  return units;
}

function getExamsForSubject(subjectCode) { return (state.data.exams || []).filter(exam => exam.subjectCode === subjectCode); }
function getExamsForUnit(subjectCode, unitKey) { const info = parseUnitKey(unitKey); return getExamsForSubject(subjectCode).filter(exam => { return Number(exam.semester || 0) === Number(info.semester || 0) && String(exam.unitTitleAr || '').trim() === String(info.unitTitleAr || '').trim(); }); }
function getQuestionCountForUnit(unitKey) { return Number((state.data.questionBankSummary.byUnitKey || {})[unitKey] || 0); }
function getAttemptsForSubject(subjectCode) { return (state.data.results || []).filter(result => result.subjectCode === subjectCode); }
function getUnitAnalytics(subjectCode) { return (state.data.analytics.unitMastery || []).filter(item => item.subjectCode === subjectCode); }
function getSubjectAnalytics(subjectCode) { return (state.data.analytics.subjectMastery || []).find(item => item.subjectCode === subjectCode) || null; }
function hasApiBase() { return String(CONFIG.API_BASE || '').startsWith('https://script.google.com/macros/s/'); }

async function api(action, payload) {
  if (!hasApiBase()) throw new Error('ضع رابط Google Apps Script أولًا داخل CONFIG.API_BASE');
  const response = await fetch(CONFIG.API_BASE, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(Object.assign({ action }, payload || {})) });
  if (!response.ok) throw new Error('فشل الاتصال بالخادم');
  const data = await response.json();
  if (!data.ok) throw new Error(data.error || 'API Error');
  return data;
}

function showToast(message, type) {
  state.toast = { message, type: type || 'success' }; render();
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { state.toast = null; render(); }, 3200);
}

function setLoading(value) { state.loading = !!value; render(); }

async function refreshData() {
  if (!state.user) return;
  try {
    setLoading(true);
    const [examsRes, resultsRes, analyticsRes, bankRes] = await Promise.all([
      api('getCatalog'), api('getUserResults', { userId: state.user.id }),
      api('getUserAnalytics', { userId: state.user.id }), api('getQuestionBankSummary')
    ]);
    state.data.exams = examsRes.exams || [];
    state.data.results = resultsRes.results || [];
    state.data.analytics = analyticsRes.analytics || { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] };
    state.data.questionBankSummary = bankRes.summary || { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] };
    render();
  } catch (err) { showToast('خطأ في التحميل: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

function resetBuilderForSubject(subjectCode) {
  const units = buildSubjectUnits(subjectCode).filter(unit => !unit.comprehensive);
  state.builder.selectedUnitKeys = units.slice(0, Math.min(4, units.length)).map(unit => unit.key);
  state.builder.selectedExamIds = []; 
  state.builder.selectedUnitKeys.forEach(uk => { getExamsForUnit(subjectCode, uk).forEach(e => { if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); }); });
  state.builder.explicitCounts = {}; state.builder.mode = 'weighted'; state.builder.totalQuestions = 100;
}

function openSubject(subjectCode) { state.subjectCode = subjectCode; state.subjectTab = 'units'; state.unitKey = null; resetBuilderForSubject(subjectCode); render(); }
function backToHome() { state.subjectCode = null; state.subjectTab = 'units'; state.unitKey = null; state.reviewAttempt = null; state.examSession = null; clearExamTimer(); render(); }
function openAdmin() { state.admin.open = true; render(); }
function closeAdmin() { state.admin.open = false; render(); }

async function adminLogin(password) {
  if (password !== CONFIG.ADMIN_PASSWORD) { showToast('كلمة مرور الإدارة غير صحيحة', 'error'); return; }
  state.admin.authenticated = true;
  try {
    setLoading(true);
    const res = await api('listAllResults', { adminPassword: CONFIG.ADMIN_PASSWORD });
    state.admin.allResults = res.results || [];
    if (!state.admin.form.subjectCode && CURRICULUM.subjects.length > 0) state.admin.form.subjectCode = CURRICULUM.subjects[0].code;
  } catch (err) { showToast('تعذر تحميل نتائج الإدارة: ' + err.message, 'error'); }
  finally { setLoading(false); render(); }
}

function buildSubjectCards() {
  return CURRICULUM.subjects.map(subject => {
    const summary = getSubjectSummary(subject.code);
    const analytics = getSubjectAnalytics(subject.code);
    const subjectQuestions = state.data.questionBankSummary.bySubject[subject.code] || 0;
    return `
      <button data-action="open-subject" data-subject-code="${escapeHtml(subject.code)}" class="rounded-[32px] p-6 text-right border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft hover:shadow-glow transition-all duration-300 transform hover:-translate-y-1 group">
        <div class="flex items-start justify-between gap-4">
          <div>
            <div class="inline-flex rounded-full bg-brand-50 dark:bg-brand-950/40 text-brand-700 dark:text-brand-300 px-3 py-1 text-xs font-black">${escapeHtml(subject.examMode)}</div>
            <div class="mt-4 text-2xl font-black text-slate-900 dark:text-white group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">${escapeHtml(subject.nameAr)}</div>
            <div class="mt-2 text-sm text-slate-500 dark:text-slate-400">اضغط لعرض الوحدات والامتحانات</div>
          </div>
          <div class="h-14 w-14 rounded-3xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 flex items-center justify-center text-xl font-black shadow-md group-hover:scale-110 transition-transform">${escapeHtml(subject.nameAr.slice(0,1))}</div>
        </div>
        <div class="mt-6 grid grid-cols-3 gap-3 text-sm">
          <div class="rounded-2xl bg-slate-50 dark:bg-slate-800 p-3 text-center"><div class="text-slate-500 dark:text-slate-400 text-[11px] md:text-xs">الوحدات</div><div class="mt-1 font-black text-brand-600 dark:text-brand-400">${summary.units.length || buildSubjectUnits(subject.code).length - 1}</div></div>
          <div class="rounded-2xl bg-slate-50 dark:bg-slate-800 p-3 text-center"><div class="text-slate-500 dark:text-slate-400 text-[11px] md:text-xs">البنك</div><div class="mt-1 font-black text-brand-600 dark:text-brand-400">${subjectQuestions}</div></div>
          <div class="rounded-2xl bg-slate-50 dark:bg-slate-800 p-3 text-center"><div class="text-slate-500 dark:text-slate-400 text-[11px] md:text-xs">الإتقان</div><div class="mt-1 font-black text-brand-600 dark:text-brand-400">${analytics ? analytics.mastery + '%' : '0%'}</div></div>
        </div>
      </button>
    `;
  }).join('');
}

function renderLogin() {
  return `
    <div class="min-h-screen p-4 md:p-8 flex items-center justify-center bg-slate-50 dark:bg-slate-950">
      <div class="max-w-6xl w-full grid lg:grid-cols-2 gap-8 items-center">
        <div class="rounded-[32px] p-10 bg-gradient-to-br from-brand-900 via-brand-700 to-slate-900 text-white shadow-glow">
          <div class="inline-flex rounded-full bg-white/20 px-4 py-2 text-sm font-bold backdrop-blur-sm">جاهز للمذاكرة والتدريب العلاجي</div>
          <h1 class="mt-8 text-5xl md:text-6xl font-black tracking-tight leading-tight">${escapeHtml(CONFIG.APP_NAME)}</h1>
          <p class="mt-6 text-white/90 text-lg leading-relaxed">${escapeHtml(CONFIG.APP_SUBTITLE)}</p>
        </div>
        <div class="rounded-[32px] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-10">
          <div class="text-sm font-bold text-brand-600 dark:text-brand-400 tracking-wider">دخول الطالب</div>
          <h2 class="mt-3 text-3xl font-black text-slate-900 dark:text-white">ابدأ من هنا</h2>
          <div class="mt-8 space-y-5">
            <label class="block">
              <div class="mb-2 text-sm font-semibold text-slate-700 dark:text-slate-200">الاسم الكامل</div>
              <input id="login-name" class="w-full rounded-2xl border-2 border-slate-200 dark:border-slate-700 focus:border-brand-500 bg-slate-50 dark:bg-slate-950 px-5 py-4 transition-colors outline-none text-lg text-slate-900 dark:text-white" placeholder="مثال: أحمد محمد" />
            </label>
            <button data-action="login" class="w-full px-5 py-4 rounded-2xl font-bold bg-brand-600 hover:bg-brand-700 text-white shadow-glow transition-all transform hover:-translate-y-1 text-lg">الدخول إلى المنصة</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderTopBar() {
  return `
    <div class="fixed top-0 inset-x-0 z-40 glass border-b border-slate-200 dark:border-slate-800 shadow-sm transition-all duration-300">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
        <button data-action="go-home" class="flex items-center gap-3 min-w-0 hover:opacity-80 transition-opacity">
          <div class="h-11 w-11 rounded-2xl bg-brand-600 text-white flex items-center justify-center font-black shadow-glow text-xl">د</div>
          <div class="text-right min-w-0">
            <div class="font-black text-slate-900 dark:text-white truncate text-lg">${escapeHtml(CONFIG.APP_NAME)}</div>
          </div>
        </button>
        <div class="flex items-center gap-2 md:gap-3">
          <button data-action="toggle-dark" class="px-4 py-3 rounded-2xl font-bold bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">${state.darkMode ? '☀️' : '🌙'}</button>
          <button data-action="open-admin" class="hidden sm:block px-4 py-3 rounded-2xl font-bold border border-slate-300 dark:border-slate-700 bg-transparent hover:bg-slate-50 dark:hover:bg-slate-800 transition text-slate-900 dark:text-white">الإدارة</button>
          <button data-action="logout" class="px-4 py-3 rounded-2xl font-bold bg-red-50 text-red-600 hover:bg-red-100 transition">خروج</button>
        </div>
      </div>
    </div>
  `;
}

function renderHome() {
  const recentResults = (state.data.results || []).slice(0, 6);
  return `
    <div class="space-y-8">
      <div class="grid md:grid-cols-2 xl:grid-cols-4 gap-5">${buildSubjectCards()}</div>
      <div class="grid xl:grid-cols-[1.4fr,1fr] gap-6">
        <div class="rounded-[32px] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-6">
          <h3 class="text-2xl font-black text-slate-900 dark:text-white mb-6">أحدث المحاولات</h3>
          <div class="space-y-4">
            ${recentResults.length ? recentResults.map(result => `
              <div class="rounded-3xl border border-slate-100 dark:border-slate-800/60 bg-slate-50 dark:bg-slate-800/40 p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4 transition hover:bg-slate-100 dark:hover:bg-slate-800">
                <div>
                  <div class="font-black text-slate-900 dark:text-white text-lg">${escapeHtml(result.examTitle || result.subjectAr || '')}</div>
                  <div class="mt-1 text-sm font-semibold text-slate-600 dark:text-slate-400">${escapeHtml(result.subjectAr || '')} • ${escapeHtml(result.unitTitleAr || '')}</div>
                </div>
                <div class="flex items-center gap-4">
                  <div class="text-3xl font-black text-brand-600 dark:text-brand-400">${escapeHtml(result.score)}%</div>
                  <button data-action="review-attempt" data-attempt-id="${escapeHtml(result.id || result.resultId)}" class="px-5 py-3 rounded-2xl font-bold bg-slate-900 text-white dark:bg-white dark:text-slate-900 shadow-md hover:scale-105 transition-transform">مراجعة</button>

function computeBuilderPreview(subjectCode) {
  const selectedUnits = buildSubjectUnits(subjectCode).filter(unit => state.builder.selectedUnitKeys.includes(unit.key) && !unit.comprehensive);
  const preview = [];
  if (!selectedUnits.length) return preview;
  if (state.builder.mode === 'manual') {
    selectedUnits.forEach(unit => { preview.push({ key: unit.key, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Number(state.builder.explicitCounts[unit.key] || 0) }); });
    return preview;
  }
  const weights = selectedUnits.map(unit => Number(getSubject(subjectCode).weights[`${unit.semester}|${unit.unitTitleAr}`] || 1));
  const totalWeight = weights.reduce((sum, value) => sum + value, 0) || selectedUnits.length;
  selectedUnits.forEach((unit, index) => {
    const normalizedWeight = ((weights[index] / totalWeight) * 100);
    preview.push({ key: unit.key, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Math.round((normalizedWeight / 100) * Number(state.builder.totalQuestions || 0)) });
  });
  return preview;
}

function getQuestionPdfSource(question, exam) { 
  return question.sourcePdfBase64 || 
         (exam && exam.sourcePdfsMap && question.sourceExamId && exam.sourcePdfsMap[question.sourceExamId]) || 
         (exam && exam.sourcePdf && exam.sourcePdf.base64) || ''; 
}

function stripBase64Exam(exam) {
  const clone = JSON.parse(JSON.stringify(exam));
  if (clone.sourcePdf && clone.sourcePdf.base64) delete clone.sourcePdf.base64;
  if (clone.sourcePdfsMap) delete clone.sourcePdfsMap;
  ['questions', 'openQuestions'].forEach(field => { (clone[field] || []).forEach(item => { if (item && item.sourcePdfBase64) delete item.sourcePdfBase64; }); });
  return clone;
}

function renderPdfPreview(question, exam, suffix) {
  if (!question || !question.pdfPageRef || !question.pdfPageRef.page) return '';
  const pdfBase64 = getQuestionPdfSource(question, exam);
  if (!pdfBase64) return '<div class="text-sm text-slate-500 p-4 bg-slate-100 dark:bg-slate-800 rounded-xl">لا يتوفر PDF لهذا السؤال.</div>';
  const pdfKey = `${question.questionKey || question.id || 'q'}_${suffix || 'exam'}`;
  window.__PDF_SOURCES[pdfKey] = pdfBase64;
  return `
    <div class="rounded-3xl border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 p-4 space-y-4">
      <div class="font-black text-slate-700 dark:text-slate-200">مرجع PDF - صفحة ${escapeHtml(question.pdfPageRef.page)}</div>
      <div class="overflow-auto rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950">
        <canvas class="block max-w-full h-auto mx-auto pdf-canvas" data-pdf-key="${escapeHtml(pdfKey)}" data-page="${escapeHtml(question.pdfPageRef.page)}"></canvas>
      </div>
    </div>
  `;
}

function renderQuestionCard(question, index, exam, mode) {
  const session = state.examSession; const review = state.reviewAttempt;
  const userAnswer = mode === 'review' ? (review ? review.answers[question.id] : undefined) : (session ? session.answers[question.id] : undefined);
  const readOnly = mode === 'review';
  return `
    <div class="rounded-[32px] border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 md:p-8 shadow-sm ${mode === 'review' ? 'bg-slate-50 dark:bg-slate-900/40' : ''} mb-6">
      <div class="text-xl md:text-2xl font-black leading-relaxed" data-math>${escapeHtml(index + 1)}. ${escapeHtml(question.text || '')}</div>
      <div class="mt-6 ${question.pdfPageRef ? 'grid xl:grid-cols-[minmax(0,1fr),360px] gap-6' : ''}">
        <div class="grid gap-3 lg:grid-cols-2 question-options-container">
          ${(question.options || []).map((option, optionIndex) => {
            const isSelected = Number(userAnswer) === Number(optionIndex);
            const isCorrect = Number(question.correctIndex) === Number(optionIndex);
            const reviewClasses = mode === 'review' ? (isCorrect ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20' : isSelected ? 'border-red-500 bg-red-50 dark:bg-red-900/20' : 'border-slate-200 dark:border-slate-800') : (isSelected ? 'border-brand-600 bg-brand-50 dark:bg-brand-900/20' : 'border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/70');
            return `
              <button ${readOnly ? 'disabled' : ''} data-action="select-answer" data-question-id="${escapeHtml(question.id)}" data-index="${escapeHtml(optionIndex)}" class="rounded-2xl border-2 p-4 text-right transition-all ${reviewClasses}">
                <div class="flex items-center gap-4">
                  <div class="h-8 w-8 rounded-full border-2 flex items-center justify-center font-black ${isSelected && mode !== 'review' ? 'bg-brand-600 text-white border-brand-600' : 'border-slate-300 dark:border-slate-600'}">${String.fromCharCode(65 + optionIndex)}</div>
                  <div class="flex-1 font-semibold text-base" data-math>${escapeHtml(option)}</div>
                </div>
              </button>
            `;
          }).join('')}
        </div>
        ${question.pdfPageRef ? renderPdfPreview(question, exam, mode) : ''}
      </div>
      ${mode === 'review' && question.correctIndex != null ? `<div class="mt-4 p-4 rounded-2xl bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 font-bold border border-emerald-200 dark:border-emerald-800">الإجابة الصحيحة: ${escapeHtml(question.options[question.correctIndex] || '')}</div>` : ''}
    </div>
  `;
}

function renderExamScreen() {
  const session = state.examSession; const exam = session.exam;
  const items = [];
  (exam.questions || []).forEach(question => items.push({ kind: 'mcq', question }));
  const currentItem = items[session.currentIndex] || null;
  const progress = percent(Object.keys(session.answers).length, items.length || 1);
  
  let timerDisplay = '00:00';

function hydrateAfterRender() {
  setDarkMode(state.darkMode);
  if (window.renderMathInElement) {
    document.querySelectorAll('[data-math]').forEach(node => {
      try { window.renderMathInElement(node, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }], throwOnError: false }); } catch (err) {}
    });
  }
  renderPdfCanvases();
  if (state.admin.open && state.admin.tab === 'upload' && state.admin.form.editingExamId && document.getElementById('admin-json-input')) {
     if (!document.getElementById('admin-json-input').value && window.__EDIT_JSON) document.getElementById('admin-json-input').value = window.__EDIT_JSON;
  }
}

async function renderPdfCanvases() {
  if (!window.pdfjsLib) return;
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const canvases = Array.from(document.querySelectorAll('.pdf-canvas:not([data-rendered="true"])'));
  for (const canvas of canvases) {
    canvas.setAttribute('data-rendered', 'true');
    const pdfKey = canvas.getAttribute('data-pdf-key');
    const pageNumber = Number(canvas.getAttribute('data-page') || 1);
    const base64 = window.__PDF_SOURCES[pdfKey];
    if (!base64) continue;
    try {
      if (!window.__PDF_DOCS[pdfKey]) {
        const binary = atob(base64); const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        window.__PDF_DOCS[pdfKey] = await window.pdfjsLib.getDocument({ data: bytes }).promise;
      }
      const pdf = window.__PDF_DOCS[pdfKey]; const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1.2 }); const ctx = canvas.getContext('2d');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
    } catch (err) {}
  }
}

function clearExamTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }

function updateProgressUI() {
  if (!state.examSession) return;
  const answeredCount = Object.keys(state.examSession.answers).length;
  const totalItems = (state.examSession.exam.questions || []).length;
  const pct = percent(answeredCount, totalItems || 1);
  const pText = document.getElementById('exam-progress-text'); if (pText) pText.innerText = `التقدم: ${pct}%`;
  const pBar = document.getElementById('exam-progress-bar'); if (pBar) pBar.style.width = `${pct}%`;
}

// مؤقت تصاعدي مفتوح لا يُغلق الامتحان أبدًا
function startExamTimer() {
  clearExamTimer();
  if (!state.examSession) return;
  state.examSession.timeSpent = 0;
  
  state.timerId = setInterval(() => {
    if (!state.examSession) { clearExamTimer(); return; }
    state.examSession.timeSpent += 1;
    
    const clockEl = document.getElementById('exam-timer-display');
    if (clockEl) {
      const minutes = String(Math.floor(state.examSession.timeSpent / 60)).padStart(2, '0');
      const seconds = String(state.examSession.timeSpent % 60).padStart(2, '0');
      clockEl.innerText = `${minutes}:${seconds}`;
    }
  }, 1000);
}

async function loadExam(examId) { const res = await api('getExamBundle', { examId }); return res.exam; }

function prepareExamForStart(exam) { state.prestartExam = { exam }; render(); }

function beginExam(exam) {
  state.prestartExam = null; state.reviewAttempt = null;
  state.examSession = { exam, answers: {}, openAnswers: {}, currentIndex: 0, viewMode: (exam.settings && exam.settings.defaultQuestionView) || 'single', timeSpent: 0 };
  render(); startExamTimer();
}

async function submitExam() {
  if (!state.examSession) return;
  const session = state.examSession; const exam = session.exam;
  const wrongItems = []; let correctCount = 0; let totalQuestions = 0;
  
  (exam.questions || []).forEach(question => {
    if (!Number.isInteger(question.correctIndex)) return;
    totalQuestions += 1;
    const userAnswer = session.answers[question.id];
    const isCorrect = Number(userAnswer) === Number(question.correctIndex);
    if (isCorrect) correctCount += 1;
    if (!isCorrect) {
      const snapshot = JSON.parse(JSON.stringify(question));
      if (snapshot.sourcePdfBase64) delete snapshot.sourcePdfBase64;
      wrongItems.push({
        questionKey: question.questionKey || `${exam.id}::${question.id}`, questionId: question.id, sourceExamId: question.sourceExamId || exam.id,
        subjectCode: question.subjectCode || exam.subjectCode || '', subjectAr: question.subjectAr || exam.subjectAr || '',
        semester: question.semester != null ? question.semester : exam.semester, unitTitleAr: question.unitTitleAr || exam.unitTitleAr || '', subunitTitleAr: question.subunitTitleAr || exam.subunitTitleAr || '', questionSnapshot: snapshot
      });
    }
  });

  const score = percent(correctCount, totalQuestions || 1);
  try {
    setLoading(true);
    const res = await api('submitResult', { userId: state.user.id, userName: state.user.name, examId: exam.id, examTitle: exam.title || '', subjectCode: exam.subjectCode || '', subjectAr: exam.subjectAr || '', semester: exam.semester != null ? exam.semester : 0, unitTitleAr: exam.unitTitleAr || '', subunitTitleAr: exam.subunitTitleAr || '', score, totalQuestions, correctCount, answers: session.answers, openAnswers: session.openAnswers, wrongItems, examSnapshot: stripBase64Exam(exam) });
    clearExamTimer(); state.examSession = null;
    await refreshData(); await openAttemptReview(res.attemptId);
    showToast('تم حفظ النتيجة والمراجعة بنجاح');
  } catch (err) { showToast('فشل حفظ النتيجة: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function openAttemptReview(attemptId) {
  try { setLoading(true); const res = await api('getAttemptReview', { attemptId }); state.reviewAttempt = res.attempt; state.examSession = null; clearExamTimer(); } 
  catch (err) { showToast('تعذر فتح المراجعة: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function generateRedo(payload) {
  try { setLoading(true); let res; if (payload.attemptId) { res = await api('buildWrongRedo', { userId: state.user.id, resultId: payload.attemptId }); } else { res = await api('generateRedoExam', Object.assign({ userId: state.user.id, limit: 50 }, payload)); } prepareExamForStart(res.exam); } 
  catch (err) { showToast('تعذر إنشاء إعادة الأخطاء: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function generateCustomExam() {
  try {
    const selectedUnits = state.builder.selectedUnitKeys;
    if (!selectedUnits.length) { showToast('اختر وحدة واحدة على الأقل.', 'error'); return; }
    if (state.builder.mode === 'manual') {
      let hasCounts = false;
      selectedUnits.forEach(key => { if (Number(state.builder.explicitCounts[key] || 0) > 0) hasCounts = true; });
      if (!hasCounts) { showToast('يرجى تحديد عدد الأسئلة لوحدة واحدة على الأقل.', 'error'); return; }
    }
    setLoading(true);
    const payload = { subjectCode: state.subjectCode, totalQuestions: Number(state.builder.totalQuestions || 100), duration: 0, mode: state.builder.mode, selectedUnits: selectedUnits, selectedExamIds: state.builder.selectedExamIds.slice(), explicitUnitCounts: state.builder.explicitCounts, title: 'امتحان مخصص - ' + (getSubject(state.subjectCode) ? getSubject(state.subjectCode).nameAr : '') };
    const res = await api('buildCustomExam', payload);
    prepareExamForStart(res.exam);
  } catch (err) { showToast('تعذر تكوين الامتحان: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

document.addEventListener('click', async event => {
  const target = event.target.closest('[data-action]'); if (!target) return;
  const action = target.getAttribute('data-action');
  try {
    if (action === 'login') {
      const input = document.getElementById('login-name'); const name = String(input ? input.value : '').trim();
      if (!name) { showToast('أدخل الاسم أولًا', 'error'); return; }
      state.user = { id: name.replace(/\s+/g, '_'), name }; saveLocal(CONFIG.STORAGE_KEYS.user, state.user);
      await refreshData(); return;
    }
    if (action === 'logout') { localStorage.removeItem(CONFIG.STORAGE_KEYS.user); state.user = null; state.examSession = null; state.reviewAttempt = null; state.subjectCode = null; clearExamTimer(); render(); return; }
    if (action === 'toggle-dark') { setDarkMode(!state.darkMode); return; }
    if (action === 'go-home') { backToHome(); return; }
    if (action === 'open-subject') { openSubject(target.getAttribute('data-subject-code')); return; }
    if (action === 'subject-tab') { state.subjectTab = target.getAttribute('data-tab'); render(); return; }
    if (action === 'select-unit') { state.unitKey = target.getAttribute('data-unit-key'); render(); return; }
    if (action === 'prepare-exam') { setLoading(true); const exam = await loadExam(target.getAttribute('data-exam-id')); prepareExamForStart(exam); state.loading = false; render(); return; }
    if (action === 'close-prestart') { state.prestartExam = null; render(); return; }
    if (action === 'start-prepared-exam') { beginExam(state.prestartExam.exam); return; }
    if (action === 'set-view-mode') { if (state.examSession) { state.examSession.viewMode = target.getAttribute('data-view-mode'); render(); } return; }
    if (action === 'exam-prev') { state.examSession.currentIndex = Math.max(0, state.examSession.currentIndex - 1); render(); return; }
    if (action === 'exam-next') { const exam = state.examSession.exam; const total = (exam.questions || []).length; state.examSession.currentIndex = Math.min(total - 1, state.examSession.currentIndex + 1); render(); return; }
    if (action === 'select-answer') {
      if (!state.examSession) return;
      const qid = target.getAttribute('data-question-id'); const index = Number(target.getAttribute('data-index'));
      state.examSession.answers[qid] = index;
      const container = target.closest('.question-options-container');
      if (container) {
         const buttons = container.querySelectorAll('button[data-action="select-answer"]');
         buttons.forEach((btn, btnIdx) => {
            const isSelected = btnIdx === index;
            btn.className = `rounded-2xl border-2 p-4 text-right transition-all ${isSelected ? 'border-brand-600 bg-brand-50 dark:bg-brand-900/20' : 'border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/70'}`;
            const letterEl = btn.querySelector('.rounded-full.border-2');
            if (letterEl) letterEl.className = `h-8 w-8 rounded-full border-2 flex items-center justify-center font-black ${isSelected ? 'bg-brand-600 text-white border-brand-600' : 'border-slate-300 dark:border-slate-600'}`;
         });
      }
      updateProgressUI(); return;
    }
    if (action === 'submit-exam') { await submitExam(); return; }
    if (action === 'review-attempt') { await openAttemptReview(target.getAttribute('data-attempt-id')); return; }
    if (action === 'close-review') { state.reviewAttempt = null; render(); return; }
    if (action === 'redo-attempt') { await generateRedo({ attemptId: target.getAttribute('data-attempt-id') }); return; }
    if (action === 'redo-by-subject') { await generateRedo({ subjectCode: target.getAttribute('data-subject-code') }); return; }
    if (action === 'toggle-builder-exam') {
      const eid = target.getAttribute('data-exam-id');
      if (target.checked && !state.builder.selectedExamIds.includes(eid)) state.builder.selectedExamIds.push(eid);
      else if (!target.checked) state.builder.selectedExamIds = state.builder.selectedExamIds.filter(id => id !== eid);
      render(); return;
    }
    if (action === 'toggle-builder-unit') {
      const unitKey = target.getAttribute('data-unit-key');
      if (target.checked) { 
         if (!state.builder.selectedUnitKeys.includes(unitKey)) {
             state.builder.selectedUnitKeys.push(unitKey); 
             getExamsForUnit(state.subjectCode, unitKey).forEach(e => { if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); });
         }
      } else { 
         state.builder.selectedUnitKeys = state.builder.selectedUnitKeys.filter(k => k !== unitKey); 
         delete state.builder.explicitCounts[unitKey]; 
         const unitExamIds = getExamsForUnit(state.subjectCode, unitKey).map(e => e.id);
         state.builder.selectedExamIds = state.builder.selectedExamIds.filter(id => !unitExamIds.includes(id));
      }
      render(); return;
    }
    if (action === 'build-custom-exam') { await generateCustomExam(); return; }
    if (action === 'open-admin') { openAdmin(); return; }
    if (action === 'close-admin') { closeAdmin(); return; }
    if (action === 'admin-login-submit') { await adminLogin(document.getElementById('admin-password-input').value); return; }
    
    // Admin Drill-down Panel actions
    if (action === 'admin-tab') { state.admin.tab = target.getAttribute('data-tab'); state.admin.selectedUserId = null; state.admin.selectedSubjectCode = null; render(); return; }
    if (action === 'admin-select-user') { state.admin.selectedUserId = target.getAttribute('data-uid'); state.admin.selectedSubjectCode = null; render(); return; }
    if (action === 'admin-select-subject') { state.admin.selectedSubjectCode = target.getAttribute('data-sc'); render(); return; }
    if (action === 'admin-view-attempt') { state.admin.open = false; await openAttemptReview(target.getAttribute('data-attempt-id')); return; }

    if (action === 'admin-edit-exam') {
       const examId = target.getAttribute('data-exam-id');
       try {
           setLoading(true); const exam = await loadExam(examId);
           const unitKey = makeUnitKey(exam.subjectCode, exam.semester, exam.unitTitleAr);
           state.admin.tab = 'upload'; state.admin.form.editingExamId = examId; state.admin.form.subjectCode = exam.subjectCode; state.admin.form.unitKey = unitKey; state.admin.form.pdfDataUrl = null; state.admin.form.pdfFileName = '';
           const clone = JSON.parse(JSON.stringify(exam)); delete clone.id; if(clone.sourcePdf && clone.sourcePdf.base64) delete clone.sourcePdf.base64; window.__EDIT_JSON = JSON.stringify(clone, null, 2);
           render();
       } catch (e) { showToast('تعذر جلب بيانات الامتحان', 'error'); } finally { setLoading(false); }
       return;
    }
    if (action === 'cancel-admin-edit') { state.admin.form.editingExamId = null; state.admin.form.pdfDataUrl = null; state.admin.form.pdfFileName = ''; window.__EDIT_JSON = ''; render(); return; }
    if (action === 'admin-upload-submit') {
       if(!state.admin.form.subjectCode) { showToast('يجب اختيار المادة', 'error'); return; }
       if(!state.admin.form.unitKey) { showToast('يجب اختيار الوحدة', 'error'); return; }
       const jsonText = document.getElementById('admin-json-input').value;
       if(!jsonText) { showToast('يجب وضع كود JSON', 'error'); return; }
       let parsedJson; try { parsedJson = JSON.parse(jsonText); } catch (e) { showToast('كود JSON غير صالح.', 'error'); return; }
       const subjInfo = CURRICULUM.subjects.find(s => s.code === state.admin.form.subjectCode);
       const unitParts = parseUnitKey(state.admin.form.unitKey);
       parsedJson.subjectCode = subjInfo.code; parsedJson.subjectAr = subjInfo.nameAr; parsedJson.semester = unitParts.semester; parsedJson.unitTitleAr = unitParts.unitTitleAr;
       (parsedJson.questions || []).forEach(q => { q.subjectCode = subjInfo.code; q.subjectAr = subjInfo.nameAr; q.semester = unitParts.semester; q.unitTitleAr = unitParts.unitTitleAr; });
       try {
         setLoading(true);
         await api('uploadExam', { adminPassword: CONFIG.ADMIN_PASSWORD, examJson: JSON.stringify(parsedJson), pdfDataUrl: state.admin.form.pdfDataUrl, pdfFileName: state.admin.form.pdfFileName, examId: state.admin.form.editingExamId });
         showToast(state.admin.form.editingExamId ? 'تم تحديث الامتحان' : 'تم الحفظ في البنك');
         state.admin.form.pdfDataUrl = null; state.admin.form.pdfFileName = ''; state.admin.form.editingExamId = null; window.__EDIT_JSON = '';
         if(document.getElementById('admin-json-input')) document.getElementById('admin-json-input').value = '';
         await refreshData();
       } catch (err) { showToast('خطأ: ' + err.message, 'error'); } finally { setLoading(false); render(); }
       return;
    }
    if (action === 'admin-delete-exam') {
       if (!confirm('هل أنت متأكد من الحذف بالكامل من البنك؟')) return;
       try { setLoading(true); await api('deleteExam', { adminPassword: CONFIG.ADMIN_PASSWORD, examId: target.getAttribute('data-exam-id') }); showToast('تم الحذف'); await refreshData(); } catch (err) { showToast('خطأ الحذف: ' + err.message, 'error'); } finally { setLoading(false); render(); }
       return;
    }
    if (action === 'close-toast') { state.toast = null; render(); return; }
  } catch (err) { showToast(err.message || 'حدث خطأ', 'error'); }
});

document.addEventListener('change', event => {
  const builderField = event.target.getAttribute('data-builder-field');
  if (builderField) {
    if (builderField === 'mode') state.builder.mode = event.target.value;
    if (builderField === 'totalQuestions') state.builder.totalQuestions = Number(event.target.value || 0);
    render(); return;
  }
  if (event.target.getAttribute('data-action') === 'set-builder-unit-count') { state.builder.explicitCounts[event.target.getAttribute('data-unit-key')] = Number(event.target.value || 0); render(); return; }
  if (event.target.id === 'admin-subject-select') { state.admin.form.subjectCode = event.target.value; state.admin.form.unitKey = ''; render(); return; }
  if (event.target.id === 'admin-unit-select') { state.admin.form.unitKey = event.target.value; render(); return; }
  if (event.target.id === 'admin-json-file') { const f = event.target.files[0]; if (f) { const r = new FileReader(); r.onload = e => { document.getElementById('admin-json-input').value = e.target.result; }; r.readAsText(f); } }
  if (event.target.id === 'admin-pdf-file') { const f = event.target.files[0]; if (f) { const r = new FileReader(); r.onload = e => { state.admin.form.pdfDataUrl = e.target.result; state.admin.form.pdfFileName = f.name; render(); }; r.readAsDataURL(f); } }
});

const style = document.createElement('style');
style.textContent = `@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }`;
document.head.appendChild(style);

render();
if (state.user) refreshData();
</script>
