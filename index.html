function cls(...arr){ return arr.filter(Boolean).join(" "); }
function saveLocal(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function loadLocal(key, fallback=null){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function normalizeText(v=""){ return String(v).trim().toLowerCase(); }
function formatDate(ts){ try{ return new Date(ts).toLocaleString("ar-JO"); } catch { return ts || "-"; } }
function formatMinutes(sec=0){ return Math.max(1, Math.round(Number(sec || 0) / 60)); }
function initials(name=""){ return name.split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase(); }
function getSubjectByCode(code){ return CURRICULUM.subjects.find(s => s.code === code); }
function getSemester(subjectCode, semester){ return getSubjectByCode(subjectCode)?.semesters?.find(s => Number(s.semester) === Number(semester)); }
function getUnits(subjectCode, semester){ return getSemester(subjectCode, semester)?.units || []; }
function getSubunits(subjectCode, semester, unitTitle){ return getUnits(subjectCode, semester).find(u => u.titleAr === unitTitle)?.subunits || []; }
function flattenCurriculum(){ return CURRICULUM.subjects.flatMap(subject => (subject.semesters || []).flatMap(sem => (sem.units || []).map(unit => ({ subjectCode: subject.code, subjectAr: subject.nameAr, semester: sem.semester, semesterTitleAr: sem.titleAr, unitTitleAr: unit.titleAr, subunits: unit.subunits || [], notesAr: subject.notesAr || "" })))); }
function looksLikeDataUrl(value=""){ return /^data:image\//i.test(String(value || "")); }

function normalizeMediaItem(item, idx=0){
  if(!item) return null;
  if(typeof item === "string"){
    if(!looksLikeDataUrl(item)) return null;
    return { id:`media-${idx+1}`, kind:"image", title:`وسيط ${idx+1}`, mimeType: item.slice(5, item.indexOf(";")) || "image/png", dataUrl:item };
  }
  if(item.dataUrl && !looksLikeDataUrl(item.dataUrl)) return null;
  return { id:item.id || `media-${idx+1}`, kind:item.kind || "image", title:item.title || `وسيط ${idx+1}`, mimeType:item.mimeType || "image/png", dataUrl:item.dataUrl || "", sourcePage:item.sourcePage ?? null, sourceEvidence:item.sourceEvidence || "" };
}

function normalizeQuestion(q, idx, examDefaults={}){
  return {
    id: String(q.id || `q-${idx+1}`),
    text: q.text || "",
    options: Array.isArray(q.options) ? q.options : [],
    correctIndex: Number.isInteger(q.correctIndex) ? q.correctIndex : null,
    explanation: q.explanation || "",
    mediaRefs: Array.isArray(q.mediaRefs) ? q.mediaRefs : [],
    inlineMedia: Array.isArray(q.inlineMedia) ? q.inlineMedia.map(normalizeMediaItem).filter(Boolean) : [],
    unitTitleAr: q.unitTitleAr || examDefaults.unitTitleAr || "",
    subunitTitleAr: q.subunitTitleAr || examDefaults.subunitTitleAr || "",
    questionType: q.questionType || "mcq"
  };
}

function normalizeOpenQuestion(q, idx, examDefaults={}){
  return {
    id: String(q.id || `oq-${idx+1}`),
    prompt: q.prompt || q.text || "",
    idealAnswer: q.idealAnswer || "",
    explanation: q.explanation || "",
    mediaRefs: Array.isArray(q.mediaRefs) ? q.mediaRefs : [],
    inlineMedia: Array.isArray(q.inlineMedia) ? q.inlineMedia.map(normalizeMediaItem).filter(Boolean) : [],
    unitTitleAr: q.unitTitleAr || examDefaults.unitTitleAr || "",
    subunitTitleAr: q.subunitTitleAr || examDefaults.subunitTitleAr || "",
    sectionTitle: q.sectionTitle || "Essay",
    questionType: q.questionType || "essay"
  };
}

function normalizeExamPayload(exam){
  const clone = JSON.parse(JSON.stringify(exam || {}));
  clone.sharedMedia = (clone.sharedMedia || []).map(normalizeMediaItem).filter(Boolean);
  clone.questions = (clone.questions || []).map((q, idx) => normalizeQuestion(q, idx, clone));
  clone.openQuestions = (clone.openQuestions || []).map((q, idx) => normalizeOpenQuestion(q, idx, clone));
  clone.duration = Number(clone.duration || 1800);
  clone.settings = { defaultQuestionView: clone.settings?.defaultQuestionView || "single", allowSwitchView: clone.settings?.allowSwitchView !== false, showOneQuestionPerRow: true };
  return clone;
}

async function api(action, payload={}){
  const cleanApi = String(CONFIG.API_BASE || "").trim();
  if(!cleanApi || cleanApi.includes("https://script.google.com/macros/s/AKfycbzgHBjjA8CWtpEeQDKJtWS93xkT5o-73rrXkqsyNdxSXLYfin0qa_noS2YGzjoMw0U35w/exec")) throw new Error("ضع رابط Google Apps Script أولًا داخل CONFIG.API_BASE");
  const res = await fetch(cleanApi, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({ action, ...payload }) });
  if(!res.ok) throw new Error("فشل الاتصال بالخادم");
  let data;
  try { data = await res.json(); } catch { throw new Error("الخادم لم يرجع JSON صحيح"); }
  if(!data.ok) throw new Error(data.error || "API Error");
  return data;
}

function QuestionCard({ exam, q, index, selected, onSelect }){
  return <div className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4"><div className="text-xs font-bold text-brand-600 dark:text-brand-300">{q.unitTitleAr || ""} {q.subunitTitleAr ? `• ${q.subunitTitleAr}` : ""}</div><div className="font-black text-slate-900 dark:text-white mt-2">{index+1}. <RichText text={q.text} /></div><MediaGallery exam={exam} mediaRefs={q.mediaRefs} inlineMedia={q.inlineMedia} /><div className="mt-4 grid gap-3">{(q.options || []).map((opt, i) => <button key={i} onClick={() => onSelect(i)} className={cls("rounded-2xl border p-4 text-right transition", selected === i ? "border-brand-600 bg-brand-50 dark:bg-brand-950/30 dark:border-brand-500" : "border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/70")}><div className="flex items-center gap-3"><div className={cls("h-7 w-7 rounded-full border flex items-center justify-center text-xs font-black", selected === i ? "bg-brand-600 text-white border-brand-600" : "border-slate-300 dark:border-slate-700")}>{String.fromCharCode(65+i)}</div><div className="flex-1">{opt}</div></div></button>)}</div></div>;
}

function OpenQuestionCard({ exam, q, index, value, onChange }){
  return <div className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4"><div className="text-xs font-bold text-brand-600 dark:text-brand-300">{q.sectionTitle || q.questionType || "مقالي"}</div><div className="mt-2 font-black text-slate-900 dark:text-white">{index+1}. <RichText text={q.prompt} /></div><MediaGallery exam={exam} mediaRefs={q.mediaRefs} inlineMedia={q.inlineMedia} /><TextArea rows={8} className="mt-4" placeholder="اكتب إجابتك هنا..." value={value || ""} onChange={e => onChange(e.target.value)} /></div>;
}

function ExamScreen({ exam, user, onFinish, onExit }){
  const normalizedExam = useMemo(() => normalizeExamPayload(exam), [exam]);
  const mcq = normalizedExam.questions || [];
  const openQ = normalizedExam.openQuestions || [];
  const [timeLeft, setTimeLeft] = useState(normalizedExam.duration || 3600);
  const [answers, setAnswers] = useState({});
  const [openAnswers, setOpenAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [viewMode, setViewMode] = useState(normalizedExam.settings?.defaultQuestionView || "single");
  const [activeTab, setActiveTab] = useState(mcq.length ? "mcq" : "open");
  const [activeIndex, setActiveIndex] = useState(0);
  const sections = [...(mcq.length ? [{id:"mcq", title:"الاختيار من متعدد", items:mcq, type:"mcq"}] : []), ...(openQ.length ? [{id:"open", title:"الأسئلة المقالية", items:openQ, type:"open"}] : [])];
  const activeSection = sections.find(s => s.id === activeTab) || sections[0];
  const total = mcq.length + openQ.length || 1;
  const answered = Object.keys(answers).length + Object.values(openAnswers).filter(Boolean).length;
  const progress = Math.round((answered / total) * 100);

  useEffect(() => {
    if(submitted) return;
    const timer = setInterval(() => { setTimeLeft(prev => { if(prev <= 1){ clearInterval(timer); handleSubmit(); return 0; } return prev - 1; }); }, 1000);
    return () => clearInterval(timer);
  }, [submitted, answers, openAnswers]);

  useEffect(() => { setActiveIndex(0); }, [activeTab]);

  function handleSubmit(){
    if(submitted) return;
    let correct = 0;
    const wrongItems = [];
    mcq.forEach(q => {
      const userIndex = answers[q.id];
      if(userIndex === q.correctIndex) correct++;
      else wrongItems.push({ questionId:q.id, questionText:q.text, userAnswerIndex:userIndex ?? null, userAnswerText:userIndex != null ? q.options?.[userIndex] : "", correctIndex:q.correctIndex, correctAnswerText:q.correctIndex != null ? (q.options?.[q.correctIndex] || "") : "", explanation:q.explanation || "", subject: normalizedExam.subjectAr || normalizedExam.subject, subjectCode: normalizedExam.subjectCode || "", semester: normalizedExam.semester || "", unitTitleAr:q.unitTitleAr || normalizedExam.unitTitleAr || "", subunitTitleAr:q.subunitTitleAr || normalizedExam.subunitTitleAr || "", questionType:q.questionType || "mcq" });
    });
    const score = mcq.length ? Math.round((correct / mcq.length) * 100) : 100;
    const payload = { userId:user.id, userName:user.name, examId:normalizedExam.id, subject:normalizedExam.subjectAr || normalizedExam.subject, subjectCode:normalizedExam.subjectCode || "", score, semester:normalizedExam.semester || "", unitTitleAr:normalizedExam.unitTitleAr || "", subunitTitleAr:normalizedExam.subunitTitleAr || "", answers, openAnswers, wrongItems };
    setSubmitted(true);
    setResult({ score, wrongItems, openAnswersSnapshot: openAnswers });
    onFinish(payload);
  }

  const minutes = String(Math.floor(timeLeft / 60)).padStart(2,"0");
  const seconds = String(timeLeft % 60).padStart(2,"0");
  if(submitted && result){
    return <div className="space-y-6"><Card className="p-6 bg-gradient-to-br from-slate-950 via-brand-700 to-slate-900 text-white border-none"><div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4"><div><div className="text-white/75 text-sm font-bold">تم تسليم الامتحان</div><h2 className="text-3xl font-black mt-2">{normalizedExam.title || normalizedExam.subjectAr}</h2></div><div className="rounded-[28px] bg-white/10 px-8 py-5 text-center"><div className="text-sm text-white/75">النتيجة</div><div className="text-5xl font-black mt-2">{result.score}%</div></div></div></Card><SectionBlock title="تصحيح الاختيار من متعدد">{result.wrongItems.length ? result.wrongItems.map((w, i) => <div key={i} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4"><div className="text-xs font-bold text-brand-600 dark:text-brand-300">{w.unitTitleAr || "بدون وحدة"} {w.subunitTitleAr ? `• ${w.subunitTitleAr}` : ""}</div><div className="font-black text-slate-900 dark:text-white mt-2"><RichText text={w.questionText} /></div><div className="mt-3 text-sm text-red-600">إجابتك: {w.userAnswerText || "لم تجب"}</div><div className="text-sm text-emerald-600 mt-1">الصحيح: {w.correctAnswerText || "غير متوفر داخل المصدر"}</div>{w.explanation ? <div className="mt-2 text-sm text-slate-600 dark:text-slate-300">{w.explanation}</div> : null}</div>) : <div className="rounded-3xl bg-emerald-50 dark:bg-emerald-950/30 p-4 font-bold text-emerald-700 dark:text-emerald-200">ممتاز، لا توجد أخطاء في قسم MCQ.</div>}</SectionBlock>{openQ.length ? <SectionBlock title="الأسئلة المقالية">{openQ.map((q, idx) => <div key={q.id} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4"><div className="font-black text-slate-900 dark:text-white">{idx+1}. <RichText text={q.prompt} /></div><MediaGallery exam={normalizedExam} mediaRefs={q.mediaRefs} inlineMedia={q.inlineMedia} /><div className="mt-3 text-sm text-slate-500 dark:text-slate-400">إجابتك</div><div className="mt-2 rounded-2xl bg-slate-100 dark:bg-slate-800 p-3 whitespace-pre-wrap">{result.openAnswersSnapshot[q.id] || "لم تتم الإجابة"}</div><div className="mt-3 text-sm text-emerald-700 dark:text-emerald-300">الإجابة النموذجية</div><div className="mt-2 rounded-2xl bg-emerald-50 dark:bg-emerald-950/30 p-3 whitespace-pre-wrap">{q.idealAnswer || "-"}</div></div>)}</SectionBlock> : null}<Button variant="brand" onClick={onExit}>العودة للوحة التحكم</Button></div>;
  }

  const currentItems = activeSection?.items || [];
  const currentItem = currentItems[activeIndex];
  return <div className="space-y-6"><Card className="p-6"><div className="flex flex-col xl:flex-row xl:items-center justify-between gap-5"><div><div className="text-sm font-bold text-brand-600 dark:text-brand-300">{normalizedExam.subjectAr || normalizedExam.subject}</div><h1 className="text-3xl font-black text-slate-900 dark:text-white mt-2">{normalizedExam.title || normalizedExam.subjectAr || normalizedExam.subject}</h1><div className="mt-3 flex flex-wrap gap-2 text-sm"><span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">{normalizedExam.unitTitleAr || "بدون وحدة"}</span>{normalizedExam.subunitTitleAr ? <span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">{normalizedExam.subunitTitleAr}</span> : null}<span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">الوقت: {minutes}:{seconds}</span><span className="rounded-full bg-slate-100 dark:bg-slate-800 px-3 py-2">التقدم: {progress}%</span></div></div><div className="flex flex-wrap gap-3">{normalizedExam.settings?.allowSwitchView ? <div className="flex rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden"><button onClick={() => setViewMode("single")} className={cls("px-4 py-3 font-bold", viewMode === "single" ? "bg-slate-900 text-white dark:bg-white dark:text-slate-900" : "bg-transparent")}>سؤال بسؤال</button><button onClick={() => setViewMode("all")} className={cls("px-4 py-3 font-bold", viewMode === "all" ? "bg-slate-900 text-white dark:bg-white dark:text-slate-900" : "bg-transparent")}>عرض كامل</button></div> : null}<Button variant="outline" onClick={onExit}>إلغاء</Button><Button variant="brand" onClick={handleSubmit}>تسليم</Button></div></div><div className="mt-5 h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden"><div className="h-full bg-brand-600" style={{ width:`${progress}%` }}></div></div></Card>{sections.length > 1 ? <div className="flex flex-wrap gap-2">{sections.map(section => <button key={section.id} onClick={() => setActiveTab(section.id)} className={cls("px-4 py-3 rounded-2xl font-bold", activeTab === section.id ? "bg-slate-900 text-white dark:bg-white dark:text-slate-900" : "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800")}>{section.title}</button>)}</div> : null}{viewMode === "single" && currentItem ? <SectionBlock title={activeSection.title} subtitle={`السؤال ${activeIndex+1} من ${currentItems.length}`}>{activeSection.type === "mcq" ? <QuestionCard exam={normalizedExam} q={currentItem} index={activeIndex} selected={answers[currentItem.id]} onSelect={value => setAnswers(prev => ({ ...prev, [currentItem.id]: value }))} /> : <OpenQuestionCard exam={normalizedExam} q={currentItem} index={activeIndex} value={openAnswers[currentItem.id]} onChange={value => setOpenAnswers(prev => ({ ...prev, [currentItem.id]: value }))} />}<div className="flex flex-wrap justify-between gap-3"><Button variant="outline" disabled={activeIndex === 0} onClick={() => setActiveIndex(v => Math.max(0, v-1))}>السابق</Button><Button variant="brand" disabled={activeIndex >= currentItems.length-1} onClick={() => setActiveIndex(v => Math.min(currentItems.length-1, v+1))}>التالي</Button></div></SectionBlock> : null}{viewMode === "all" ? <div className="space-y-6">{mcq.length ? <SectionBlock title="الاختيار من متعدد" subtitle="الأسئلة مرتبة تحت بعضها، سؤال واحد في كل صف."><div className="space-y-4">{mcq.map((q, idx) => <QuestionCard key={q.id} exam={normalizedExam} q={q} index={idx} selected={answers[q.id]} onSelect={value => setAnswers(prev => ({ ...prev, [q.id]: value }))} />)}</div></SectionBlock> : null}{openQ.length ? <SectionBlock title="الأسئلة المقالية" subtitle="سؤال واحد تحت الآخر لعرض أوضح على الهاتف والكمبيوتر."><div className="space-y-4">{openQ.map((q, idx) => <OpenQuestionCard key={q.id} exam={normalizedExam} q={q} index={idx} value={openAnswers[q.id]} onChange={value => setOpenAnswers(prev => ({ ...prev, [q.id]: value }))} />)}</div></SectionBlock> : null}</div> : null}</div>;
}

function AdminModal({ data, onRefresh, onClose, toast }){
  const [password, setPassword] = useState("");
  const [ok, setOk] = useState(false);
  const [tab, setTab] = useState("upload");
  const [busy, setBusy] = useState(false);
  const [subjectCode, setSubjectCode] = useState("chemistry");
  const [semester, setSemester] = useState(1);
  const [unitTitleAr, setUnitTitleAr] = useState("");
  const [subunitTitleAr, setSubunitTitleAr] = useState("");
  const [title, setTitle] = useState("");
  const [duration, setDuration] = useState(1800);
  const [jsonText, setJsonText] = useState(JSON.stringify(SAMPLE_EXAM, null, 2));
  const [search, setSearch] = useState("");
  const units = getUnits(subjectCode, semester);
  const subunits = getSubunits(subjectCode, semester, unitTitleAr);
  useEffect(() => { if(!unitTitleAr && units.length) setUnitTitleAr(units[0].titleAr); }, [subjectCode, semester]);
  useEffect(() => { if(unitTitleAr && !subunits.includes(subunitTitleAr)) setSubunitTitleAr(subunits[0] || ""); }, [unitTitleAr, subjectCode, semester]);
  const filteredResults = (data.allResults || []).filter(r => !search || normalizeText(r.userName).includes(normalizeText(search)) || normalizeText(r.subject).includes(normalizeText(search)));
  const filteredExams = (data.exams || []).filter(e => !search || normalizeText(e.title || e.subjectAr || "").includes(normalizeText(search)));

  function enrichExam(examInput){
    const exam = normalizeExamPayload(examInput);
    const subj = getSubjectByCode(subjectCode);
    const finalTitle = title.trim() || exam.title || `${subj?.nameAr || exam.subjectAr || ""}${unitTitleAr ? " - " + unitTitleAr : ""}${subunitTitleAr ? " - " + subunitTitleAr : ""}`;
    exam.title = finalTitle;
    exam.subject = subj?.nameAr || exam.subjectAr || exam.subject || "";
    exam.subjectCode = subjectCode;
    exam.subjectAr = subj?.nameAr || exam.subjectAr || exam.subject || "";
    exam.semester = Number(semester);
    exam.unitTitleAr = unitTitleAr || exam.unitTitleAr || "";
    exam.subunitTitleAr = subunitTitleAr || exam.subunitTitleAr || "";
    exam.examMode = subj?.examMode || exam.examMode || "OMR_MCQ";
    exam.duration = Number(duration || exam.duration || 1800);
    exam.settings = { defaultQuestionView: exam.settings?.defaultQuestionView || "single", allowSwitchView: exam.settings?.allowSwitchView !== false, showOneQuestionPerRow: true };
    exam.questions = (exam.questions || []).map((q, idx) => normalizeQuestion({ ...q, subjectCode, subjectAr: subj?.nameAr || "", semester:Number(semester), unitTitleAr:q.unitTitleAr || unitTitleAr || "", subunitTitleAr:q.subunitTitleAr || subunitTitleAr || "" }, idx, exam));
    exam.openQuestions = (exam.openQuestions || []).map((q, idx) => normalizeOpenQuestion({ ...q, subjectCode, subjectAr: subj?.nameAr || "", semester:Number(semester), unitTitleAr:q.unitTitleAr || unitTitleAr || "", subunitTitleAr:q.subunitTitleAr || subunitTitleAr || "" }, idx, exam));
    return exam;
  }

  async function uploadExam(){
    try { setBusy(true); const exam = enrichExam(JSON.parse(jsonText)); await api("uploadExam", { adminPassword: CONFIG.ADMIN_PASSWORD, exam }); toast("تم رفع الامتحان وفهرسته في بنك الأسئلة"); onRefresh(); } catch(e){ toast("فشل الرفع: " + e.message, "error"); } finally { setBusy(false); }
  }
  async function deleteExam(examId){
    try { setBusy(true); await api("deleteExam", { adminPassword: CONFIG.ADMIN_PASSWORD, examId }); toast("تم حذف الامتحان"); onRefresh(); } catch(e){ toast("فشل الحذف: " + e.message, "error"); } finally { setBusy(false); }
  }
  function handleImportFile(file){ if(!file) return; const reader = new FileReader(); reader.onload = () => setJsonText(String(reader.result || "")); reader.readAsText(file, "utf-8"); }

  return <Modal title="لوحة إدارة دراستي" subtitle="متجاوبة بالكامل على الهاتف والكمبيوتر، مع دعم الوسائط داخل JSON." onClose={onClose}>{!ok ? <div className="max-w-lg"><Input label="كلمة مرور الإدارة" type="password" value={password} onChange={e => setPassword(e.target.value)} /><div className="mt-4 flex gap-3"><Button variant="brand" onClick={() => password === CONFIG.ADMIN_PASSWORD ? setOk(true) : alert("كلمة المرور غير صحيحة")}>دخول</Button><Button variant="outline" onClick={onClose}>إلغاء</Button></div></div> : <div className="space-y-6"><div className="overflow-x-auto no-scrollbar"><div className="flex min-w-max gap-2">{[["upload","رفع امتحان"],["syllabus","السلسلة الدراسية"],["bank","بنك الامتحانات"],["results","نتائج الطلاب"],["qbank","ملخص بنك الأسئلة"],["prompt","Prompt التحويل"]].map(([id,label]) => <button key={id} onClick={() => setTab(id)} className={cls("px-4 py-3 rounded-2xl font-bold whitespace-nowrap", tab===id ? "bg-slate-900 text-white dark:bg-white dark:text-slate-900" : "bg-slate-100 dark:bg-slate-800")}>{label}</button>)}</div></div>{tab === "upload" ? <div className="grid xl:grid-cols-[1.05fr,1fr] gap-6"><Card className="p-5 space-y-4"><div className="grid md:grid-cols-2 gap-4"><Select label="المادة" value={subjectCode} onChange={e => { setSubjectCode(e.target.value); setUnitTitleAr(""); setSubunitTitleAr(""); }}>{CURRICULUM.subjects.map(s => <option key={s.code} value={s.code}>{s.nameAr}</option>)}</Select><Select label="الفصل" value={semester} onChange={e => { setSemester(Number(e.target.value)); setUnitTitleAr(""); setSubunitTitleAr(""); }}><option value="1">الفصل الأول</option><option value="2">الفصل الثاني</option></Select><Select label="الوحدة" value={unitTitleAr} onChange={e => setUnitTitleAr(e.target.value)}><option value="">بدون وحدة</option>{units.map((u,i) => <option key={i} value={u.titleAr}>{u.titleAr}</option>)}</Select><Select label="الموضوع الفرعي" value={subunitTitleAr} onChange={e => setSubunitTitleAr(e.target.value)}><option value="">بدون موضوع فرعي</option>{subunits.map((s,i) => <option key={i} value={s}>{s}</option>)}</Select></div><Input label="عنوان الامتحان" placeholder="يُنشأ تلقائيًا إن تركته فارغًا" value={title} onChange={e => setTitle(e.target.value)} /><Input label="المدة بالثواني" type="number" value={duration} onChange={e => setDuration(e.target.value)} /><TextArea label="JSON الامتحان" rows={22} value={jsonText} onChange={e => setJsonText(e.target.value)} hint="ضع الوسائط في sharedMedia.dataUrl بصيغة base64 data URL، وستظهر مباشرة داخل الامتحان." /><div className="flex flex-wrap gap-3"><Button variant="brand" onClick={uploadExam} disabled={busy}>{busy ? "جارٍ الرفع..." : "رفع الامتحان"}</Button><label className="px-4 py-3 rounded-2xl font-bold border border-slate-300 dark:border-slate-700 cursor-pointer">استيراد JSON<input type="file" accept=".json,application/json" className="hidden" onChange={e => handleImportFile(e.target.files?.[0])} /></label></div></Card><div className="space-y-6"><Card className="p-5"><h3 className="text-xl font-black text-slate-900 dark:text-white">كيف يعمل دعم الصور والرسوم الآن؟</h3><div className="mt-4 space-y-3 text-sm leading-7 text-slate-600 dark:text-slate-300"><p>1) ضع كل صورة أو رسم في sharedMedia داخل JSON كـ dataUrl.</p><p>2) اربط السؤال بها عبر mediaRefs.</p><p>3) عند الرفع، يحتفظ النظام بالوسائط داخل ملف الامتحان نفسه.</p><p>4) عند العرض، تظهر الصورة أو الرسم داخل السؤال نفسه في الهاتف والكمبيوتر.</p><p>5) لا يوجد تحويل سحري من PDF داخل المتصفح؛ التحويل يجب أن يحدث قبل الرفع عبر الـ prompt أو أداة خارجية.</p></div></Card><Card className="p-5"><h3 className="text-xl font-black text-slate-900 dark:text-white">معاينة وسائط المثال</h3><div className="mt-4 space-y-4"><MediaRenderer media={{ title:"رسم بياني مثالي", dataUrl: CHART_DATA_URL }} /><MediaRenderer media={{ title:"صورة مخبرية مثالية", dataUrl: FIGURE_DATA_URL }} /></div></Card></div></div> : null}{tab === "syllabus" ? <Card className="p-5"><div className="flex items-start justify-between gap-4 flex-wrap"><div><h3 className="text-xl font-black text-slate-900 dark:text-white">السلسلة الدراسية المعتمدة</h3><p className="mt-2 text-sm leading-7 text-slate-500 dark:text-slate-400">تمت إضافة السلسلة الدراسية داخل النظام لتسهيل اختيار المادة والفصل والوحدة والدرس عند رفع الامتحانات أو إنشاء تدريب علاجي. مادة الإنجليزي المتقدم مضافة بالتأكيد الجزئي فقط حتى لا يتم إدخال وحدات غير مثبتة.</p></div><div className="rounded-2xl bg-brand-50 dark:bg-brand-950/30 px-4 py-3 text-sm font-bold text-brand-700 dark:text-brand-300">{CURRICULUM.gradeAr}</div></div><div className="mt-5 space-y-4">{CURRICULUM.subjects.map((subject, sIdx) => <div key={sIdx} className="rounded-3xl border border-slate-200 dark:border-slate-800 p-4"><div className="flex items-start justify-between gap-3 flex-wrap"><div><div className="text-lg font-black text-slate-900 dark:text-white">{subject.nameAr}</div>{subject.notesAr ? <div className="mt-2 text-sm text-amber-600 dark:text-amber-300">{subject.notesAr}</div> : null}</div><div className="rounded-2xl bg-slate-100 dark:bg-slate-800 px-3 py-2 text-xs font-bold">{subject.examMode}</div></div><div className="mt-4 grid lg:grid-cols-2 gap-4">{(subject.semesters || []).map((sem, semIdx) => <div key={semIdx} className="rounded-2xl bg-slate-50 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800 p-4"><div className="font-black text-slate-900 dark:text-white">{sem.titleAr}</div><div className="mt-3 space-y-3">{(sem.units || []).map((unit, unitIdx) => <div key={unitIdx} className="rounded-2xl bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 p-3"><div className="font-bold text-slate-900 dark:text-white">{unit.titleAr}</div>{(unit.subunits || []).length ? <div className="mt-2 space-y-2">{unit.subunits.map((sub, subIdx) => <div key={subIdx} className="text-sm text-slate-600 dark:text-slate-300">• {sub}</div>)}</div> : <div className="mt-2 text-sm text-slate-400 dark:text-slate-500">لا توجد دروس فرعية مفصلة هنا.</div>}</div>)}</div></div>)}</div></div>)}</div></Card> : null}{tab === "bank" ? <div className="space-y-4"><Input placeholder="بحث..." value={search} onChange={e => setSearch(e.target.value)} /><div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">{filteredExams.length ? filteredExams.map(exam => <Card key={exam.id} className="p-5"><div className="font-black text-slate-900 dark:text-white">{exam.title || exam.subjectAr || exam.subject}</div><div className="mt-2 text-sm text-slate-500 dark:text-slate-400">{exam.subjectAr || exam.subject} • {exam.unitTitleAr || "بدون وحدة"}</div><div className="mt-4 text-sm text-slate-600 dark:text-slate-300">عدد الأسئلة: {(exam.questions || []).length + (exam.openQuestions || []).length}</div><Button variant="danger" className="w-full mt-4" onClick={() => deleteExam(exam.id)} disabled={busy}>حذف الامتحان</Button></Card>) : <div className="text-slate-500 dark:text-slate-400">لا توجد امتحانات.</div>}</div></div> : null}{tab === "results" ? <div className="space-y-4"><Input placeholder="ابحث بالطالب أو المادة..." value={search} onChange={e => setSearch(e.target.value)} /><div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">{filteredResults.length ? filteredResults.map((r,i) => <Card key={i} className="p-4"><div className="flex items-start justify-between gap-3"><div><div className="font-black text-slate-900 dark:text-white">{r.userName}</div><div className="mt-1 text-sm text-slate-500 dark:text-slate-400">{r.subject}</div></div><div className="text-2xl font-black text-brand-600 dark:text-brand-300">{r.score}%</div></div><div className="mt-2 text-xs text-slate-500 dark:text-slate-400">{formatDate(r.createdAt)}</div></Card>) : <div className="text-slate-500 dark:text-slate-400">لا توجد نتائج.</div>}</div></div> : null}{tab === "qbank" ? <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-4"><Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">إجمالي الأسئلة</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.totalQuestions || 0}</div></Card><Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">الكيمياء</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.bySubject?.chemistry || 0}</div></Card><Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">الأحياء</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.bySubject?.life_sciences || 0}</div></Card><Card className="p-5"><div className="text-sm text-slate-500 dark:text-slate-400">الإنجليزي</div><div className="text-3xl font-black mt-2">{data.questionBankSummary?.bySubject?.english_advanced || 0}</div></Card></div> : null}{tab === "prompt" ? <Card className="p-5"><TextArea label="Prompt تحويل PDF/Images إلى JSON" rows={28} value={JSON_PROMPT_TEMPLATE} readOnly /></Card> : null}</div>}</Modal>;
}

function App(){
  const [user, setUser] = useState(loadLocal(CONFIG.STORAGE_KEYS.user, null));
  const [darkMode, setDarkMode] = useState(loadLocal(CONFIG.STORAGE_KEYS.darkMode, false));
  const [loading, setLoading] = useState(false);
  const [data, setData] = useState({ exams:[], results:[], allResults:[], analytics:{}, questionBankSummary:{} });
  const [selectedExam, setSelectedExam] = useState(null);
  const [adminOpen, setAdminOpen] = useState(false);
  const [redoLoading, setRedoLoading] = useState(false);
  const [redoFilters, setRedoFilters] = useState({ subjectCode:"", semester:1, unitTitleAr:"", subunitTitleAr:"", limit:10 });
  const toast = useToast();
  useEffect(() => { document.documentElement.classList.toggle("dark", !!darkMode); }, [darkMode]);

  async function refresh(){
    if(!user) return;
    try {
      setLoading(true);
      const [examsRes, resultsRes, allRes, analyticsRes, bankRes] = await Promise.all([
        api("listExams"),
        api("getUserResults", { userId:user.id }),
        api("listAllResults", { adminPassword: CONFIG.ADMIN_PASSWORD }),
        api("getUserAnalytics", { userId:user.id }),
        api("getQuestionBankSummary")
      ]);
      setData({ exams:(examsRes.exams || []).map(normalizeExamPayload), results:resultsRes.results || [], allResults:allRes.results || [], analytics:analyticsRes.analytics || {}, questionBankSummary:bankRes.summary || {} });
    } catch(e){ toast.show("خطأ في التحميل: " + e.message, "error"); } finally { setLoading(false); }
  }

  useEffect(() => { if(user) refresh(); }, [user]);
  async function startExam(id){ try { setLoading(true); const res = await api("getExam", { examId:id }); setSelectedExam(normalizeExamPayload(res.exam)); } catch(e){ toast.show("تعذر تحميل الامتحان: " + e.message, "error"); } finally { setLoading(false); } }
  async function finishExam(payload){ try { await api("submitResult", payload); toast.show("تم حفظ النتيجة وتحديث الإتقان"); await refresh(); } catch(e){ toast.show("فشل حفظ النتيجة: " + e.message, "error"); } }
  async function generateRedo(){ try { setRedoLoading(true); const res = await api("generateRedoExam", { userId:user.id, ...redoFilters, limit:10 }); setSelectedExam(normalizeExamPayload(res.exam)); toast.show("تم إنشاء تدريب علاجي جديد"); } catch(e){ toast.show("تعذر إنشاء تدريب علاجي: " + e.message, "error"); } finally { setRedoLoading(false); } }
  function logout(){ localStorage.removeItem(CONFIG.STORAGE_KEYS.user); setUser(null); setSelectedExam(null); }
  if(!user) return <LoginScreen onLogin={setUser} />;

  return <div className="min-h-screen text-slate-900 dark:text-slate-100"><TopBar user={user} darkMode={darkMode} onToggleDark={() => { const next=!darkMode; setDarkMode(next); saveLocal(CONFIG.STORAGE_KEYS.darkMode, next); }} onLogout={logout} onOpenAdmin={() => setAdminOpen(true)} onGoHome={() => setSelectedExam(null)} /><main className="max-w-7xl mx-auto p-4 md:p-6 space-y-6">{loading ? <Card className="p-6">جارٍ التحميل...</Card> : selectedExam ? <ExamScreen exam={selectedExam} user={user} onFinish={finishExam} onExit={() => setSelectedExam(null)} /> : <Dashboard data={data} onStartExam={startExam} onGenerateRedo={generateRedo} redoLoading={redoLoading} redoFilters={redoFilters} setRedoFilters={setRedoFilters} />}</main>{adminOpen ? <AdminModal data={data} onRefresh={refresh} onClose={() => setAdminOpen(false)} toast={toast.show} /> : null}<Toast toast={toast.toast} onClose={toast.clear} /></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
