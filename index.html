<script>
const CONFIG = {
  APP_NAME: 'امتحاني',
  APP_SUBTITLE: 'بوابتك الذكية للتدريب والإتقان',
  API_BASE: 'https://script.google.com/macros/s/AKfycbxbRTV0pYSXJDRQe2oTBzhVaNYkW9P-ILbB2FruLQp1Tgf7eJOM7OByJa6ioH7NK9Zalw/exec', 
  ADMIN_PASSWORD: 'admin',
  STORAGE_KEYS: { user: 'emtehani_user_v1', darkMode: 'emtehani_dark_v1' }
};

const CURRICULUM = {

  comprehensiveLabel: 'بنك شامل لكل المادة',

      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['حالات المادة','المحاليل','الاتزان الكيميائي','الحموض والقواعد وتطبيقاتها'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['الكيمياء الحركيه','الكيمياء الكهربائيه','الكيمياء العضويه'] }
      ]
    },
    {
      code: 'life_sciences', nameAr: 'الأحياء', examMode: 'OMR_MCQ',
      weights: { '1|كيمياء الحياة': 16.9, '1|دوره الخليه وتصنيع البروتينات': 12.8, '1|الوراثة': 14.9, '1|التكنولوجيا الحيوية': 8.2, '2|التنظيم والاتزان': 11.8, '2|الدعامه والحركه': 6.1, '2|الهضم والنقل وتبادل الغازات': 10.7, '2|الاخراج والتكاثر': 11.3, '2|المناعه والمضادات الحيويه': 6.9 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['كيمياء الحياة','دوره الخليه وتصنيع البروتينات','الوراثة','التكنولوجيا الحيوية'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['التنظيم والاتزان','الدعامه والحركه','الهضم والنقل وتبادل الغازات','الاخراج والتكاثر','المناعه والمضادات الحيويه'] }

    },
    {

      weights: { '1|علاقه الانسان بربه': 16.66, '1|علاقه الانسان بنفسه': 16.66, '1|علاقه الانسان بمن حوله': 16.66, '2|علاقه الانسان بربه': 16.66, '2|علاقه الانسان بنفسه': 16.66, '2|علاقه الانسان بمن حوله': 16.66 },
      semesters: [
        { semester: 1, titleAr: 'الفصل الأول', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] },
        { semester: 2, titleAr: 'الفصل الثاني', units: ['علاقه الانسان بربه','علاقه الانسان بنفسه','علاقه الانسان بمن حوله'] }
      ]
    },
    {
      code: 'english', nameAr: 'Advance English', examMode: 'HYBRID',
      weights: { '1|Unit 1': 10, '1|Unit 2': 10, '1|Unit 3': 10, '1|Unit 4': 10, '1|Unit 5': 10, '2|Unit 6': 10, '2|Unit 7': 10, '2|Unit 8': 10, '2|Unit 9': 10, '2|Unit 10': 10 },
      semesters: [
        { semester: 1, titleAr: 'Semester 1', units: ['Unit 1','Unit 2','Unit 3','Unit 4','Unit 5'] },
        { semester: 2, titleAr: 'Semester 2', units: ['Unit 6','Unit 7','Unit 8','Unit 9','Unit 10'] }
      ]
    }
  ]
};

const THEMES = [
  { border: 'border-blue-500', bgOuter: 'bg-blue-50 dark:bg-blue-900/10', bgInner: 'bg-white dark:bg-slate-900', textMain: 'text-blue-600 dark:text-blue-400', badge: 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300', ring: 'ring-blue-500/20' },
  { border: 'border-purple-500', bgOuter: 'bg-purple-50 dark:bg-purple-900/10', bgInner: 'bg-white dark:bg-slate-900', textMain: 'text-purple-600 dark:text-purple-400', badge: 'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300', ring: 'ring-purple-500/20' },
  { border: 'border-emerald-500', bgOuter: 'bg-emerald-50 dark:bg-emerald-900/10', bgInner: 'bg-white dark:bg-slate-900', textMain: 'text-emerald-600 dark:text-emerald-400', badge: 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300', ring: 'ring-emerald-500/20' },
  { border: 'border-amber-500', bgOuter: 'bg-amber-50 dark:bg-amber-900/10', bgInner: 'bg-white dark:bg-slate-900', textMain: 'text-amber-600 dark:text-amber-400', badge: 'bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-300', ring: 'ring-amber-500/20' },
  { border: 'border-rose-500', bgOuter: 'bg-rose-50 dark:bg-rose-900/10', bgInner: 'bg-white dark:bg-slate-900', textMain: 'text-rose-600 dark:text-rose-400', badge: 'bg-rose-100 text-rose-800 dark:bg-rose-900/30 dark:text-rose-300', ring: 'ring-rose-500/20' },
  { border: 'border-cyan-500', bgOuter: 'bg-cyan-50 dark:bg-cyan-900/10', bgInner: 'bg-white dark:bg-slate-900', textMain: 'text-cyan-600 dark:text-cyan-400', badge: 'bg-cyan-100 text-cyan-800 dark:bg-cyan-900/30 dark:text-cyan-300', ring: 'ring-cyan-500/20' }
];

function getTheme(index) { return THEMES[index % THEMES.length]; }

const state = {
  user: loadLocal(CONFIG.STORAGE_KEYS.user, null),
  darkMode: loadLocal(CONFIG.STORAGE_KEYS.darkMode, false),
  loading: false, toast: null,
  data: { exams: [], results: [], analytics: { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] }, questionBankSummary: { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] } },
  subjectCode: null, subjectTab: 'units', unitKey: null,
  prestartExam: null, examSession: null, reviewAttempt: null, timerId: null,
  admin: { open: false, authenticated: false, tab: 'upload', allResults: [], selectedUserId: null, selectedSubjectCode: null, form: { subjectCode: '', unitKey: '', editingExamId: null, pdfDataUrl: null, pdfFileName: '' } },
  builder: { totalQuestions: 100, mode: 'weighted', selectedUnitKeys: [], explicitCounts: {}, selectedExamIds: [] }
};

window.__PDF_SOURCES = {};
window.__PDF_DOCS = {};

function loadLocal(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (err) { return fallback; } }
function saveLocal(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

function setDarkMode(value) { state.darkMode = !!value; document.documentElement.classList.toggle('dark', state.darkMode); saveLocal(CONFIG.STORAGE_KEYS.darkMode, state.darkMode); }
setDarkMode(state.darkMode);

function escapeHtml(value) { return String(value == null ? '' : value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function initials(name) { return String(name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join('').toUpperCase() || 'ط'; }
function formatDate(value) { if (!value) return '-'; try { const d = new Date(value); return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; } catch (err) { return String(value); } }
function percent(correct, total) { if (!total) return 0; return Math.round((Number(correct || 0) / Number(total || 1)) * 100); }

function getSubject(code) { return CURRICULUM.subjects.find(subject => subject.code === code) || null; }
function getSubjectSummary(code) { return (state.data.questionBankSummary.subjects || []).find(subject => subject.subjectCode === code) || { totalQuestions: 0, totalExams: 0, units: [] }; }
function makeUnitKey(subjectCode, semester, unitTitleAr) { return [subjectCode, Number(semester || 0), unitTitleAr || ''].join('||'); }
function parseUnitKey(unitKey) { const parts = String(unitKey || '').split('||'); return { subjectCode: parts[0] || '', semester: Number(parts[1] || 0), unitTitleAr: parts.slice(2).join('||') || '' }; }

function buildSubjectUnits(subjectCode) {
  const subject = getSubject(subjectCode); if (!subject) return []; const units = [];
  subject.semesters.forEach(semester => { semester.units.forEach(unitTitleAr => { units.push({ key: makeUnitKey(subjectCode, semester.semester, unitTitleAr), subjectCode, semester: semester.semester, semesterTitleAr: semester.titleAr, unitTitleAr, weight: Number(subject.weights[`${semester.semester}|${unitTitleAr}`] || 0) }); }); });
  units.push({ key: makeUnitKey(subjectCode, 0, CURRICULUM.comprehensiveLabel), subjectCode, semester: 0, semesterTitleAr: 'الفصلان معًا', unitTitleAr: CURRICULUM.comprehensiveLabel, weight: 0, comprehensive: true });
  return units;
}

function getExamsForSubject(subjectCode) { return (state.data.exams || []).filter(exam => exam.subjectCode === subjectCode); }
function getExamsForUnit(subjectCode, unitKey) { const info = parseUnitKey(unitKey); return getExamsForSubject(subjectCode).filter(exam => { return Number(exam.semester || 0) === Number(info.semester || 0) && String(exam.unitTitleAr || '').trim() === String(info.unitTitleAr || '').trim(); }); }
function getQuestionCountForUnit(unitKey) { return Number((state.data.questionBankSummary.byUnitKey || {})[unitKey] || 0); }
function getAttemptsForSubject(subjectCode) { return (state.data.results || []).filter(result => result.subjectCode === subjectCode); }
function getUnitAnalytics(subjectCode) { return (state.data.analytics.unitMastery || []).filter(item => item.subjectCode === subjectCode); }
function getSubjectAnalytics(subjectCode) { return (state.data.analytics.subjectMastery || []).find(item => item.subjectCode === subjectCode) || null; }
function hasApiBase() { return String(CONFIG.API_BASE || '').startsWith('https://script.google.com/macros/s/'); }

async function api(action, payload) {
  if (!hasApiBase()) throw new Error('ضع رابط Google Apps Script أولًا داخل CONFIG.API_BASE');
  const response = await fetch(CONFIG.API_BASE, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(Object.assign({ action }, payload || {})) });
  if (!response.ok) throw new Error('فشل الاتصال بالخادم');
  const data = await response.json();
  if (!data.ok) throw new Error(data.error || 'API Error');
  return data;
}

function showToast(message, type) {
  state.toast = { message, type: type || 'success' }; render();
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { state.toast = null; render(); }, 3200);
}

function setLoading(value) { state.loading = !!value; render(); }

async function refreshData() {
  if (!state.user) return;
  try {
    setLoading(true);
    const [examsRes, resultsRes, analyticsRes, bankRes] = await Promise.all([
      api('getCatalog'), api('getUserResults', { userId: state.user.id }),
      api('getUserAnalytics', { userId: state.user.id }), api('getQuestionBankSummary')
    ]);
    state.data.exams = examsRes.exams || [];
    state.data.results = resultsRes.results || [];
    state.data.analytics = analyticsRes.analytics || { overallMastery: 0, subjectMastery: [], unitMastery: [], weaknessRows: [] };
    state.data.questionBankSummary = bankRes.summary || { totalQuestions: 0, bySubject: {}, byUnitKey: {}, subjects: [] };
    render();
  } catch (err) { showToast('خطأ في التحميل: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

function resetBuilderForSubject(subjectCode) {
  const units = buildSubjectUnits(subjectCode).filter(unit => !unit.comprehensive);
  state.builder.selectedUnitKeys = units.slice(0, Math.min(4, units.length)).map(unit => unit.key);
  state.builder.selectedExamIds = []; 
  state.builder.selectedUnitKeys.forEach(uk => { getExamsForUnit(subjectCode, uk).forEach(e => { if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); }); });
  state.builder.explicitCounts = {}; state.builder.mode = 'weighted'; state.builder.totalQuestions = 100;
}

function openSubject(subjectCode) { state.subjectCode = subjectCode; state.subjectTab = 'units'; state.unitKey = null; resetBuilderForSubject(subjectCode); render(); }
function backToHome() { state.subjectCode = null; state.subjectTab = 'units'; state.unitKey = null; state.reviewAttempt = null; state.examSession = null; clearExamTimer(); render(); }
function openAdmin() { state.admin.open = true; render(); }
function closeAdmin() { state.admin.open = false; render(); }

async function adminLogin(password) {
  if (password !== CONFIG.ADMIN_PASSWORD) { showToast('كلمة مرور الإدارة غير صحيحة', 'error'); return; }
  state.admin.authenticated = true;
  try {
    setLoading(true);
    const res = await api('listAllResults', { adminPassword: CONFIG.ADMIN_PASSWORD });
    state.admin.allResults = res.results || [];
    if (!state.admin.form.subjectCode && CURRICULUM.subjects.length > 0) state.admin.form.subjectCode = CURRICULUM.subjects[0].code;
  } catch (err) { showToast('تعذر تحميل نتائج الإدارة: ' + err.message, 'error'); }
  finally { setLoading(false); render(); }
}

          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <h1 class="text-4xl font-black text-slate-900 dark:text-white">${escapeHtml(CONFIG.APP_NAME)}</h1>

        <div class="mt-8 space-y-4 text-right">

            <input id="login-name" class="w-full rounded-2xl bg-slate-50 dark:bg-slate-950 border-none ring-1 ring-slate-200 dark:ring-slate-800 focus:ring-2 focus:ring-brand-500 px-5 py-4 text-base font-semibold outline-none transition-shadow text-slate-900 dark:text-white" placeholder="مثال: أحمد محمد علي" />

      <button data-action="go-home" class="flex flex-col items-center gap-1.5 transition-colors group ${!state.subjectCode && !isExam ? 'text-brand-600 dark:text-brand-400' : 'text-slate-400 hover:text-slate-900 dark:hover:text-white'}">

function buildSubjectCards() {
  return CURRICULUM.subjects.map(subject => {
    const summary = getSubjectSummary(subject.code);
    const analytics = getSubjectAnalytics(subject.code);

function computeBuilderPreview(subjectCode) {
  const selectedUnits = buildSubjectUnits(subjectCode).filter(unit => state.builder.selectedUnitKeys.includes(unit.key) && !unit.comprehensive);
  const preview = [];
  if (!selectedUnits.length) return preview;
  if (state.builder.mode === 'manual') {
    selectedUnits.forEach(unit => { preview.push({ key: unit.key, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Number(state.builder.explicitCounts[unit.key] || 0) }); });
    return preview;
  }
  const weights = selectedUnits.map(unit => Number(getSubject(subjectCode).weights[`${unit.semester}|${unit.unitTitleAr}`] || 1));
  const totalWeight = weights.reduce((sum, value) => sum + value, 0) || selectedUnits.length;
  selectedUnits.forEach((unit, index) => {
    const normalizedWeight = ((weights[index] / totalWeight) * 100);
    preview.push({ key: unit.key, unitTitleAr: unit.unitTitleAr, available: getQuestionCountForUnit(unit.key), requested: Math.round((normalizedWeight / 100) * Number(state.builder.totalQuestions || 0)) });
  });
  return preview;
}

function hydrateAfterRender() {
  setDarkMode(state.darkMode);
  if (window.renderMathInElement) {
    document.querySelectorAll('[data-math]').forEach(node => { try { window.renderMathInElement(node, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }], throwOnError: false }); } catch (err) {} });
  }
  renderPdfCanvases();
}

async function renderPdfCanvases() {
  if (!window.pdfjsLib) return;
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const canvases = Array.from(document.querySelectorAll('.pdf-canvas:not([data-rendered="true"])'));
  for (const canvas of canvases) {
    canvas.setAttribute('data-rendered', 'true');
    const pdfKey = canvas.getAttribute('data-pdf-key');
    const pageNumber = Number(canvas.getAttribute('data-page') || 1);
    const base64 = window.__PDF_SOURCES[pdfKey];
    if (!base64) continue;
    try {
      if (!window.__PDF_DOCS[pdfKey]) {
        const binary = atob(base64); const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        window.__PDF_DOCS[pdfKey] = await window.pdfjsLib.getDocument({ data: bytes }).promise;
      }
      const pdf = window.__PDF_DOCS[pdfKey]; const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1.5 }); const ctx = canvas.getContext('2d');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
    } catch (err) {}
  }
}

function clearExamTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }

function updateProgressUI() {
  if (!state.examSession) return;
  const answeredCount = Object.keys(state.examSession.answers).length;
  const totalItems = (state.examSession.exam.questions || []).length;
  const pct = percent(answeredCount, totalItems || 1);
  const pText = document.getElementById('exam-progress-text'); if (pText) pText.innerText = `${pct}%`;
  const pBar = document.getElementById('exam-progress-bar'); if (pBar) pBar.style.width = `${pct}%`;
}

function startExamTimer() {
  clearExamTimer();
  if (!state.examSession) return;
  state.examSession.timeSpent = 0;
  
  state.timerId = setInterval(() => {
    if (!state.examSession) { clearExamTimer(); return; }
    state.examSession.timeSpent += 1;
    const clockEl = document.getElementById('exam-timer-display');
    if (clockEl) {
      const minutes = String(Math.floor(state.examSession.timeSpent / 60)).padStart(2, '0');
      const seconds = String(state.examSession.timeSpent % 60).padStart(2, '0');
      clockEl.innerText = `${minutes}:${seconds}`;
    }
  }, 1000);
}

async function submitExam() {
  if (!state.examSession) return;
  const session = state.examSession; const exam = session.exam;
  const wrongItems = []; let correctCount = 0; let totalQuestions = 0;
  
  (exam.questions || []).forEach(question => {
    if (!Number.isInteger(question.correctIndex)) return;
    totalQuestions += 1;
    const userAnswer = session.answers[question.id];
    const isCorrect = Number(userAnswer) === Number(question.correctIndex);
    if (isCorrect) correctCount += 1;
    if (!isCorrect) {
      const snapshot = JSON.parse(JSON.stringify(question));
      if (snapshot.sourcePdfBase64) delete snapshot.sourcePdfBase64;
      wrongItems.push({ questionKey: question.questionKey || `${exam.id}::${question.id}`, questionId: question.id, sourceExamId: question.sourceExamId || exam.id, subjectCode: question.subjectCode || exam.subjectCode || '', subjectAr: question.subjectAr || exam.subjectAr || '', semester: question.semester != null ? question.semester : exam.semester, unitTitleAr: question.unitTitleAr || exam.unitTitleAr || '', subunitTitleAr: question.subunitTitleAr || exam.subunitTitleAr || '', questionSnapshot: snapshot });
    }
  });

  const score = percent(correctCount, totalQuestions || 1);
  try {
    setLoading(true);
    const res = await api('submitResult', { userId: state.user.id, userName: state.user.name, examId: exam.id, examTitle: exam.title || '', subjectCode: exam.subjectCode || '', subjectAr: exam.subjectAr || '', semester: exam.semester != null ? exam.semester : 0, unitTitleAr: exam.unitTitleAr || '', subunitTitleAr: exam.subunitTitleAr || '', score, totalQuestions, correctCount, answers: session.answers, openAnswers: session.openAnswers, wrongItems, examSnapshot: stripBase64Exam(exam) });
    clearExamTimer(); state.examSession = null;
    await refreshData(); await openAttemptReview(res.attemptId);
    showToast('تم حفظ النتيجة'); window.scrollTo(0,0);
  } catch (err) { showToast('فشل حفظ النتيجة: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function openAttemptReview(attemptId) {
  try { setLoading(true); const res = await api('getAttemptReview', { attemptId }); state.reviewAttempt = res.attempt; state.examSession = null; clearExamTimer(); window.scrollTo(0,0); } 
  catch (err) { showToast('تعذر فتح المراجعة: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function generateRedo(payload) {
  try { setLoading(true); let res; if (payload.attemptId) { res = await api('buildWrongRedo', { userId: state.user.id, resultId: payload.attemptId }); } else { res = await api('generateRedoExam', Object.assign({ userId: state.user.id, limit: 50 }, payload)); } prepareExamForStart(res.exam); } 
  catch (err) { showToast('تعذر إنشاء إعادة الأخطاء: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

async function generateCustomExam() {
  try {
    const selectedUnits = state.builder.selectedUnitKeys;
    if (!selectedUnits.length) { showToast('اختر وحدة واحدة على الأقل.', 'error'); return; }
    if (state.builder.mode === 'manual') { let hasCounts = false; selectedUnits.forEach(key => { if (Number(state.builder.explicitCounts[key] || 0) > 0) hasCounts = true; }); if (!hasCounts) { showToast('حدد عدد الأسئلة', 'error'); return; } }
    setLoading(true);
    const payload = { subjectCode: state.subjectCode, totalQuestions: Number(state.builder.totalQuestions || 100), duration: 0, mode: state.builder.mode, selectedUnits: selectedUnits, selectedExamIds: state.builder.selectedExamIds.slice(), explicitUnitCounts: state.builder.explicitCounts, title: 'امتحان مخصص - ' + (getSubject(state.subjectCode) ? getSubject(state.subjectCode).nameAr : '') };
    const res = await api('buildCustomExam', payload); prepareExamForStart(res.exam);
  } catch (err) { showToast('تعذر تكوين الامتحان: ' + err.message, 'error'); } 
  finally { state.loading = false; render(); }
}

document.addEventListener('click', async event => {
  const target = event.target.closest('[data-action]'); if (!target) return;
  const action = target.getAttribute('data-action');
  try {
    if (action === 'login') {
      const input = document.getElementById('login-name'); const name = String(input ? input.value : '').trim();
      if (!name) { showToast('أدخل الاسم أولًا', 'error'); return; }
      state.user = { id: name.replace(/\s+/g, '_'), name }; saveLocal(CONFIG.STORAGE_KEYS.user, state.user); await refreshData(); return;
    }
    if (action === 'logout') { localStorage.removeItem(CONFIG.STORAGE_KEYS.user); state.user = null; state.examSession = null; state.reviewAttempt = null; state.subjectCode = null; clearExamTimer(); render(); return; }
    if (action === 'toggle-dark') { setDarkMode(!state.darkMode); return; }
    if (action === 'go-home') { backToHome(); return; }
    if (action === 'open-subject') { openSubject(target.getAttribute('data-subject-code')); return; }
    if (action === 'subject-tab') { state.subjectTab = target.getAttribute('data-tab'); render(); return; }
    if (action === 'select-unit') { state.unitKey = target.getAttribute('data-unit-key'); render(); return; }
    if (action === 'jump-builder-with-unit') { const unitKey = target.getAttribute('data-unit-key'); state.subjectTab = 'builder'; if (!state.builder.selectedUnitKeys.includes(unitKey)) { state.builder.selectedUnitKeys.push(unitKey); getExamsForUnit(state.subjectCode, unitKey).forEach(e => { if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); }); } render(); return; }
    if (action === 'prepare-exam') { setLoading(true); const exam = await loadExam(target.getAttribute('data-exam-id')); prepareExamForStart(exam); state.loading = false; render(); return; }
    if (action === 'close-prestart') { state.prestartExam = null; render(); return; }
    if (action === 'start-prepared-exam') { beginExam(state.prestartExam.exam); return; }
    if (action === 'select-answer') {
      if (!state.examSession) return;
      const qid = target.getAttribute('data-question-id'); const index = Number(target.getAttribute('data-index'));
      state.examSession.answers[qid] = index;
      const container = target.closest('.question-options-container');
      if (container) {
         const buttons = container.querySelectorAll('button[data-action="select-answer"]');
         buttons.forEach((btn, btnIdx) => {
            const isSelected = btnIdx === index;
            btn.className = `rounded-2xl border-2 p-4 text-right transition-all duration-200 active:scale-[0.98] ${isSelected ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/10 shadow-inner' : 'border-slate-200 dark:border-slate-700 hover:border-brand-300'}`;
            const letterEl = btn.querySelector('.rounded-full.border-2');
            if (letterEl) letterEl.className = `w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-black shrink-0 ${isSelected ? 'bg-brand-500 text-white border-brand-500' : 'border-slate-300 dark:border-slate-600'}`;
         });
      }
      updateProgressUI(); return;
    }
    if (action === 'submit-exam') { if (confirm('هل أنت متأكد من تسليم الإجابات؟')) await submitExam(); return; }
    if (action === 'review-attempt') { await openAttemptReview(target.getAttribute('data-attempt-id')); return; }
    if (action === 'close-review') { state.reviewAttempt = null; render(); return; }
    if (action === 'redo-attempt') { await generateRedo({ attemptId: target.getAttribute('data-attempt-id') }); return; }
    if (action === 'redo-by-subject') { await generateRedo({ subjectCode: target.getAttribute('data-subject-code') }); return; }
    if (action === 'toggle-builder-unit') {
      const unitKey = target.getAttribute('data-unit-key');
      if (target.checked) { if (!state.builder.selectedUnitKeys.includes(unitKey)) { state.builder.selectedUnitKeys.push(unitKey); getExamsForUnit(state.subjectCode, unitKey).forEach(e => { if(!state.builder.selectedExamIds.includes(e.id)) state.builder.selectedExamIds.push(e.id); }); } } else { state.builder.selectedUnitKeys = state.builder.selectedUnitKeys.filter(k => k !== unitKey); delete state.builder.explicitCounts[unitKey]; const unitExamIds = getExamsForUnit(state.subjectCode, unitKey).map(e => e.id); state.builder.selectedExamIds = state.builder.selectedExamIds.filter(id => !unitExamIds.includes(id)); } render(); return;
    }
    if (action === 'build-custom-exam') { await generateCustomExam(); return; }
    if (action === 'open-admin') { openAdmin(); return; }
    if (action === 'close-admin') { closeAdmin(); return; }
  } catch (err) { showToast(err.message || 'حدث خطأ', 'error'); }
});

document.addEventListener('change', event => {
  const builderField = event.target.getAttribute('data-builder-field');
  if (builderField) { if (builderField === 'mode') state.builder.mode = event.target.value; if (builderField === 'totalQuestions') state.builder.totalQuestions = Number(event.target.value || 0); render(); return; }
  if (event.target.getAttribute('data-action') === 'set-builder-unit-count') { state.builder.explicitCounts[event.target.getAttribute('data-unit-key')] = Number(event.target.value || 0); render(); return; }
});

render();
if (state.user) refreshData();
</script>
</body>
